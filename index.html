<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyBwoI2ra0UaZIVwyeIJMBqI1BDsP7b7UN4",
    authDomain: "poduzece-workpage.firebaseapp.com",
    databaseURL: "https://poduzece-workpage-default-rtdb.firebaseio.com",
    projectId: "poduzece-workpage",
    storageBucket: "poduzece-workpage.firebasestorage.app",
    messagingSenderId: "311912748038",
    appId: "1:311912748038:web:04c21c698755c390379f87",
    measurementId: "G-RM5GSB64D1"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // Globalno dostupne funkcije
  window.fbReady = true;
  window.fbDb = db;
  window.fbRef = ref;
  window.fbSet = set;
  window.fbGet = get;
  window.fbOnValue = onValue;
  window.fbUpdate = update;
  
  // Učitaj postojeće podatke iz Firebase pri startu
  window.fbLoadInitial = function() {
    return new Promise(function(resolve) {
      const rootRef = ref(db, 'edn');
      get(rootRef).then(function(snap) {
        if (snap.exists()) {
          const data = snap.val();
          // Konvertuj objekte natrag u nizove ako treba
          ['users','razredi','ucenici','predmeti','casovi','lekcije','materijali','biljeske','ocjene','prisustva','obavijesti','domaci','ispitivanja','redari','pravdanja','porukeChat','otkazani','zamjene','zakljucniSemestri'].forEach(function(k){
            if (data[k] && typeof data[k]==='object' && !Array.isArray(data[k])) {
              data[k] = Object.values(data[k]);
            }
          });
          resolve(data);
        } else {
          resolve(null);
        }
      }).catch(function(e){
        console.error('FB load greška:', e);
        resolve(null);
      });
    });
  };
  
  // Sinhronizacija u realnom vremenu
  window.fbSubscribe = function(callback) {
    const rootRef = ref(db, 'edn');
    onValue(rootRef, function(snap) {
      if (snap.exists()) {
        const data = snap.val();
        ['users','razredi','ucenici','predmeti','casovi','lekcije','materijali','biljeske','ocjene','prisustva','obavijesti','domaci','ispitivanja','redari','pravdanja','porukeChat','otkazani','zamjene','zakljucniSemestri'].forEach(function(k){
          if (data[k] && typeof data[k]==='object' && !Array.isArray(data[k])) {
            data[k] = Object.values(data[k]);
          }
        });
        callback(data);
      }
    });
  };
  
  // Spasi sve podatke
  window.fbSaveAll = function(data) {
    return set(ref(db, 'edn'), data).catch(function(e){
      console.error('FB save greška:', e);
    });
  };
  
  // Signaliziraj da je Firebase spreman
  window.dispatchEvent(new Event('firebase-ready'));
</script>

let isApplyingRemote = false; // sprječava petlju kada primimo update iz cloud-a
let saveTimer = null;
let lastSaveTime = 0;

function saveData() {
  // Uvijek spasi lokalno
  try { localStorage.setItem('edn_v4', JSON.stringify(DB)); }
  catch(e) { console.error('Save error:',e); }
  
  // Spasi i u Firebase (debounced 500ms da ne spamamo)
  if (!isApplyingRemote && window.fbReady && window.fbSaveAll) {
    if (saveTimer) clearTimeout(saveTimer);
    setStatusSync('saving');
    saveTimer = setTimeout(function(){
      window.fbSaveAll(DB).then(function(){
        lastSaveTime = Date.now();
        setStatusSync('synced');
      }).catch(function(){
        setStatusSync('offline');
      });
    }, 500);
  }
}

function setStatusSync(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status==='saving') el.innerHTML = '<span class="text-yellow-300">⟳ Spašavanje...</span>';
  else if (status==='synced') el.innerHTML = '<span class="text-green-300" title="Sinhronizovano u cloud">☁️ ✓</span>';
  else if (status==='offline') el.innerHTML = '<span class="text-red-300" title="Offline - radi lokalno">⚠️ Offline</span>';
  else if (status==='loading') el.innerHTML = '<span class="text-blue-200">⟳ Učitavam...</span>';
}

DB = loadData();
// osiguraj sve ključeve
Object.keys(DEFAULT_DATA).forEach(k=>{
  if (DB[k]===undefined) {
    DB[k] = Array.isArray(DEFAULT_DATA[k]) ? [] : (typeof DEFAULT_DATA[k]==='object' ? {...DEFAULT_DATA[k]} : DEFAULT_DATA[k]);

let currentUser = null;

let viewState = {};

// ============= HELPERS =============
function todayISO() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { if (!d) return ''; const p = d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]+'.'; }
function getRazredName(id) { return DB.razredi.find(r=>r.id===id)?.naziv || '-'; }
function getNastavnikName(id) { return DB.users.find(u=>u.id===id)?.name || '-'; }
function getDanName(d) { return ['Nedjelja','Ponedjeljak','Utorak','Srijeda','Četvrtak','Petak','Subota'][d]; }
function getCurrentSemester() {
  const today = todayISO();
  // Pronađi semestar koji obuhvata današnji datum
  if (DB.semestri && DB.semestri.length) {
    const sem = DB.semestri.find(s=>s.datumOd<=today && s.datumDo>=today);
    if (sem) return sem.broj;
  }
  // fallback po mjesecu
  const m = new Date().getMonth();
  return (m>=8||m<=0)?1:2;
}
function getSemesterInfo(broj) {
  if (!DB.semestri) return null;
  return DB.semestri.find(s=>s.broj===broj);
}
function isSemesterZatvoren(broj) {
  const s = getSemesterInfo(broj);
  // ako semestar nije pronađen, ZATVOREN je po defaultu
  if (!s) return true;
  return s.zatvoren !== false; // sve osim eksplicitno false znači zatvoren
}
function isSemesterOtvoren(broj) {
  return !isSemesterZatvoren(broj);
}
function isSemesterLocked(razredId, predmet, sem) { return DB.zakljucniSemestri.some(z=>z.razredId===razredId&&z.predmet===predmet&&z.semestar===sem); }
function avgOcjena(arr) {
  const a = arr.filter(o=>!o.zamjenjeno && !o.zakljucna && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  if (!a.length) return '-';
  return (a.reduce((x,y)=>x+y,0)/a.length).toFixed(2);
}
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Trenutni week offset (0 = ova sedmica, 1 = sljedeća, -1 = prošla)
let weekOffset = 0;

// Generiraj listu vremena za raspored
// - dinamički iz časova (razredId ili svih) 
// - kombinovano sa standardnim školskim vremenima
function getRasporedVremena(razredId) {
  const standardna = ['08:00','08:50','09:45','10:40','11:35','12:30','13:15'];
  const set = new Set(standardna);
  // dodaj sva vremena iz časova (za sve dane)
  DB.casovi.forEach(function(cas){
    if (razredId && cas.razredId !== razredId) return;
    if (cas.vrijeme) set.add(cas.vrijeme);
  });
  // sortiraj
  return Array.from(set).sort(function(a,b){
    const [ah,am] = a.split(':').map(Number);
    const [bh,bm] = b.split(':').map(Number);
    return (ah*60+am) - (bh*60+bm);
  });
}
// vremena samo iz časova (bez standardnih) - za nastavnikov pregled
function getRasporedVremenaSamoIzCasova(casovi) {
  const set = new Set();
  casovi.forEach(function(cas){
    if (cas.vrijeme) set.add(cas.vrijeme);
  });
  return Array.from(set).sort(function(a,b){
    const [ah,am] = a.split(':').map(Number);
    const [bh,bm] = b.split(':').map(Number);
    return (ah*60+am) - (bh*60+bm);
  });
}

function getDatumZaDan(d) {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  // pomjeri za weekOffset sedmica
  monday.setDate(monday.getDate() + (weekOffset*7));
  const dt = new Date(monday);
  dt.setDate(monday.getDate()+(d-1));
  return dt.toISOString().split('T')[0];
}

function getWeekDateRange() {
  const pon = getDatumZaDan(1);
  const pet = getDatumZaDan(5);
  return { pon:pon, pet:pet };
}

function getWeekLabel() {
  if (weekOffset === 0) return 'Ova sedmica';
  if (weekOffset === 1) return 'Sljedeća sedmica';
  if (weekOffset === -1) return 'Prošla sedmica';
  if (weekOffset > 0) return 'Za '+weekOffset+' sedmica';
  return 'Prije '+Math.abs(weekOffset)+' sedmica';
}

function changeWeek(delta) {
  weekOffset += delta;
  navigate(currentView, viewState);
}

function resetWeek() {
  weekOffset = 0;
  navigate(currentView, viewState);
}

// ============= SWIPE GESTURE =============
let swipeStartX = null;
let swipeStartY = null;
let swipeTime = null;

function attachSwipe() {
  const el = document.getElementById('rasporedSwipe');
  if (!el) return;
  // ukloni stare listenere ako postoje
  el.ontouchstart = function(e) {
    if (e.touches.length !== 1) return;
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
    swipeTime = Date.now();
  };
  el.ontouchend = function(e) {
    if (swipeStartX === null) return;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - swipeStartX;
    const dy = touch.clientY - swipeStartY;
    const dt = Date.now() - swipeTime;
    swipeStartX = null;
    // Mora biti dovoljno brz (< 800ms), dovoljno horizontalan (|dx| > 2*|dy|), i dovoljno dug
    if (dt < 800 && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5) {
      if (dx < 0) changeWeek(1); // swipe lijevo = sljedeća
      else changeWeek(-1); // swipe desno = prošla
    }
  };
  // Animacija prilikom swipea
  el.ontouchmove = function(e) {
    if (swipeStartX === null || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - swipeStartX;
    const dy = e.touches[0].clientY - swipeStartY;
    // ako je vertikalni scroll, ne radi swipe
    if (Math.abs(dy) > Math.abs(dx)) { swipeStartX = null; return; }
    if (Math.abs(dx) > 30) {
      el.style.transform = 'translateX('+(dx*0.3)+'px)';
      el.style.opacity = (1 - Math.abs(dx)/500).toFixed(2);
    }
  };
  el.ontouchcancel = function() {
    swipeStartX = null;
    el.style.transform = '';
    el.style.opacity = '';
  };
  // resetuj nakon završetka swipe-a
  const origTouchEnd = el.ontouchend;
  el.ontouchend = function(e) {
    el.style.transform = '';
    el.style.opacity = '';
    el.style.transition = 'transform .2s, opacity .2s';
    setTimeout(()=>{ el.style.transition = ''; }, 250);
    origTouchEnd(e);
  };
}

document.addEventListener('keydown', function(e) {

  const tag = (document.activeElement || {}).tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); changeWeek(-1); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); changeWeek(1); }
  else if (e.key === 'Home') { e.preventDefault(); resetWeek(); }
});

function getTrenutniCas(nastId) {
  const n = new Date();
  const day = n.getDay();
  const time = n.getHours()*60 + n.getMinutes();
  return DB.casovi.find(c => {
    if (c.nastavnikId !== nastId || c.dan !== day) return false;
    const [h,m] = c.vrijeme.split(':').map(Number);
    return time >= h*60+m && time <= h*60+m + (c.trajanje||45);
  });
}
function getSljedeciCas(nastId) {
  const n = new Date();
  const day = n.getDay();
  const time = n.getHours()*60 + n.getMinutes();
  return DB.casovi.filter(c=>c.nastavnikId===nastId && c.dan===day).filter(c=>{
    const [h,m] = c.vrijeme.split(':').map(Number);
    return h*60+m > time;
  }).sort((a,b)=>a.vrijeme.localeCompare(b.vrijeme))[0];
}
function getCasoviToday(nastId) {
  return DB.casovi.filter(c=>c.nastavnikId===nastId && c.dan===new Date().getDay()).sort((a,b)=>a.vrijeme.localeCompare(b.vrijeme));
}

function showNotification(text, type) {
  type = type||'success';
  const c = document.getElementById('notifContainer');
  const n = document.createElement('div');
  n.className = 'notification';
  if (type==='error') n.style.background = '#dc2626';
  else if (type==='info') n.style.background = '#2563eb';
  const icon = type==='error'?'⚠':type==='info'?'ℹ':'✓';
  n.innerHTML = '<span style="font-size:1.3em">'+icon+'</span><span>'+escapeHtml(text)+'</span>';
  c.appendChild(n);
  setTimeout(()=>{ if(n.parentNode){n.style.animation='slideIn .3s reverse'; setTimeout(()=>n.remove(),300);} }, 3500);
}

// ============= AUTO-REDIRECT =============
function startAutoRedirect() {
  if (autoRedirectInterval) clearInterval(autoRedirectInterval);
  if (!currentUser || currentUser.role !== 'nastavnik') return;
  autoRedirectInterval = setInterval(()=>{
    if (!currentUser || currentUser.role !== 'nastavnik') return;
    const cas = getTrenutniCas(currentUser.id);
    if (cas && cas.id !== lastCasId) {
      lastCasId = cas.id;
      if (currentView !== 'dnevnik' || viewState.razredId !== cas.razredId) {
        showCasNotif(cas);
      }
    } else if (!cas) {
      lastCasId = null;
    }
  }, 30000);
}
function showCasNotif(cas) {
  const c = document.getElementById('notifContainer');
  const n = document.createElement('div');
  n.className = 'notification';
  n.style.background = '#1e40af';
  n.style.cursor = 'pointer';
  n.innerHTML = '<span style="font-size:1.5em">📚</span><div><div><b>Počeo je čas!</b></div><div style="font-size:.85em;opacity:.95">'+escapeHtml(cas.predmet)+' - '+escapeHtml(getRazredName(cas.razredId))+' • '+cas.vrijeme+'</div><div style="font-size:.75em;opacity:.85;margin-top:2px">👆 Klikni za otvaranje dnevnika</div></div>';

  setTimeout(()=>{ if(n.parentNode){n.style.animation='slideIn .3s reverse'; setTimeout(()=>n.remove(),300);} }, 12000);
}

// ============= AUTH =============
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if (!u || !p) { errEl.textContent='Unesite korisničko ime i lozinku'; errEl.classList.remove('hidden'); return; }
  const user = DB.users.find(x => x.username.toLowerCase()===u.toLowerCase() && x.password===p);
  if (!user) { errEl.textContent='Pogrešno korisničko ime ili lozinka'; errEl.classList.remove('hidden'); return; }
  errEl.classList.add('hidden');
  currentUser = user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userBadge').textContent = user.name;
  const sb = document.getElementById('sidebar');
  sb.classList.remove('hidden','open');
  document.body.classList.remove('sidebar-open');
  buildSidebar();
  updateNotifBadge();
  startAutoRedirect();
  // Auto-otvori dnevnik trenutnog časa za nastavnika
  if (user.role === 'nastavnik') {
    const cas = getTrenutniCas(user.id);
    if (cas) {
      showNotification('📚 Otvaramo dnevnik trenutnog časa: '+cas.predmet, 'success');
      navigate('dnevnik', { razredId: cas.razredId, predmet: cas.predmet });
      return;
    }
    const slj = getSljedeciCas(user.id);
    if (slj) {
      const [h,m] = slj.vrijeme.split(':').map(Number);
      const start = h*60+m;
      const nowMin = new Date().getHours()*60+new Date().getMinutes();
      if (start - nowMin <= 15 && start - nowMin > 0) {
        showNotification('⏰ Sljedeći čas za '+(start-nowMin)+' min: '+slj.predmet, 'info');
      }
    }
  }
  navigate('pocetna');
}

function logout() {
  if (autoRedirectInterval) clearInterval(autoRedirectInterval);
  autoRedirectInterval = null;
  lastCasId = null;
  currentUser = null;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginForm').reset();
  document.getElementById('loginError').classList.add('hidden');
}

function navigate(view, state) {
  state = state || {};
  if (view==='odjava') { if (confirm('Odjaviti se?')) logout(); return; }
  // Reset week offset ako mijenjamo view (osim ako ostajemo na rasporedu)
  const viewSadrziRaspored = view==='raspored' || view==='mojiraspored' || view==='mojicasovi';
  const prethodniRaspored = currentView==='raspored' || currentView==='mojiraspored' || currentView==='mojicasovi';
  if (!viewSadrziRaspored || !prethodniRaspored) weekOffset = 0;
  currentView = view;
  viewState = state;
  setActiveSidebar(view);
  const c = document.getElementById('mainContent');
  if (c) c.scrollTop = 0;
  closeSidebar();
  const r = RENDERERS[view];
  if (r) {
    try { r(c, state); }
    catch(e) { console.error('Render error:',e); c.innerHTML = '<div class="empty-state">Greška pri učitavanju. <br>'+escapeHtml(e.message)+'</div>'; }
  } else {
    c.innerHTML = '<div class="empty-state">Stranica u izradi</div>';
  }
  // Aktiviraj swipe ako je raspored view
  if (viewSadrziRaspored) setTimeout(attachSwipe, 50);
  if (currentUser) updateNotifBadge();
}

function obrisiJednoObavjestenje(id) {
  // Ako je obavještenje samo za mene (zaId), obriši ga; ako je za sve, dodaj me u skriveno
  const o = DB.obavijesti.find(x=>x.id===id);
  if (!o) return;
  if (o.zaId === currentUser.id) {
    // Samo za mene - obriši trajno
    DB.obavijesti = DB.obavijesti.filter(x=>x.id!==id);
  } else {
    // Generalno - dodaj u skriveno za mene
    o.skriveno = o.skriveno || [];
    if (o.skriveno.indexOf(currentUser.id)<0) o.skriveno.push(currentUser.id);
  }
  saveData();
  // Re-render panel
  document.getElementById('notifPanel')?.remove();
  toggleNotifPanel();
  updateNotifBadge();

function ocistiObavjestenja() {
  if (!confirm('🗑 Obrisati SVA vaša obavještenja?')) return;
  DB.obavijesti = DB.obavijesti.filter(function(o){
    if (o.zaId === currentUser.id) return false; // moja - obriši
    // generalna - sakrij za mene
    o.skriveno = o.skriveno || [];
    if (o.skriveno.indexOf(currentUser.id)<0) o.skriveno.push(currentUser.id);
    return true;
  });
  saveData();
  document.getElementById('notifPanel')?.remove();
  updateNotifBadge();
  showNotification('Sva obavještenja obrisana');
}

function ocistiObavjestenjaStarija() {
  const granica = new Date(); granica.setDate(granica.getDate()-7);
  const granicaIso = granica.toISOString().split('T')[0];
  let obrisano = 0;
  DB.obavijesti = DB.obavijesti.filter(function(o){
    if (o.datum >= granicaIso) return true; // novije - zadrži
    if (o.zaId === currentUser.id) { obrisano++; return false; }
    o.skriveno = o.skriveno || [];
    if (o.skriveno.indexOf(currentUser.id)<0) { o.skriveno.push(currentUser.id); obrisano++; }
    return true;
  });
  saveData();
  document.getElementById('notifPanel')?.remove();
  toggleNotifPanel();
  updateNotifBadge();
  showNotification(obrisano+' obavještenja obrisana');
}

    (raspToday.length ? raspToday.map(function(cs){
      const dat = todayISO();
      const otkazan = (DB.otkazani||[]).find(o=>o.casId===cs.id && o.datum===dat);
      const zamjena = (DB.zamjene||[]).find(z=>z.casId===cs.id && z.datum===dat);
      const nastIme = zamjena ? '🔄 '+getNastavnikName(zamjena.zamjenskiId) : getNastavnikName(cs.nastavnikId);
      return '<div class="flex items-center gap-3 py-2 border-b last:border-0 '+(otkazan?'opacity-50':'')+'">'+
        '<div class="font-bold w-14 '+(otkazan?'text-red-700 line-through':'text-blue-700')+'">'+cs.vrijeme+'</div>'+
        '<div class="flex-1"><div class="font-medium '+(otkazan?'line-through':'')+'">'+escapeHtml(cs.predmet)+(otkazan?' <span class="badge bg-red-600 text-white text-[10px]">OTKAZAN</span>':zamjena?' <span class="badge bg-purple-600 text-white text-[10px]">ZAMJENA</span>':'')+'</div>'+
        '<div class="text-xs text-gray-500">'+escapeHtml(nastIme)+(cs.ucionica?' • uč. '+cs.ucionica:'')+(otkazan&&otkazan.razlog?' • <i>'+escapeHtml(otkazan.razlog)+'</i>':'')+'</div></div></div>';
    }).join('') : '<p class="text-gray-400 text-sm">Slobodan dan! 🎉</p>')+
    '</div>'+
    '<div class="bg-white border rounded-xl p-6"><h3 class="font-semibold text-lg mb-4">📚 Aktualne zadaće</h3>'+
    (domaci.length ? domaci.slice(0,5).map(function(d){
      const dl = Math.ceil((new Date(d.rok)-new Date(todayISO()))/(1000*60*60*24));
      return '<div class="py-2 border-b last:border-0">'+
        '<div class="flex justify-between items-start"><div><div class="font-medium text-sm">'+escapeHtml(d.naslov)+'</div>'+
        '<div class="text-xs text-gray-500">'+escapeHtml(d.predmet)+'</div></div>'+
        '<span class="badge '+(dl<=1?'bg-red-100 text-red-700':dl<=3?'bg-yellow-100 text-yellow-700':'bg-green-100 text-green-700')+'">'+(dl===0?'danas':dl+'d')+'</span></div></div>';
    }).join('') : '<p class="text-gray-400 text-sm">Nema aktivnih zadaća</p>')+
    '</div></div>';
  c.innerHTML = html;
}

function renderWeekNavigator() {
  const range = getWeekDateRange();
  return '<div class="bg-white border-2 rounded-xl p-3 mb-4 shadow-sm flex flex-wrap items-center justify-between gap-2">'+
    '<button onclick="changeWeek(-1)" class="btn-secondary px-4 py-2 rounded-lg font-semibold flex items-center gap-1 hover:bg-blue-50" title="Prošla sedmica">'+
    '<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>'+
    '<span class="hide-mobile">Prošla</span>'+
    '</button>'+
    '<div class="flex-1 text-center">'+
    '<div class="font-bold text-lg '+(weekOffset===0?'text-blue-700':'text-gray-700')+'">'+(weekOffset===0?'📅 OVA SEDMICA':getWeekLabel().toUpperCase())+'</div>'+
    '<div class="text-xs text-gray-500">'+fmtDate(range.pon)+' - '+fmtDate(range.pet)+'</div>'+
    (weekOffset!==0?'<button onclick="resetWeek()" class="text-xs text-blue-600 hover:underline mt-1">↻ Vrati na ovu sedmicu</button>':'')+
    '</div>'+
    '<button onclick="changeWeek(1)" class="btn-secondary px-4 py-2 rounded-lg font-semibold flex items-center gap-1 hover:bg-blue-50" title="Sljedeća sedmica">'+
    '<span class="hide-mobile">Sljedeća</span>'+
    '<svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>'+
    '</button>'+
    '</div>';
}

function renderRasporedGrid(razredId, dani, vremena, today, nowMin) {
  // ako gledamo drugu sedmicu, "today" highlight ne treba biti aktivan
  const realToday = new Date().getDay();
  const realTodayHighlight = weekOffset === 0 ? today : -1;
  
  let html = renderWeekNavigator();
  html += '<div id="rasporedSwipe" class="rasp-wrap"><div class="rasp-grid">';
  html += '<div></div>';
  for (let i=0;i<dani.length;i++) {
    const d = dani[i];
    const dat = getDatumZaDan(d);
    const isToday = d===realTodayHighlight;
    html += '<div class="rasp-header'+(isToday?' today':'')+'">'+getDanName(d)+'<div class="text-[10px] font-normal opacity-90 mt-1">'+(isToday?'DANAS · ':'')+fmtDate(dat).substring(0,6)+'</div></div>';
  }
  for (let vi=0;vi<vremena.length;vi++) {
    const v = vremena[vi];
    const parts = v.split(':');
    const h = +parts[0], m = +parts[1];
    const endH = Math.floor((h*60+m+45)/60);
    const endM = (h*60+m+45)%60;
    const endStr = String(endH).padStart(2,'0')+':'+String(endM).padStart(2,'0');
    html += '<div class="rasp-time"><div class="num">'+(vi+1)+'.</div><div>'+v+'</div><div class="text-[9px] opacity-70">'+endStr+'</div></div>';
    for (let di=0;di<dani.length;di++) {
      const d = dani[di];
      const cs = DB.casovi.find(x=>x.razredId===razredId && x.dan===d && x.vrijeme===v);
      if (!cs) { html += '<div class="rasp-cell empty"></div>'; continue; }
      const start = h*60+m;
      const isNow = d===realTodayHighlight && nowMin>=start && nowMin<=start+(cs.trajanje||45);
      const isSoon = d===realTodayHighlight && start>nowMin && start-nowMin<30;
      const datZaDan = getDatumZaDan(d);
      const ispit = DB.ispitivanja.find(i=>i.razredId===razredId && i.predmet===cs.predmet && i.datum===datZaDan);
      const zadaca = DB.domaci.find(z=>z.razredId===razredId && z.predmet===cs.predmet && z.rok===datZaDan);
      const lekcija = DB.lekcije.find(l=>l.razredId===razredId && l.predmet===cs.predmet && l.datum===datZaDan);
      const otkazan = (DB.otkazani||[]).find(o=>o.casId===cs.id && o.datum===datZaDan);
      const zamjena = (DB.zamjene||[]).find(z=>z.casId===cs.id && z.datum===datZaDan);
      const colorIdx = DB.predmeti.indexOf(cs.predmet) % 8;
      let klasa = '';
      if (otkazan) klasa = 'cancelled';
      else if (isNow) klasa = 'now';
      else if (ispit) klasa = 'exam';
      else if (isSoon) klasa = 'soon';
      const nastDisplay = zamjena ? '🔄 '+escapeHtml(getNastavnikName(zamjena.zamjenskiId)) : escapeHtml(getNastavnikName(cs.nastavnikId));
      html += '<div class="rasp-cell subject-color-'+colorIdx+' '+klasa+'" onclick="prikaziDetaljeCasa('+cs.id+',\''+datZaDan+'\')">'+
        '<div class="rasp-subject">'+escapeHtml(cs.predmet)+'</div>'+
        '<div class="rasp-teacher">'+nastDisplay+'</div>'+
        (cs.ucionica?'<div class="rasp-room">📍 '+escapeHtml(cs.ucionica)+'</div>':'')+
        '<div class="mt-1">'+
        (otkazan?'<span class="rasp-tag rasp-tag-cancel" title="'+escapeHtml(otkazan.razlog)+'">❌ OTKAZAN</span>':'')+
        (zamjena && !otkazan?'<span class="rasp-tag rasp-tag-swap">🔄 ZAMJENA</span>':'')+
        (ispit && !otkazan?'<span class="rasp-tag rasp-tag-exam" title="'+escapeHtml(ispit.naslov)+'">⚠ '+ispit.tip.toUpperCase()+'</span>':'')+
        (zadaca && !otkazan?'<span class="rasp-tag rasp-tag-hw" title="'+escapeHtml(zadaca.naslov)+'">📝 ZADAĆA</span>':'')+
        (lekcija && !otkazan?'<span class="rasp-tag rasp-tag-lesson" title="'+escapeHtml(lekcija.naslov)+'">📖 LEKCIJA</span>':'')+
        '</div>'+
        (currentUser.role==='admin'?'<div class="absolute bottom-1 right-1 flex gap-0.5"><button onclick="event.stopPropagation();openCasModal('+cs.id+')" class="text-blue-600 text-[10px] hover:bg-blue-100 px-1 rounded" title="Uredi čas">✎</button><button onclick="event.stopPropagation();deleteCas('+cs.id+')" class="text-red-600 text-[10px] hover:bg-red-100 px-1 rounded" title="Obriši čas">🗑</button></div>':'')+
        '</div>';
    }
  }
  html += '</div></div>';
  return html;
}

function prikaziDetaljeCasa(casId, datumZaDan) {
  const cs = DB.casovi.find(c=>c.id===casId);
  if (!cs) return;
  if (!datumZaDan) datumZaDan = getDatumZaDan(cs.dan);
  const ispit = DB.ispitivanja.find(i=>i.razredId===cs.razredId && i.predmet===cs.predmet && i.datum===datumZaDan);
  const zadaca = DB.domaci.find(z=>z.razredId===cs.razredId && z.predmet===cs.predmet && z.rok===datumZaDan);
  const lekcijaDanas = DB.lekcije.find(l=>l.razredId===cs.razredId && l.predmet===cs.predmet && l.datum===datumZaDan);
  // sve prošle lekcije osim ove današnje
  const lekcije = DB.lekcije.filter(l=>l.razredId===cs.razredId && l.predmet===cs.predmet && l.datum!==datumZaDan).sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,5);
  const otkazan = (DB.otkazani||[]).find(o=>o.casId===casId && o.datum===datumZaDan);
  const zamjena = (DB.zamjene||[]).find(z=>z.casId===casId && z.datum===datumZaDan);
  const colorIdx = DB.predmeti.indexOf(cs.predmet) % 8;
  const aktNastId = zamjena ? zamjena.zamjenskiId : cs.nastavnikId;
  const mozeDnevnik = currentUser.role==='nastavnik' && aktNastId===currentUser.id && !otkazan;
  const jeAdmin = currentUser.role==='admin';
  const jeMojCas = currentUser.role==='nastavnik' && cs.nastavnikId===currentUser.id;
  
  let html = '<div class="-m-6 mb-4 p-6 rounded-t-2xl subject-color-'+colorIdx+'" style="background:linear-gradient(135deg,#eff6ff,#dbeafe)">'+
    '<div class="flex justify-between items-start gap-2"><div>'+
    '<h3 class="text-2xl font-bold text-gray-800'+(otkazan?' line-through':'')+'">'+escapeHtml(cs.predmet)+'</h3>'+
    '<p class="text-sm text-gray-600 mt-1">'+escapeHtml(getRazredName(cs.razredId))+' • '+getDanName(cs.dan)+' • '+fmtDate(datumZaDan)+'</p></div>'+
    (otkazan?'<span class="badge bg-red-600 text-white text-sm px-3 py-1.5">❌ OTKAZAN</span>':zamjena?'<span class="badge bg-purple-600 text-white text-sm px-3 py-1.5">🔄 ZAMJENA</span>':'')+
    '</div></div>';
  
  // STATUS BANNERI
  if (otkazan) {
    html += '<div class="bg-red-100 border-l-4 border-red-600 p-3 rounded-lg mb-3">'+
      '<div class="font-bold text-red-900">❌ Čas otkazan</div>'+
      '<div class="text-sm text-red-800 mt-1">Razlog: <b>'+escapeHtml(otkazan.razlog)+'</b></div>'+
      '<div class="text-xs text-red-700 mt-1">Otkazao: '+escapeHtml(getNastavnikName(otkazan.otkazaoId))+'</div></div>';
  }
  if (zamjena && !otkazan) {
    html += '<div class="bg-purple-50 border-l-4 border-purple-500 p-3 rounded-lg mb-3">'+
      '<div class="font-bold text-purple-900">🔄 Zamjena nastavnika</div>'+
      '<div class="text-sm text-purple-800 mt-1">Umjesto <s>'+escapeHtml(getNastavnikName(cs.nastavnikId))+'</s> drži <b>'+escapeHtml(getNastavnikName(zamjena.zamjenskiId))+'</b></div>'+
      (zamjena.napomena?'<div class="text-xs text-purple-700 mt-1">'+escapeHtml(zamjena.napomena)+'</div>':'')+'</div>';
  }
  
  html += '<div class="grid grid-cols-3 gap-2 mb-4 text-center">'+
    '<div class="bg-gray-50 p-3 rounded-lg"><div class="text-xs text-gray-500">Vrijeme</div><div class="font-bold text-blue-700">'+cs.vrijeme+'</div></div>'+
    '<div class="bg-gray-50 p-3 rounded-lg"><div class="text-xs text-gray-500">Učionica</div><div class="font-bold">'+(cs.ucionica||'-')+'</div></div>'+
    '<div class="bg-gray-50 p-3 rounded-lg"><div class="text-xs text-gray-500">Trajanje</div><div class="font-bold">'+(cs.trajanje||45)+' min</div></div></div>'+
    '<div class="bg-blue-50 p-3 rounded-lg mb-3"><div class="text-xs text-gray-500">Nastavnik</div><b'+(zamjena?' class="line-through opacity-60"':'')+'>'+escapeHtml(getNastavnikName(cs.nastavnikId))+'</b>'+
    (zamjena?' <span class="ml-2 text-purple-700">→ <b>'+escapeHtml(getNastavnikName(zamjena.zamjenskiId))+'</b></span>':'')+
    '</div>';
  
  if (!otkazan) {
    if (ispit) html += '<div class="bg-red-50 border-l-4 border-red-500 p-3 rounded-lg mb-3"><div class="font-bold text-red-900">⚠ '+ispit.tip.toUpperCase()+': '+escapeHtml(ispit.naslov)+'</div>'+(ispit.opis?'<p class="text-sm text-red-800 mt-2">'+escapeHtml(ispit.opis)+'</p>':'')+'</div>';
    if (zadaca) html += '<div class="bg-yellow-50 border-l-4 border-yellow-500 p-3 rounded-lg mb-3"><div class="font-bold text-yellow-900">📝 ZADAĆA: '+escapeHtml(zadaca.naslov)+'</div>'+(zadaca.opis?'<p class="text-sm text-yellow-800 mt-1">'+escapeHtml(zadaca.opis)+'</p>':'')+'</div>';
    if (lekcijaDanas) html += '<div class="bg-green-50 border-l-4 border-green-500 p-3 rounded-lg mb-3"><div class="font-bold text-green-900">📖 Lekcija: '+escapeHtml(lekcijaDanas.naslov)+'</div>'+(lekcijaDanas.opis?'<p class="text-sm text-green-800 mt-1">'+escapeHtml(lekcijaDanas.opis)+'</p>':'')+'</div>';
  }
  if (lekcije.length && !otkazan) {
    html += '<div class="mb-3"><div class="text-xs font-semibold text-gray-500 mb-1">📚 PROŠLE LEKCIJE ('+lekcije.length+')</div>'+
      lekcije.map(function(l){
        return '<div class="text-sm p-2 bg-blue-50 rounded mb-1 flex justify-between items-center gap-2">'+
          '<div class="flex-1 min-w-0"><b>'+escapeHtml(l.naslov)+'</b>'+
          (l.tip?' <span class="text-xs text-blue-700">('+escapeHtml(l.tip)+')</span>':'')+
          (l.ostvarena===false?' <span class="badge bg-yellow-100 text-yellow-700 text-[10px]">⏳ planirano</span>':'')+
          '</div>'+
          '<span class="text-xs text-gray-500 flex-shrink-0">'+fmtDate(l.datum)+'</span>'+
          '</div>';
      }).join('')+
      '</div>';
  }
  
  // ADMIN AKCIJE
  if (jeAdmin || jeMojCas) {
    html += '<div class="bg-purple-50 border border-purple-200 rounded-lg p-3 mb-3">'+
      '<div class="text-xs font-semibold text-purple-900 mb-2">⚙️ AKCIJE</div>'+
      '<div class="flex flex-wrap gap-2">';
    if (jeAdmin) {
      html += '<button onclick="closeModal();openCasModal('+casId+')" class="btn-secondary px-3 py-1.5 rounded text-sm">✎ Uredi čas</button>';
    }
    if (jeAdmin || jeMojCas) {
      html += '<button onclick="otkaziCas('+casId+',\''+datumZaDan+'\')" class="'+(otkazan?'btn-success':'btn-danger')+' px-3 py-1.5 rounded text-sm">'+(otkazan?'✓ Vrati čas':'❌ Otkaži samo ovaj termin')+'</button>';
      html += '<button onclick="zamijeniNastavnika('+casId+',\''+datumZaDan+'\')" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded text-sm">🔄 Zamjena</button>';
    }
    if (jeAdmin) {
      html += '<button onclick="deleteCasTrajno('+casId+')" class="bg-red-700 hover:bg-red-800 text-white px-3 py-1.5 rounded text-sm font-bold">🗑 OBRIŠI ZAUVIJEK</button>';
    }
    html += '</div>';
    if (jeAdmin) html += '<div class="text-[11px] text-gray-600 mt-2"><b>❌ Otkaži</b> = samo ovaj termin (npr. praznik) • <b>🗑 OBRIŠI ZAUVIJEK</b> = ukloni čas iz rasporeda potpuno</div>';
    html += '</div>';
  }
  
  html += '<div class="flex justify-between gap-2 pt-3 border-t mt-4">'+
    '<button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Zatvori</button>'+
    (mozeDnevnik?'<button onclick="closeModal();navigate(\'dnevnik\',{razredId:'+cs.razredId+',predmet:\''+escapeHtml(cs.predmet)+'\',datum:\''+datumZaDan+'\'})" class="btn-primary px-4 py-2 rounded-lg font-semibold">📖 Otvori dnevnik →</button>':'')+
    '</div>';
  showModal(html);
}

// Pomoćna funkcija za prikaz SAMO nastavnikovih časova u mrežnom obliku
function renderMojiCasoviGrid(moji, dani, today, nowMin) {
  // izvuci samo vremena koja se zaista koriste
  const vremena = [];
  moji.forEach(function(cas){ if (vremena.indexOf(cas.vrijeme)<0) vremena.push(cas.vrijeme); });
  vremena.sort();
  
  const realTodayHighlight = weekOffset === 0 ? today : -1;
  
  let html = renderWeekNavigator();
  html += '<div id="rasporedSwipe" class="rasp-wrap"><div class="rasp-grid">';
  html += '<div></div>';
  dani.forEach(function(d){
    const dat = getDatumZaDan(d);
    const isToday = d===realTodayHighlight;
    html += '<div class="rasp-header'+(isToday?' today':'')+'">'+getDanName(d)+'<div class="text-[10px] font-normal opacity-90 mt-1">'+(isToday?'DANAS · ':'')+fmtDate(dat).substring(0,6)+'</div></div>';
  });
  vremena.forEach(function(v, vi){
    const parts = v.split(':');
    const h = +parts[0], m = +parts[1];
    const endH = Math.floor((h*60+m+45)/60);
    const endM = (h*60+m+45)%60;
    const endStr = String(endH).padStart(2,'0')+':'+String(endM).padStart(2,'0');
    html += '<div class="rasp-time"><div class="num">'+(vi+1)+'.</div><div>'+v+'</div><div class="text-[9px] opacity-70">'+endStr+'</div></div>';
    dani.forEach(function(d){
      const cas = moji.find(x=>x.dan===d && x.vrijeme===v);
      if (!cas) { html += '<div class="rasp-cell empty"></div>'; return; }
      const start = h*60+m;
      const isNow = d===realTodayHighlight && nowMin>=start && nowMin<=start+(cas.trajanje||45);
      const isSoon = d===realTodayHighlight && start>nowMin && start-nowMin<30;
      const datZaDan = getDatumZaDan(d);
      const ispit = DB.ispitivanja.find(i=>i.razredId===cas.razredId && i.predmet===cas.predmet && i.datum===datZaDan);
      const zadaca = DB.domaci.find(z=>z.razredId===cas.razredId && z.predmet===cas.predmet && z.rok===datZaDan);
      const lekcija = DB.lekcije.find(l=>l.razredId===cas.razredId && l.predmet===cas.predmet && l.datum===datZaDan);
      const colorIdx = DB.predmeti.indexOf(cas.predmet) % 8;
      let klasa = '';
      if (isNow) klasa = 'now'; else if (ispit) klasa = 'exam'; else if (isSoon) klasa = 'soon';
      html += '<div class="rasp-cell subject-color-'+colorIdx+' '+klasa+'" onclick="prikaziDetaljeCasa('+cas.id+',\''+datZaDan+'\')">'+
        '<div class="rasp-subject">'+escapeHtml(cas.predmet)+'</div>'+
        '<div class="rasp-teacher"><b>'+escapeHtml(getRazredName(cas.razredId))+'</b></div>'+
        (cas.ucionica?'<div class="rasp-room">📍 '+escapeHtml(cas.ucionica)+'</div>':'')+
        '<div class="mt-1">'+
        (ispit?'<span class="rasp-tag rasp-tag-exam" title="'+escapeHtml(ispit.naslov)+'">⚠ '+ispit.tip.toUpperCase()+'</span>':'')+
        (zadaca?'<span class="rasp-tag rasp-tag-hw" title="'+escapeHtml(zadaca.naslov)+'">📝 ZAD</span>':'')+
        (lekcija?'<span class="rasp-tag rasp-tag-lesson" title="'+escapeHtml(lekcija.naslov)+'">📖 LEK</span>':'')+
        '</div></div>';
    });
  });
  html += '</div></div>';
  return html;
}

    '<div><label class="text-sm font-medium block mb-1">Trajanje (min)</label><input name="trajanje" type="number" value="'+(cas.trajanje||45)+'" required class="w-full px-3 py-2 border rounded-lg"></div>'+

    '<div class="flex justify-between gap-2 pt-4 border-t">'+

    // Provjeri konflikt - isti nastavnik ne može držati 2 časa istovremeno
    const konflikt = DB.casovi.find(c=>c.id!==(id||0) && c.nastavnikId===data.nastavnikId && c.dan===data.dan && c.vrijeme===data.vrijeme);
    if (konflikt) {
      if (!confirm('⚠ KONFLIKT: '+getNastavnikName(data.nastavnikId)+' već ima čas '+konflikt.predmet+' u '+konflikt.vrijeme+' ('+getRazredName(konflikt.razredId)+').\n\nIpak dodati?')) return;
    }
    // Provjeri konflikt - razred ne može imati 2 časa istovremeno
    const konfRaz = DB.casovi.find(c=>c.id!==(id||0) && c.razredId===data.razredId && c.dan===data.dan && c.vrijeme===data.vrijeme);
    if (konfRaz) {
      if (!confirm('⚠ KONFLIKT: '+getRazredName(data.razredId)+' već ima čas '+konfRaz.predmet+' u '+konfRaz.vrijeme+'.\n\nIpak dodati?')) return;
    }
    if (id) {
      Object.assign(cas, data);
      // obavijesti nastavnika i učenike u razredu o promjeni
      const nast = DB.users.find(u=>u.id===data.nastavnikId);
      if (nast) DB.obavijesti.push({ id:Date.now(), naslov:'📅 Izmjena rasporeda', tekst:data.predmet+' - '+getRazredName(data.razredId)+' ('+getDanName(data.dan)+' '+data.vrijeme+')', datum:todayISO(), za:null, zaId:nast.id });
      DB.ucenici.filter(u=>u.razredId===data.razredId).forEach(function(u){
        const usr = DB.users.find(x=>x.ucenikId===u.id);
        if (usr) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'📅 Izmjena rasporeda', tekst:data.predmet+' - '+getDanName(data.dan)+' '+data.vrijeme, datum:todayISO(), za:null, zaId:usr.id });
      });
    } else {
      DB.casovi.push(Object.assign({id:Date.now()}, data));
      // obavijesti dodanog nastavnika
      const nast = DB.users.find(u=>u.id===data.nastavnikId);
      if (nast) DB.obavijesti.push({ id:Date.now(), naslov:'📅 Dodijeljen vam novi čas', tekst:data.predmet+' - '+getRazredName(data.razredId)+' ('+getDanName(data.dan)+' '+data.vrijeme+')', datum:todayISO(), za:null, zaId:nast.id });
    }
    // Provjeri da li je neuobičajeno vrijeme (van 08:00-13:15)
    const standardna = ['08:00','08:50','09:45','10:40','11:35','12:30','13:15'];
    const neuobicajeno = standardna.indexOf(data.vrijeme) < 0;
    saveData(); closeModal(); navigate('raspored'); 
    if (neuobicajeno && !id) {
      showNotification('✓ Čas dodan u '+data.vrijeme+' (neuobičajeno vrijeme - automatski prikazano u rasporedu)', 'info');
    } else {
      showNotification(id?'✓ Čas izmijenjen':'✓ Čas dodan u raspored');
    }
  };
}

function deleteCas(id) {
  if (!confirm('🗑 Trajno obrisati ovaj čas iz rasporeda?')) return;
  const cas = DB.casovi.find(c=>c.id===id);
  if (cas) {
    // obavijesti
    DB.ucenici.filter(u=>u.razredId===cas.razredId).forEach(function(u){
      const usr = DB.users.find(x=>x.ucenikId===u.id);
      if (usr) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'🗑 Obrisan čas iz rasporeda', tekst:cas.predmet+' - '+getDanName(cas.dan)+' '+cas.vrijeme, datum:todayISO(), za:null, zaId:usr.id });
    });
    // obavijesti i nastavnika
    if (cas.nastavnikId) {
      DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'🗑 Vaš čas obrisan iz rasporeda', tekst:cas.predmet+' - '+getRazredName(cas.razredId)+' • '+getDanName(cas.dan)+' '+cas.vrijeme, datum:todayISO(), za:null, zaId:cas.nastavnikId });
    }
  }
  DB.casovi = DB.casovi.filter(c=>c.id!==id);
  // obrišimo i sve otkazane/zamjene za taj čas
  DB.otkazani = (DB.otkazani||[]).filter(o=>o.casId!==id);
  DB.zamjene = (DB.zamjene||[]).filter(z=>z.casId!==id);
  saveData(); closeModal(); navigate('raspored'); showNotification('✓ Čas obrisan iz rasporeda');
}

// Trajno brisanje časa - poziva se iz modala detalja, traži potvrdu sa imenom
function deleteCasTrajno(id) {
  const cas = DB.casovi.find(c=>c.id===id);
  if (!cas) return;
  if (!confirm('🗑 TRAJNO obrisati čas?\n\n'+
    cas.predmet+' • '+getRazredName(cas.razredId)+'\n'+
    getDanName(cas.dan)+' u '+cas.vrijeme+'\n\n'+
    '⚠ Ovo će obrisati čas iz rasporeda zauvijek!\n'+
    '(Lekcije i ocjene NE BUDE obrisane, ostaju u dnevniku)')) return;
  deleteCas(id);
}

// Otkazivanje časa za određeni datum (npr. čas otpada zbog praznika ili bolesti nastavnika)
function otkaziCas(casId, datum) {
  const cas = DB.casovi.find(c=>c.id===casId);
  if (!cas) return;
  const postojeci = DB.otkazani && DB.otkazani.find(o=>o.casId===casId && o.datum===datum);
  if (postojeci) {
    if (confirm('Vratiti čas (poništiti otkazivanje)?')) {
      DB.otkazani = DB.otkazani.filter(o=>!(o.casId===casId && o.datum===datum));
      saveData(); closeModal(); navigate(currentView, viewState); showNotification('Čas vraćen');
    }
    return;
  }
  const razlog = prompt('Razlog otkazivanja časa '+cas.predmet+' ('+fmtDate(datum)+'):', 'Nastavnik odsutan');
  if (razlog === null) return;
  if (!DB.otkazani) DB.otkazani = [];
  DB.otkazani.push({ id:Date.now(), casId:casId, datum:datum, razlog:razlog||'Otkazan', otkazaoId:currentUser.id });
  // obavijesti
  DB.ucenici.filter(u=>u.razredId===cas.razredId).forEach(function(u){
    const usr = DB.users.find(x=>x.ucenikId===u.id);
    if (usr) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'❌ Čas OTKAZAN', tekst:cas.predmet+' ('+fmtDate(datum)+'): '+(razlog||'Otkazan'), datum:todayISO(), za:null, zaId:usr.id });
  });
  if (cas.nastavnikId) {
    DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'❌ Čas otkazan', tekst:cas.predmet+' - '+getRazredName(cas.razredId)+' ('+fmtDate(datum)+')', datum:todayISO(), za:null, zaId:cas.nastavnikId });
  }
  saveData(); closeModal(); navigate(currentView, viewState); showNotification('Čas otkazan i svi obaviješteni');
}

// Zamjena nastavnika za određeni čas/datum (npr. zamjena zbog odsustva)
function zamijeniNastavnika(casId, datum) {
  const cas = DB.casovi.find(c=>c.id===casId);
  if (!cas) return;
  showModal('<h3 class="text-xl font-bold mb-4">🔄 Zamjena nastavnika</h3>'+
    '<p class="text-sm text-gray-600 mb-3">Čas: <b>'+escapeHtml(cas.predmet)+'</b> • '+getRazredName(cas.razredId)+' • '+fmtDate(datum)+' u '+cas.vrijeme+'</p>'+
    '<p class="text-sm text-gray-600 mb-4">Trenutni nastavnik: <b>'+escapeHtml(getNastavnikName(cas.nastavnikId))+'</b></p>'+
    '<form id="zf" class="space-y-3">'+
    '<div><label class="text-sm font-medium block mb-1">Zamjenski nastavnik *</label>'+
    '<select name="nastId" required class="w-full px-3 py-2 border rounded-lg">'+
    DB.users.filter(u=>u.role==='nastavnik' && u.id!==cas.nastavnikId).map(n=>'<option value="'+n.id+'">'+n.name+'</option>').join('')+
    '</select></div>'+
    '<div><label class="text-sm font-medium block mb-1">Napomena</label><input name="napomena" class="w-full px-3 py-2 border rounded-lg" placeholder="npr. Bolest..."></div>'+
    '<div class="flex justify-end gap-2 pt-4 border-t"><button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button><button type="submit" class="btn-primary px-4 py-2 rounded-lg">Sačuvaj zamjenu</button></div>'+
    '</form>');
  document.getElementById('zf').onsubmit = function(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const zamId = +fd.get('nastId');
    if (!DB.zamjene) DB.zamjene = [];
    // ako vec postoji - update
    const ex = DB.zamjene.find(z=>z.casId===casId && z.datum===datum);
    if (ex) { ex.zamjenskiId = zamId; ex.napomena = fd.get('napomena'); }
    else DB.zamjene.push({ id:Date.now(), casId:casId, datum:datum, zamjenskiId:zamId, napomena:fd.get('napomena'), postavioId:currentUser.id });
    // obavijesti
    DB.obavijesti.push({ id:Date.now()+1, naslov:'🔄 Zamjena - dodijeljen vam čas', tekst:cas.predmet+' - '+getRazredName(cas.razredId)+' ('+fmtDate(datum)+' u '+cas.vrijeme+')', datum:todayISO(), za:null, zaId:zamId });
    DB.obavijesti.push({ id:Date.now()+2, naslov:'🔄 Vaš čas drži zamjena', tekst:cas.predmet+' ('+fmtDate(datum)+')', datum:todayISO(), za:null, zaId:cas.nastavnikId });
    DB.ucenici.filter(u=>u.razredId===cas.razredId).forEach(function(u){
      const usr = DB.users.find(x=>x.ucenikId===u.id);
      if (usr) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'🔄 Zamjena na času', tekst:cas.predmet+' ('+fmtDate(datum)+'): zamjenski nastavnik '+(DB.users.find(x=>x.id===zamId)||{}).name, datum:todayISO(), za:null, zaId:usr.id });
    });
    saveData(); closeModal(); navigate(currentView, viewState); showNotification('Zamjena postavljena!');
  };
}

// Renderuje samo prikaz zaključne (bez klika za zaključavanje - to ide u Ocjene)
function renderZakljucnaSamoPrikaz(ucenikId, predmet) {
  const sem = getCurrentSemester();
  const z = DB.ocjene.find(o=>o.ucenikId===ucenikId && o.predmet===predmet && o.zakljucna && o.semestar===sem);
  if (z) { const cls = z.vrijednost==='NPS'?'ocjena-NPS':'ocjena-'+z.vrijednost; return '<span class="ocjena-chip '+cls+'" style="cursor:default;font-size:1rem;width:36px;height:36px">'+z.vrijednost+'</span>'; }
  const akt = DB.ocjene.filter(o=>o.ucenikId===ucenikId && o.predmet===predmet && !o.zamjenjeno && !o.zakljucna && o.semestar===sem && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  if (!akt.length) return '<span class="text-gray-300">-</span>';
  const avg = (akt.reduce((a,b)=>a+b,0)/akt.length).toFixed(1);
  return '<span class="text-gray-500 text-sm" title="prijedlog">~'+avg+'</span>';
}

function openLekcijaModal(razredId, predmet, datum) {
  const ex = DB.lekcije.find(l=>l.razredId===razredId && l.predmet===predmet && l.datum===datum);
  // prošle lekcije iz istog predmeta i razreda (bez današnje)
  const prosle = DB.lekcije.filter(l=>l.razredId===razredId && l.predmet===predmet && l.datum!==datum)
    .sort((a,b)=>b.datum.localeCompare(a.datum));
  // plan i program za ovaj predmet/razred
  const ppKey = razredId+'_'+predmet;
  const planProgram = (DB.planProgram && DB.planProgram[ppKey]) || [];
  const tipovi = ['Obrada novog gradiva','Ponavljanje','Vježba','Provjera','Pismeni rad','Usmeno ispitivanje','Praktični rad'];
  const exTip = ex && ex.tip ? ex.tip : 'Obrada novog gradiva';
  
  showModal('<h3 class="text-xl font-bold mb-1">'+(ex?'✎ Uredi lekciju':'➕ Dodaj lekciju')+'</h3>'+
    '<p class="text-sm text-gray-500 mb-4">'+escapeHtml(predmet)+' • '+escapeHtml(getRazredName(razredId))+' • '+fmtDate(datum)+'</p>'+
    
    // BRZE AKCIJE - kopiraj iz prošle
    (prosle.length ? '<div class="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-4">'+
      '<label class="text-xs font-bold text-blue-900 mb-2 block">⚡ BRZE AKCIJE</label>'+
      '<div class="flex flex-wrap gap-2">'+
      '<button type="button" onclick="kopirajIzProsle('+razredId+',\''+escapeHtml(predmet)+'\',\''+datum+'\',\'last\')" class="btn-secondary px-3 py-1.5 rounded text-sm flex items-center gap-1">📋 Kopiraj zadnju ('+escapeHtml(prosle[0].naslov.substring(0,30))+(prosle[0].naslov.length>30?'...':'')+')</button>'+
      '<button type="button" onclick="kopirajIzProsle('+razredId+',\''+escapeHtml(predmet)+'\',\''+datum+'\',\'nastavak\')" class="btn-secondary px-3 py-1.5 rounded text-sm flex items-center gap-1">↪ Nastavak prošle</button>'+
      '<button type="button" onclick="kopirajIzProsle('+razredId+',\''+escapeHtml(predmet)+'\',\''+datum+'\',\'ponavljanje\')" class="btn-secondary px-3 py-1.5 rounded text-sm flex items-center gap-1">🔄 Ponavljanje zadnje</button>'+
      '</div></div>' : '')+
    
    '<form id="lf" class="space-y-3">'+

    // TIP ČASA

    '<select name="tip" id="tipLekcije" class="w-full px-3 py-2 border rounded-lg">'+
    tipovi.map(t=>'<option'+(t===exTip?' selected':'')+'>'+t+'</option>').join('')+
    '</select></div>'+
    
    // NASLOV
    '<div><label class="text-sm font-medium block mb-1">Naslov *</label>'+
    '<input name="naslov" id="naslovInput" value="'+escapeHtml(ex?ex.naslov:'')+'" required class="w-full px-3 py-2 border rounded-lg" placeholder="npr. Sabiranje i oduzimanje do 100"></div>'+
    
    // OPIS
    '<div><label class="text-sm font-medium block mb-1">Opis / sadržaj časa</label>'+
    '<textarea name="opis" id="opisInput" class="w-full px-3 py-2 border rounded-lg h-32" placeholder="Šta će se obrađivati...">'+escapeHtml(ex?(ex.opis||''):'')+'</textarea></div>'+
    
    // OZNAKA - ostvarena/aktivnost
    '<label class="flex items-center gap-2 p-2 bg-gray-50 rounded cursor-pointer">'+
    '<input type="checkbox" name="ostvarena" '+(ex&&ex.ostvarena!==false?'checked':(!ex?'checked':''))+' class="w-4 h-4">'+
    '<span class="text-sm">✓ Lekcija je ostvarena (predavanje održano)</span></label>'+
    
    '<div class="flex justify-between gap-2 pt-4 border-t">'+
    (ex?'<button type="button" onclick="obrisiLekciju('+ex.id+')" class="btn-danger px-3 py-2 rounded-lg text-sm">🗑 Obriši</button>':'<div></div>')+
    '<div class="flex gap-2">'+
    '<button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>'+
    '<button type="submit" class="btn-primary px-4 py-2 rounded-lg">Sačuvaj</button>'+
    '</div></div>'+
    '</form>');
  document.getElementById('lf').onsubmit = function(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = { naslov:fd.get('naslov'), opis:fd.get('opis'), tip:fd.get('tip'), ostvarena:fd.get('ostvarena')==='on' };
    if (ex) { Object.assign(ex, data); }
    else DB.lekcije.push(Object.assign({ id: Date.now(), razredId:razredId, predmet:predmet, datum:datum, nastavnikId:currentUser.id }, data));
    saveData(); closeModal(); navigate('dnevnik'); showNotification('Lekcija sačuvana!');
  };
}

// Učitaj prošlu lekciju u formu
function ucitajProslu(lekcijaId, razredId, predmet) {
  if (!lekcijaId) return;
  const l = DB.lekcije.find(x=>x.id===+lekcijaId);
  if (!l) return;
  document.getElementById('naslovInput').value = l.naslov || '';
  document.getElementById('opisInput').value = l.opis || '';
  if (l.tip) document.getElementById('tipLekcije').value = l.tip;
  showNotification('Lekcija učitana - možeš urediti prije spremanja');
}

// Učitaj iz plana i programa
function ucitajIzPP(idx, ppKey) {
  if (idx==='') return;
  const pp = DB.planProgram[ppKey][+idx];
  if (!pp) return;
  document.getElementById('naslovInput').value = pp.naziv || '';
  if (pp.opis) document.getElementById('opisInput').value = pp.opis;
  showNotification('Učitano iz plana i programa');
}

// Brze akcije
function kopirajIzProsle(razredId, predmet, datum, tip) {
  const prosle = DB.lekcije.filter(l=>l.razredId===razredId && l.predmet===predmet && l.datum!==datum)
    .sort((a,b)=>b.datum.localeCompare(a.datum));
  if (!prosle.length) return;
  const l = prosle[0];
  if (tip==='last') {
    document.getElementById('naslovInput').value = l.naslov || '';
    document.getElementById('opisInput').value = l.opis || '';
    if (l.tip) document.getElementById('tipLekcije').value = l.tip;
    showNotification('Kopirana zadnja lekcija');
  } else if (tip==='nastavak') {
    document.getElementById('naslovInput').value = (l.naslov || '') + ' - nastavak';
    document.getElementById('opisInput').value = 'Nastavak prošlog časa ('+fmtDate(l.datum)+'):\n'+(l.naslov||'')+'\n\n';
    document.getElementById('tipLekcije').value = 'Obrada novog gradiva';
    showNotification('Postavljen nastavak prošle lekcije');
  } else if (tip==='ponavljanje') {
    document.getElementById('naslovInput').value = 'Ponavljanje: ' + (l.naslov || '');
    document.getElementById('opisInput').value = 'Ponavljanje gradiva sa časa '+fmtDate(l.datum)+':\n'+(l.opis||l.naslov||'');
    document.getElementById('tipLekcije').value = 'Ponavljanje';
    showNotification('Postavljeno ponavljanje');
  }
}

function obrisiLekciju(id) {
  if (!confirm('🗑 Obrisati ovu lekciju?')) return;
  DB.lekcije = DB.lekcije.filter(l=>l.id!==id);
  saveData(); closeModal(); navigate('dnevnik'); showNotification('Lekcija obrisana');
}

// Brzo dodavanje lekcije - kopira iz odabrane prošle
function brzoDodajLekciju(razredId, predmet, datum, lekcijaId) {
  predmet = decodeURIComponent(predmet);
  openLekcijaModal(razredId, predmet, datum);
  // čekamo da se modal otvori, pa onda popuni
  setTimeout(function(){
    const sel = document.getElementById('proslaSelect');
    if (sel) {
      sel.value = lekcijaId;
      ucitajProslu(lekcijaId, razredId, predmet);
    }
  }, 100);
}

function setPrisustvo(ucenikId, predmet, datum, status, selectEl) {
  let p = DB.prisustva.find(x=>x.ucenikId===ucenikId && x.predmet===predmet && x.datum===datum);
  let kasnjenjeMin = null;
  if (status==='K') {
    const min = prompt('Koliko minuta zakasnio?', '5');
    if (min===null) { if (selectEl) selectEl.value = p?p.status:'P'; return; }
    kasnjenjeMin = parseInt(min)||5;
  }
  if (p) { p.status = status; p.kasnjenjeMin = kasnjenjeMin; }
  else DB.prisustva.push({ id: Date.now(), ucenikId:ucenikId, predmet:predmet, datum:datum, status:status, kasnjenjeMin:kasnjenjeMin });
  const ucUser = DB.users.find(u=>u.ucenikId===ucenikId);
  if (ucUser && (status==='O' || status==='K')) {
    DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:status==='K'?'⏰ Kašnjenje':'❌ Izostanak', tekst:status==='K'?'Zakasnili '+kasnjenjeMin+' min na času '+predmet:'Izostanak sa časa '+predmet, datum:todayISO(), za:null, zaId:ucUser.id });
  }
  saveData();
  if (selectEl) { selectEl.className = selectEl.className.replace(/status-[PKOI]/g,'')+' status-'+status; }
}

function renderOcjeneCol(ucenikId, predmet, tip, datum, locked) {
  const sve = DB.ocjene.filter(o=>o.ucenikId===ucenikId && o.predmet===predmet && o.tip===tip && !o.zakljucna).sort((a,b)=>a.datum.localeCompare(b.datum));
  let html = '<div class="flex flex-wrap items-center justify-center gap-0.5">';
  sve.forEach(function(o){
    const cls = o.vrijednost==='NPS'?'ocjena-NPS':'ocjena-'+o.vrijednost;
    if (o.zamjenjeno) html += '<span class="ocjena-chip ocjena-old" title="Popravljena '+fmtDate(o.datum)+'">'+o.vrijednost+'</span>';
    else html += '<span class="ocjena-chip '+cls+'" title="'+fmtDate(o.datum)+' - klik za brisanje" onclick="'+(locked?'':'obrisiOcjenu('+o.id+')')+'">'+o.vrijednost+'</span>';
  });
  if (!locked) html += '<button onclick="dodajOcjenu('+ucenikId+',\''+predmet+'\',\''+tip+'\',\''+datum+'\')" class="add-grade-btn" title="Dodaj">+</button>';
  html += '</div>';
  return html;
}

function dodajOcjenu(ucenikId, predmet, tip, datum) {
  const u = DB.ucenici.find(x=>x.id===ucenikId);
  const sve = DB.ocjene.filter(o=>o.ucenikId===ucenikId && o.predmet===predmet && o.tip===tip && !o.zamjenjeno && !o.zakljucna);
  let html = '<h3 class="text-lg font-bold mb-2">Dodaj ocjenu ('+tip+')</h3>'+
    '<p class="text-sm text-gray-600 mb-4">Učenik: <b>'+escapeHtml(u.prezime+' '+u.ime)+'</b></p>';
  if (sve.length) {
    html += '<div class="mb-4 p-3 bg-gray-50 rounded-lg">'+
      '<div class="text-xs text-gray-600 mb-2">Postojeće ocjene:</div>'+
      '<div>'+sve.map(o=>'<span class="ocjena-chip ocjena-'+o.vrijednost+'" style="cursor:default">'+o.vrijednost+'</span>').join('')+'</div>'+
      '<label class="flex items-center gap-2 mt-3"><input type="checkbox" id="popravlja" onchange="document.getElementById(\'zamjenjujeId\').classList.toggle(\'hidden\',!this.checked)"> <span class="text-sm">Ovo je <b>popravljena ocjena</b></span></label>'+
      '<select id="zamjenjujeId" class="w-full px-3 py-2 border rounded-lg mt-2 hidden">'+sve.map(o=>'<option value="'+o.id+'">Zamjeni: '+o.vrijednost+' ('+fmtDate(o.datum)+')</option>').join('')+'</select>'+

  }

    '<div class="grid grid-cols-5 gap-2 mb-2">'+
    [1,2,3,4,5].map(v=>'<button onclick="potvrdiOcjenu('+ucenikId+',\''+predmet+'\',\''+tip+'\',\''+datum+'\','+v+')" class="ocjena-chip ocjena-'+v+'" style="height:60px;font-size:1.8rem">'+v+'</button>').join('')+
    '</div>'+
    '<button onclick="potvrdiOcjenu('+ucenikId+',\''+predmet+'\',\''+tip+'\',\''+datum+'\',\'NPS\')" class="ocjena-chip ocjena-NPS w-full" style="height:42px">NPS - Nije pristupio</button>'+
    '<div class="flex justify-end mt-4"><button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button></div>';
  showModal(html);
}

function potvrdiOcjenu(ucenikId, predmet, tip, datum, vrijednost) {
  // SIGURNOSNA PROVJERA - semestar otvoren?
  const sem = getCurrentSemester();
  if (isSemesterZatvoren(sem)) {
    const semInfo = getSemesterInfo(sem);
    showNotification('🔒 '+(semInfo?semInfo.naziv:'Semestar '+sem)+' je ZATVOREN. Admin mora otvoriti semestar.', 'error');
    closeModal();
    return;
  }
  const pop = document.getElementById('popravlja');
  let zam = null;
  if (pop && pop.checked) {
    zam = +document.getElementById('zamjenjujeId').value;
    const stara = DB.ocjene.find(o=>o.id===zam);
    if (stara) stara.zamjenjeno = true;
  }
  DB.ocjene.push({ id:Date.now(), ucenikId:ucenikId, predmet:predmet, tip:tip, vrijednost:vrijednost, datum:datum, semestar:sem, nastavnikId:currentUser.id, zamjenjuje:zam, zamjenjeno:false, zakljucna:false });
  const ucUser = DB.users.find(u=>u.ucenikId===ucenikId);
  if (ucUser) DB.obavijesti.push({ id:Date.now()+1, naslov:'Nova ocjena', tekst:'Dobili ocjenu '+vrijednost+' iz '+predmet, datum:todayISO(), za:null, zaId:ucUser.id });
  saveData(); closeModal();
  navigate(currentView, viewState);
  showNotification('Ocjena '+vrijednost+' dodana!');
}
function obrisiOcjenu(id) {
  if (!confirm('Obrisati ocjenu?')) return;
  const o = DB.ocjene.find(x=>x.id===id);
  if (o && o.zamjenjuje) { const s = DB.ocjene.find(x=>x.id===o.zamjenjuje); if (s) s.zamjenjeno = false; }
  DB.ocjene = DB.ocjene.filter(x=>x.id!==id);
  saveData(); navigate(currentView, viewState);
}

function renderZakljucna(ucenikId, predmet) {
  const sem = getCurrentSemester();
  const z = DB.ocjene.find(o=>o.ucenikId===ucenikId && o.predmet===predmet && o.zakljucna && o.semestar===sem);
  if (z) { const cls = z.vrijednost==='NPS'?'ocjena-NPS':'ocjena-'+z.vrijednost; return '<span class="ocjena-chip '+cls+'" style="cursor:pointer" onclick="zakljuciJednog('+ucenikId+',\''+predmet+'\')">'+z.vrijednost+'</span>'; }
  const akt = DB.ocjene.filter(o=>o.ucenikId===ucenikId && o.predmet===predmet && !o.zamjenjeno && !o.zakljucna && o.semestar===sem && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  if (!akt.length) return '<button onclick="zakljuciJednog('+ucenikId+',\''+predmet+'\')" class="text-gray-400 hover:text-blue-600 text-sm">+ zakl.</button>';
  const avg = (akt.reduce((a,b)=>a+b,0)/akt.length).toFixed(1);
  return '<span onclick="zakljuciJednog('+ucenikId+',\''+predmet+'\')" class="text-gray-500 text-sm cursor-pointer hover:text-blue-700">~'+avg+'</span>';
}
function zakljuciJednog(ucenikId, predmet) {
  const sem = getCurrentSemester();
  const u = DB.ucenici.find(x=>x.id===ucenikId);
  const akt = DB.ocjene.filter(o=>o.ucenikId===ucenikId && o.predmet===predmet && !o.zamjenjeno && !o.zakljucna && o.semestar===sem && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  const prijedlog = akt.length ? Math.round(akt.reduce((a,b)=>a+b,0)/akt.length) : 0;
  showModal('<h3 class="text-xl font-bold mb-2">Zaključna ocjena</h3>'+
    '<p class="text-sm text-gray-600 mb-4">'+escapeHtml(u.prezime+' '+u.ime)+' • '+predmet+' • Sem. '+sem+'</p>'+
    (akt.length?'<div class="mb-3 p-3 bg-blue-50 rounded-lg text-sm">Ocjene: '+akt.join(', ')+' → Prijedlog: <b class="text-blue-700">'+prijedlog+'</b></div>':'<div class="text-sm text-gray-500 mb-3">Nema aktivnih ocjena.</div>')+
    '<div class="grid grid-cols-5 gap-2 mb-2">'+[1,2,3,4,5].map(v=>'<button onclick="postaviZakljucnu('+ucenikId+',\''+predmet+'\','+v+')" class="ocjena-chip ocjena-'+v+(v===prijedlog?' ring-2 ring-blue-500':'')+'" style="height:55px;font-size:1.6rem">'+v+'</button>').join('')+'</div>'+
    '<button onclick="postaviZakljucnu('+ucenikId+',\''+predmet+'\',\'NPS\')" class="ocjena-chip ocjena-NPS w-full" style="height:40px">NPS</button>'+
    '<div class="flex justify-end mt-4 pt-3 border-t"><button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button></div>');
}
function postaviZakljucnu(ucenikId, predmet, vrijednost) {
  const sem = getCurrentSemester();
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===ucenikId && o.predmet===predmet && o.zakljucna && o.semestar===sem));
  DB.ocjene.push({ id:Date.now(), ucenikId:ucenikId, predmet:predmet, tip:'zakljucna', vrijednost:vrijednost, datum:todayISO(), semestar:sem, nastavnikId:currentUser.id, zakljucna:true, zamjenjeno:false });
  saveData(); closeModal(); navigate(currentView, viewState); showNotification('Zaključna upisana!');
}
function zakljucniSemestarBtn(razredId, predmet) {
  const sem = getCurrentSemester();
  if (isSemesterLocked(razredId, predmet, sem)) {
    if (confirm('🔓 Otključati semestar '+sem+'? \n\nZaključne ocjene će ostati upisane, ali ćete moći mijenjati postojeće i unositi nove.')) {
      DB.zakljucniSemestri = DB.zakljucniSemestri.filter(z=>!(z.razredId===razredId && z.predmet===predmet && z.semestar===sem));
      saveData(); navigate(currentView, viewState); showNotification('Semestar otključan');
    }
    return;
  }
  // Zaključaj semestar - svi učenici moraju već imati zaključnu
  const ucenici = DB.ucenici.filter(u=>u.razredId===razredId);
  const bezZakljucne = ucenici.filter(u=>!DB.ocjene.find(o=>o.ucenikId===u.id && o.predmet===predmet && o.zakljucna && o.semestar===sem));
  if (bezZakljucne.length) {
    showNotification('Nije moguće zaključati - '+bezZakljucne.length+' učenika nema zaključnu', 'error');
    return;
  }
  if (!confirm('🔒 Zaključati semestar '+sem+' za '+predmet+'? \n\nNakon zaključavanja, ocjene će biti zaključane (može se kasnije otključati).')) return;
  DB.zakljucniSemestri.push({ razredId:razredId, predmet:predmet, semestar:sem, datum:todayISO() });
  saveData(); navigate(currentView, viewState); showNotification('🔒 Semestar zaključan!');
}

// ============= eSVESKA (text editor sa formatiranjem) =============
RENDERERS.esveska = function(c, state) {
  state = state || {};
  if (!DB.sveske) DB.sveske = {};
  const userId = currentUser.id;
  if (!DB.sveske[userId]) DB.sveske[userId] = [];
  const moje = DB.sveske[userId];
  
  // Ako je odabrana stranica - prikaži editor
  if (state.svId) return renderSveskaEditor(c, state.svId);
  
  const filter = document.getElementById('svFilter')?.value || '';
  const tag = document.getElementById('svTag')?.value || '';
  let list = moje.slice();
  if (filter) list = list.filter(s=>s.naslov.toLowerCase().indexOf(filter.toLowerCase())>=0 || (s.sadrzaj||'').toLowerCase().indexOf(filter.toLowerCase())>=0);
  if (tag) list = list.filter(s=>(s.tagovi||[]).indexOf(tag)>=0);
  list.sort((a,b)=>(b.izmijenjeno||b.datum||'').localeCompare(a.izmijenjeno||a.datum||''));
  
  // sve tagove iz svih bilježaka
  const sviTagovi = [];
  moje.forEach(s=>{ (s.tagovi||[]).forEach(t=>{ if (sviTagovi.indexOf(t)<0) sviTagovi.push(t); }); });
  
  c.innerHTML = '<div class="flex flex-wrap justify-between items-center gap-3 mb-4">'+

    '<button onclick="novaSveska()" class="btn-primary px-5 py-2.5 rounded-lg font-semibold flex items-center gap-2"><span class="text-xl">+</span> Nova bilježnica</button>'+

    '<div class="flex flex-wrap gap-2 mb-4 bg-white p-3 rounded-xl border">'+

    '<span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>'+
    '</div>'+
    (sviTagovi.length?'<select id="svTag" onchange="navigate(\'esveska\')" class="px-3 py-2 border rounded-lg">'+

    '</div>';
  
  if (!list.length) {

      (filter||tag?'<p>Nema bilježnica koje odgovaraju filteru.</p>':'<p class="mb-3">Još nemate bilježnica!</p><button onclick="novaSveska()" class="btn-primary px-5 py-2.5 rounded-lg font-semibold">+ Kreiraj prvu bilježnicu</button>')+'</div>';
  } else {
    c.innerHTML += '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">'+
      list.map(function(s){
        const tekst = (s.sadrzaj||'').replace(/<[^>]*>/g,'').substring(0,100);

          '<button onclick="event.stopPropagation();obrisiSvesku('+s.id+')" class="bg-white/70 hover:bg-red-100 hover:text-red-700 w-7 h-7 rounded text-sm" title="Obriši">🗑</button>'+
          '</div>'+
          '<div class="text-4xl mb-2">📖</div>'+
          '<h3 class="font-bold text-lg text-gray-900 mb-1 pr-8">'+escapeHtml(s.naslov||'Bez naslova')+'</h3>'+
          (s.tagovi&&s.tagovi.length?'<div class="flex flex-wrap gap-1 mb-2">'+s.tagovi.map(t=>'<span class="badge bg-white/70 text-gray-700 text-[10px]">#'+escapeHtml(t)+'</span>').join('')+'</div>':'')+
          '<p class="text-sm text-gray-700 line-clamp-3 italic mb-3">'+(tekst?escapeHtml(tekst)+(tekst.length>=100?'...':''):'<span class="opacity-60">prazna bilježnica</span>')+'</p>'+
          '<div class="text-xs text-gray-600 pt-2 border-t border-white/50">📅 '+(s.izmijenjeno?'Izmijenjeno: '+fmtDateTime(s.izmijenjeno):'Kreirano: '+fmtDate(s.datum))+'</div>'+
          '</div>';
      }).join('')+
      '</div>';
  }
};

function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+'. '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function novaSveska() {
  showModal('<h3 class="text-xl font-bold mb-4">📓 Nova bilježnica</h3>'+
    '<form id="nsf" class="space-y-3">'+
    '<div><label class="text-sm font-medium block mb-1">Naslov *</label>'+
    '<input name="naslov" required class="w-full px-3 py-2 border rounded-lg" placeholder="npr. Bilješke iz matematike" autofocus></div>'+
    '<div><label class="text-sm font-medium block mb-1">Boja korice</label>'+
    '<div class="grid grid-cols-6 gap-2">'+
    ['zuta','plava','roze','zelena','narandzasta','ljubicasta'].map(function(b,i){
      return '<label class="cursor-pointer"><input type="radio" name="boja" value="'+b+'" '+(i===0?'checked':'')+' class="sr-only peer">'+
        '<div class="sveska-color-'+b+' border-2 rounded-lg p-3 text-center peer-checked:ring-4 peer-checked:ring-blue-500"><div class="text-2xl">📖</div></div></label>';
    }).join('')+
    '</div></div>'+
    '<div><label class="text-sm font-medium block mb-1">Tagovi (odvojeno zarezom)</label>'+
    '<input name="tagovi" class="w-full px-3 py-2 border rounded-lg" placeholder="npr. matematika, vježbe, II semestar"></div>'+
    '<div class="flex justify-end gap-2 pt-4 border-t">'+
    '<button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>'+
    '<button type="submit" class="btn-primary px-4 py-2 rounded-lg">Kreiraj i otvori</button>'+
    '</div></form>');
  document.getElementById('nsf').onsubmit = function(e){
    e.preventDefault();
    const fd = new FormData(e.target);
    const tagovi = fd.get('tagovi').split(',').map(t=>t.trim()).filter(Boolean);
    if (!DB.sveske[currentUser.id]) DB.sveske[currentUser.id] = [];
    const nova = {
      id: Date.now(),
      naslov: fd.get('naslov'),
      boja: fd.get('boja'),
      tagovi: tagovi,
      sadrzaj: '',
      datum: new Date().toISOString(),
      izmijenjeno: null
    };
    DB.sveske[currentUser.id].push(nova);
    saveData(); closeModal();
    navigate('esveska', { svId: nova.id });
    showNotification('📓 Bilježnica kreirana!');
  };
}

function obrisiSvesku(id) {
  if (!confirm('🗑 Obrisati bilježnicu i sav njen sadržaj?')) return;
  DB.sveske[currentUser.id] = (DB.sveske[currentUser.id]||[]).filter(s=>s.id!==id);
  saveData(); navigate('esveska'); showNotification('Bilježnica obrisana');
}

// execCommand wrapper
let sveskaSaveTimer = null;
function execCmd(cmd, val) {
  document.execCommand(cmd, false, val);
  document.getElementById('svEditor')?.focus();
}

function onSveskaEdit(svId) {
  const ed = document.getElementById('svEditor');
  if (!ed) return;
  const status = document.getElementById('svSaveStatus');
  if (status) status.textContent = '⟳ Pisanje...';
  if (sveskaSaveTimer) clearTimeout(sveskaSaveTimer);
  sveskaSaveTimer = setTimeout(function(){
    const s = (DB.sveske[currentUser.id]||[]).find(x=>x.id===svId);
    if (!s) return;
    s.sadrzaj = ed.innerHTML;
    s.izmijenjeno = new Date().toISOString();
    saveData();
    if (status) status.textContent = '✓ Sačuvano automatski';
  }, 600);
}

function updateSvNaslov(svId, naslov) {
  const s = (DB.sveske[currentUser.id]||[]).find(x=>x.id===svId);
  if (!s) return;
  s.naslov = naslov;
  s.izmijenjeno = new Date().toISOString();
  saveData();
}
function updateSvBoja(svId, boja) {
  const s = (DB.sveske[currentUser.id]||[]).find(x=>x.id===svId);
  if (!s) return;
  s.boja = boja;
  saveData();
}

function urediTagove(svId) {
  const s = (DB.sveske[currentUser.id]||[]).find(x=>x.id===svId);
  if (!s) return;
  const novi = prompt('Tagovi (odvojeno zarezom):', (s.tagovi||[]).join(', '));
  if (novi === null) return;
  s.tagovi = novi.split(',').map(t=>t.trim()).filter(Boolean);
  saveData();
  navigate('esveska', {svId:svId});
}

function insertEmoji() {
  const emoji = prompt('Emoji za umetnuti:', '😊');
  if (emoji) execCmd('insertText', emoji);
}
function insertLink() {
  const url = prompt('URL link:', 'https://');
  if (url) execCmd('createLink', url);
}
function insertHr() {
  execCmd('insertHorizontalRule');
}

function izvozSveskaPdf(svId) {
  const s = (DB.sveske[currentUser.id]||[]).find(x=>x.id===svId);
  if (!s) return;
  const w = window.open('', '_blank');
  w.document.write('<html><head><title>'+escapeHtml(s.naslov)+'</title>'+
    '<style>body{font-family:Georgia,serif;padding:40px;line-height:1.6;color:#1e3a8a;}h1{border-bottom:2px solid #1e40af;padding-bottom:10px;}</style></head>'+
    '<body><h1>'+escapeHtml(s.naslov)+'</h1>'+
    '<p style="color:#666;font-size:12px">'+fmtDateTime(s.datum)+(s.tagovi&&s.tagovi.length?' • #'+s.tagovi.join(' #'):'')+'</p>'+
    '<hr>'+s.sadrzaj+'</body></html>');
  setTimeout(()=>w.print(), 500);
}

function setBzOznaka(ucenikId, oznaka) {
  let z = window._trenutnaBz;
  if (!z) return;
  if (!z.oznake) z.oznake = {};
  if (z.oznake[ucenikId] === oznaka) z.oznake[ucenikId] = ''; // toggle
  else z.oznake[ucenikId] = oznaka;
  // ako ne postoji u DB - dodaj
  if (!DB.biljezniceProf.find(b=>b.id===z.id)) DB.biljezniceProf.push(z);
  saveData();
  navigate('biljeznica');
}

function setBzNapomena(ucenikId, napomena) {
  let z = window._trenutnaBz;
  if (!z) return;
  if (!z.napomene) z.napomene = {};
  z.napomene[ucenikId] = napomena;
  if (!DB.biljezniceProf.find(b=>b.id===z.id)) DB.biljezniceProf.push(z);

}

function setBzOpis(opis) {

function pregledBiljeznice() {
  const moje = DB.biljezniceProf.filter(b=>b.nastavnikId===currentUser.id)
    .filter(b=>Object.keys(b.oznake||{}).length || (b.opis&&b.opis.length))
    .sort((a,b)=>b.datum.localeCompare(a.datum));
  if (!moje.length) { showNotification('Nemate još bilježaka','info'); return; }
  let html = '<h3 class="text-xl font-bold mb-3">📚 Sve moje bilježnice</h3>'+
    '<div class="space-y-2 max-h-96 overflow-y-auto">';
  moje.forEach(function(b){
    const brOzn = Object.keys(b.oznake||{}).length;
    html += '<div onclick="otvoriBz('+b.razredId+',\''+escapeHtml(b.predmet).replace(/\x27/g,'%27')+'\',\''+b.datum+'\')" class="bg-white border rounded-lg p-3 hover:bg-blue-50 cursor-pointer flex justify-between items-center">'+
      '<div><b>'+escapeHtml(b.predmet)+'</b> • '+getRazredName(b.razredId)+'<div class="text-xs text-gray-500">'+fmtDate(b.datum)+(b.opis?' • '+escapeHtml(b.opis.substring(0,40))+(b.opis.length>40?'...':''):'')+'</div></div>'+
      '<div class="text-sm flex gap-1">'+
      (b.oznake?Object.values(b.oznake).filter(o=>o==='+').length:0)+'<span class="text-green-700">+</span> '+
      (b.oznake?Object.values(b.oznake).filter(o=>o==='-').length:0)+'<span class="text-red-700">−</span> '+
      (b.oznake?Object.values(b.oznake).filter(o=>o==='*').length:0)+'<span class="text-indigo-700">★</span>'+
      '</div></div>';
  });
  html += '</div><div class="flex justify-end mt-4"><button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Zatvori</button></div>';
  showModal(html);
}

function otvoriBz(razredId, predmet, datum) {
  predmet = decodeURIComponent(predmet);
  closeModal();
  // postavi i nazaj na biljeznica view
  setTimeout(function(){
    navigate('biljeznica');
    setTimeout(function(){
      document.getElementById('bzRazred').value = razredId;
      document.getElementById('bzPredmet').value = predmet;
      document.getElementById('bzDatum').value = datum;
      navigate('biljeznica');
    },50);
  },50);
}

function primijeniIzOcjene() {
  const z = window._trenutnaBz;
  if (!z) return;
  const sem = getCurrentSemester();
  if (isSemesterZatvoren(sem)) { 
    const si = getSemesterInfo(sem);
    showNotification('🔒 '+(si?si.naziv:'Semestar')+' je ZATVOREN','error'); return; 
  }
  const ucenici = DB.ucenici.filter(u=>u.razredId===z.razredId);
  let html = '<h3 class="text-xl font-bold mb-3">📊 Pretvori oznake u ocjene</h3>'+
    '<p class="text-sm text-gray-600 mb-3">Predmet: <b>'+escapeHtml(z.predmet)+'</b> • '+getRazredName(z.razredId)+' • '+fmtDate(z.datum)+'</p>'+
    '<div class="bg-blue-50 border border-blue-200 rounded p-3 mb-3 text-xs">'+
    '<b>ℹ️ Konverzija (možeš promijeniti):</b> ★ → 5 • + → 4 • ○ → 3 • − → 2'+
    '</div>'+
    '<div class="space-y-1 max-h-96 overflow-y-auto border rounded-lg p-2 bg-gray-50">';
  ucenici.forEach(function(u){
    const o = (z.oznake||{})[u.id];
    if (!o) return;
    const def = o==='*'?5:o==='+'?4:o==='o'?3:2;
    html += '<div class="bg-white border rounded p-2 flex items-center gap-2" data-uc="'+u.id+'">'+
      '<div class="flex-1">'+escapeHtml(u.prezime+' '+u.ime)+' <span class="text-sm text-gray-500">('+(o==='*'?'★':o==='+'?'+':o==='o'?'○':'−')+')</span></div>'+
      '<select class="bzOcj px-2 py-1 border rounded text-sm" data-uc="'+u.id+'">'+
      '<option value="">- ne -</option>'+
      [1,2,3,4,5].map(v=>'<option value="'+v+'"'+(v===def?' selected':'')+'>'+v+'</option>').join('')+
      '</select>'+
      '<select class="bzTip px-2 py-1 border rounded text-sm">'+
      '<option value="aktivnost">Aktivnost</option>'+
      '<option value="usmena">Usmena</option>'+
      '<option value="pismena">Pismena</option>'+
      '</select>'+
      '</div>';
  });
  if (!Object.keys(z.oznake||{}).filter(k=>z.oznake[k]).length) {
    html += '<div class="empty-state">Nema oznaka za pretvaranje</div>';
  }
  html += '</div>'+
    '<div class="flex justify-end gap-2 mt-4 pt-3 border-t">'+
    '<button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>'+
    '<button onclick="potvrdiPretvaranje()" class="btn-primary px-4 py-2 rounded-lg">📊 Upiši ocjene</button>'+
    '</div>';
  showModal(html);
}

function potvrdiPretvaranje() {
  const z = window._trenutnaBz;
  if (!z) return;
  const sem = getCurrentSemester();
  let brUpisanih = 0;
  document.querySelectorAll('.bzOcj').forEach(function(sel){
    const ucenikId = +sel.dataset.uc;
    const v = sel.value;
    if (!v) return;
    const tipSel = sel.parentElement.querySelector('.bzTip');
    const tip = tipSel ? tipSel.value : 'aktivnost';
    DB.ocjene.push({
      id: Date.now()+Math.random(),
      ucenikId: ucenikId,
      predmet: z.predmet,
      tip: tip,
      vrijednost: +v,
      datum: z.datum,
      semestar: sem,
      nastavnikId: currentUser.id,
      zamjenjuje: null, zamjenjeno: false, zakljucna: false,
      biljeska: 'Iz bilježnice'
    });
    brUpisanih++;
    // obavijesti učenika
    const usr = DB.users.find(u=>u.ucenikId===ucenikId);
    if (usr) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'⭐ Ocjena iz bilježnice', tekst:z.predmet+' ('+tip+'): '+v, datum:todayISO(), za:null, zaId:usr.id });
  });
  saveData(); closeModal();
  showNotification('✓ Upisano '+brUpisanih+' ocjena u dnevnik!');
}

// Upis ocjena za ispit - lista učenika sa input poljima
function upisOcjenaIspit(ispitId) {
  const isp = DB.ispitivanja.find(x=>x.id===ispitId);
  if (!isp) return;
  // sigurnosna provjera - semestar otvoren?
  const sem = getCurrentSemester();
  if (isSemesterZatvoren(sem)) {
    const semInfo = getSemesterInfo(sem);
    showNotification('🔒 '+(semInfo?semInfo.naziv:'Semestar')+' je ZATVOREN. Admin mora otvoriti.', 'error');
    return;
  }
  // ko se ispituje?
  const ucenici = isp.ucenikIds && isp.ucenikIds.length ? 
    isp.ucenikIds.map(id=>DB.ucenici.find(u=>u.id===id)).filter(Boolean) :
    DB.ucenici.filter(u=>u.razredId===isp.razredId);
  
  // tip ocjene od tipa ispita
  const tipOcjene = isp.tip==='pismeno' || isp.tip==='kontrolni' || isp.tip==='test' ? 'pismena' : isp.tip==='usmeno' ? 'usmena' : 'aktivnost';
  
  let html = '<h3 class="text-xl font-bold mb-1">📝 Upis ocjena</h3>'+

    '<b>ℹ️ Tip ocjene:</b> Automatski se upisuje kao <b>'+(tipOcjene==='pismena'?'PISMENA':tipOcjene==='usmena'?'USMENA':'AKTIVNOST')+'</b> u dnevnik'+
    '</div>'+
    '<div class="space-y-2 max-h-96 overflow-y-auto border rounded-lg p-2 bg-gray-50">';
  
  ucenici.forEach(function(u){
    const postOcj = DB.ocjene.find(o=>o.ucenikId===u.id && o.predmet===isp.predmet && o.ispitId===ispitId);
