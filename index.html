<style>
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f3f4f6; }
  .header-blue { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); }
  .sidebar-item.active { background: #eff6ff; color: #1e40af; border-left: 4px solid #1e40af; font-weight: 600; }
  .sidebar-item { border-left: 4px solid transparent; transition: all 0.15s; }
  .sidebar-item:hover { background: #f9fafb; }
  .tab-active { color: #1e40af; border-bottom: 2px solid #1e40af; font-weight: 600; }
  .tab-inactive { color: #6b7280; border-bottom: 2px solid transparent; }
  .tab-inactive:hover { color: #374151; }
  table { border-collapse: separate; border-spacing: 0; width: 100%; }
  table th { background: #f9fafb; color: #374151; font-weight: 600; font-size: 0.875rem; }
  table td, table th { border: 1px solid #e5e7eb; padding: 8px 12px; text-align: center; }
  table tbody tr { transition: background 0.1s; }
  table tbody tr:hover { background: #fafbfc; }
  .btn-primary { background: #1e40af; color: white; transition: all 0.15s; }
  .btn-primary:hover { background: #1e3a8a; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(30,64,175,0.25); }
  .btn-secondary { background: white; color: #374151; border: 1px solid #d1d5db; transition: all 0.15s; }
  .btn-secondary:hover { background: #f9fafb; border-color: #9ca3af; }
  .btn-success { background: #059669; color: white; transition: all 0.15s; }
  .btn-success:hover { background: #047857; transform: translateY(-1px); }
  .btn-danger { background: #dc2626; color: white; transition: all 0.15s; }
  .btn-danger:hover { background: #b91c1c; }
  input, select, textarea { outline: none; transition: all 0.15s; }

  .modal-bg { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); animation: fadeIn 0.2s; }

  .ocjena-old { text-decoration: line-through; opacity: 0.5; background: #fee2e2 !important; color: #991b1b !important; font-size: 0.7rem; min-width: 22px; height: 22px; cursor: default; }
  .ocjena-old:hover { transform: none; box-shadow: none; }
  .ocjena-1 { background: #fecaca; color: #7f1d1d; }
  .ocjena-2 { background: #fed7aa; color: #7c2d12; }
  .ocjena-3 { background: #fef08a; color: #713f12; }
  .ocjena-4 { background: #bbf7d0; color: #14532d; }
  .ocjena-5 { background: #86efac; color: #064e3b; }
  .ocjena-NPS { background: #e0e7ff; color: #3730a3; font-size: 0.7rem; padding: 0 6px; min-width: 38px; }
  .ispitivanje-card { border-left: 4px solid #dc2626; }

  .ispitivanje-usmeno { border-left-color: #ea580c; background: #fff7ed; }
  .ispitivanje-kontrolni { border-left-color: #ca8a04; background: #fefce8; }
  .ispitivanje-test { border-left-color: #2563eb; background: #eff6ff; }
  .redar-badge { display:inline-block; background:linear-gradient(135deg,#fbbf24,#f59e0b); color:white; padding:2px 10px; border-radius:12px; font-size:0.7rem; font-weight:700; }

  .stat-card { transition: all 0.2s; cursor: pointer; }
  .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
  .schedule-cell { min-height: 70px; vertical-align: middle; }
  .schedule-current { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%) !important; border: 2px solid #1e40af !important; }
  .schedule-soon { background: #fef3c7 !important; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  .login-input { padding-left: 44px; }
  .login-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
  .fade-in { animation: fadeInUp 0.3s ease-out; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media print {
    aside, header, .no-print { display: none !important; }
    main { padding: 0 !important; overflow: visible !important; }
    body { background: white; }

  /* ============== RESPONZIVNOST ============== */
  .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 35; }

  /* Table wrapper for horizontal scroll on mobile */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table-wrap table { min-width: 600px; }
  /* Automatski dodaj horizontalni scroll na sve table kontejnere */
  main .bg-white.border.rounded-xl.overflow-hidden { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  main .bg-white.border.rounded-xl.overflow-hidden > table { min-width: 500px; }
  /* Ako tabela nije u kontejneru s overflow-hidden, ipak budi skrolabilna */
  main > .bg-white > table, main > table { display: block; overflow-x: auto; }
  /* Canvas (Chart.js) ostaje responzivan */
  canvas { max-width: 100% !important; height: auto !important; }
  /* Sprječi širenje slika i pre-tagova */
  img, pre { max-width: 100%; }

  /* TABLET (do 1024px) */
  @media (max-width: 1024px) {
    main { padding: 1.25rem !important; }
    h2.text-3xl { font-size: 1.5rem !important; }
  }

  /* MOBILE (do 768px) */
  @media (max-width: 768px) {
    /* Sidebar postaje overlay */
    aside#sidebar {
      position: fixed !important;
      top: 56px;
      left: 0;
      bottom: 0;
      width: 260px;
      z-index: 40;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 4px 0 16px rgba(0,0,0,0.15);
    }
    aside#sidebar.open {
      transform: translateX(0);
    }
    aside#sidebar.open ~ .sidebar-backdrop,
    body.sidebar-open .sidebar-backdrop { display: block; }

    /* Header */
    header { padding: 0.5rem 0.75rem !important; }
    header h1 { font-size: 1rem !important; }
    #currentTime { display: none !important; }
    #userBadge { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.75rem !important; padding: 4px 10px !important; }

    /* Main content */
    main { padding: 1rem !important; }
    h2.text-3xl { font-size: 1.4rem !important; }
    h3.text-lg, h3.text-xl { font-size: 1rem !important; }

    /* Tabela - scroll horizontalno */
    main table { font-size: 0.8rem; min-width: 600px; }
    main table th, main table td { padding: 6px 8px !important; }

    /* Header dugmadi manji */
    .btn-primary, .btn-secondary, .btn-success, .btn-danger {
      padding: 0.5rem 0.8rem !important;
      font-size: 0.85rem;
    }

    /* Stat kartice na mobilnoj */
    .stat-card { padding: 0.75rem !important; }
    .stat-card .text-3xl { font-size: 1.5rem !important; }

    /* Modal */
    .modal-content { padding: 1rem !important; max-width: 95vw !important; }

    /* Notifikacije */
    .notification { left: 10px; right: 10px; max-width: none; top: 70px; }
    #notifPanel { width: calc(100vw - 20px) !important; left: 10px; right: 10px; }

    /* Login na mobilnoj */
    #loginScreen .max-w-md { padding: 1.5rem !important; }
    #loginScreen .text-3xl { font-size: 1.5rem !important; }

    /* Tabovi scrollable */
    .border-b .pb-3 { font-size: 0.85rem; padding-bottom: 8px !important; }

    /* Filteri stack */
    .flex.flex-wrap.gap-4, .flex.flex-wrap.gap-6 { gap: 0.75rem !important; }

    /* Ocjene chip manje */
    .ocjena-chip { min-width: 24px; height: 24px; font-size: 0.8rem; margin: 1px; }
    .add-grade-btn { width: 20px; height: 20px; font-size: 0.85rem; }

    /* Raspored - prikaži horizontalni scroll */
    .schedule-cell { min-height: 50px; padding: 4px !important; }
    .schedule-cell .text-sm { font-size: 0.7rem !important; }

    /* Skrij neke nepotrebne stvari na mobilnoj */
    .hide-mobile { display: none !important; }

    /* Grid kartice idu u jednu kolonu */
    .stat-card { font-size: 0.85rem; }

    /* Notif badge poziciju */
    #notifBtn { padding: 0.3rem !important; }
  }

  /* MALI MOBILE (do 480px) */
  @media (max-width: 480px) {
    main { padding: 0.75rem !important; }
    .stat-card .text-3xl { font-size: 1.25rem !important; }
    header h1 { display: none; }
    #userBadge { max-width: 90px; }

    /* Forme */
    input, select, textarea { font-size: 16px !important; } /* sprječava zoom na iOS-u */

    /* Modal */
    .modal-content { padding: 0.85rem !important; border-radius: 12px !important; }
    .modal-content h3 { font-size: 1.1rem !important; }

    /* Grade picker u modalu - veća dugmad za prste */
    .grid-cols-5 { gap: 4px !important; }
  }

  /* Hover efekti samo na uređajima sa mišem */
  @media (hover: none) {
    .stat-card:hover, .btn-primary:hover, .btn-secondary:hover { transform: none !important; box-shadow: none !important; }

</style>

function loadData() {
  try {
    const saved = localStorage.getItem('edn_data_v3');
    if (saved) {
      const data = JSON.parse(saved);
      if (!data.users || !data.users.find(u => u.username === 'admin')) {
        return JSON.parse(JSON.stringify(DEFAULT_DATA));
      }
      return data;
    }
  } catch(e) { console.error(e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if (!u || !p) { err.textContent='Unesite korisničko ime i lozinku'; err.classList.remove('hidden'); return; }
  const user = DB.users.find(x => x.username.toLowerCase()===u.toLowerCase() && x.password===p);
  if (!user) { err.textContent='Pogrešno korisničko ime ili lozinka'; err.classList.remove('hidden'); return; }
  err.classList.add('hidden');
  currentUser = user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userBadge').textContent = user.name;
  // na mobilnoj sidebar zatvoren, na desktopu otvoren
  const sb = document.getElementById('sidebar');
  sb.classList.remove('hidden','open');
  document.body.classList.remove('sidebar-open');
  buildSidebar();
  updateNotifBadge();
  if (user.role === 'nastavnik') {
    try {
      const cas = getTrenutniCas(user.id);
      if (cas) {
        showNotification(`📚 Trenutni čas: ${cas.predmet} - ${getRazredName(cas.razredId)}`);
        navigate('dnevnik', { razredId: cas.razredId, predmet: cas.predmet });
        return;
      }
    } catch(e) {}
  }
  navigate('pocetna');
}
document.getElementById('loginForm').addEventListener('submit', e => { e.preventDefault(); doLogin(); });
['loginUser','loginPass'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); doLogin(); }}));

function updateClock() {
  try {
    const dani = ['Nedjelja','Ponedjeljak','Utorak','Srijeda','Četvrtak','Petak','Subota'];
    const n = new Date();
    const el = document.getElementById('currentTime');
    if (el) el.textContent = `${dani[n.getDay()]} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  } catch(e){}
}
setInterval(updateClock, 1000); updateClock();

function getTrenutniCas(nastId) {
  const n = new Date();
  const day = n.getDay();
  const time = n.getHours()*60 + n.getMinutes();
  return DB.casovi.find(c => {
    if (c.nastavnikId !== nastId || c.dan !== day) return false;
    const [h,m] = c.vrijeme.split(':').map(Number);
    return time >= h*60+m && time <= h*60+m + (c.trajanje||45);
  });
}
function getSljedeciCas(nastId) {
  const n = new Date();
  const day = n.getDay();
  const time = n.getHours()*60 + n.getMinutes();
  return DB.casovi.filter(c=>c.nastavnikId===nastId && c.dan===day).filter(c=>{
    const [h,m] = c.vrijeme.split(':').map(Number);
    return h*60+m > time;
  }).sort((a,b)=>a.vrijeme.localeCompare(b.vrijeme))[0];
}
function getCasoviToday(nastId) {
  return DB.casovi.filter(c=>c.nastavnikId===nastId && c.dan===new Date().getDay()).sort((a,b)=>a.vrijeme.localeCompare(b.vrijeme));
}
function getRazredName(id) { return DB.razredi.find(r=>r.id===id)?.naziv || '-'; }
function getNastavnikName(id) { return DB.users.find(u=>u.id===id)?.name || '-'; }
function getDanName(d) { return ['Nedjelja','Ponedjeljak','Utorak','Srijeda','Četvrtak','Petak','Subota'][d]; }
function getCurrentSemester() { const m=new Date().getMonth(); return (m>=8||m<=0)?1:2; }
function isSemesterLocked(razredId, predmet, sem) { return DB.zakljucniSemestri.some(z=>z.razredId===razredId&&z.predmet===predmet&&z.semestar===sem); }
function fmtDate(d) { if (!d) return ''; return d.split('-').reverse().join('.')+'.'; }
function todayISO() { return new Date().toISOString().split('T')[0]; }

function showNotification(text, type='success') {
  const c = document.getElementById('notifContainer');
  const n = document.createElement('div');
  n.className = 'notification';
  if (type==='error') n.style.background = '#dc2626';
  else if (type==='info') n.style.background = '#2563eb';
  const icon = type==='error'?'⚠':type==='info'?'ℹ':'✓';
  n.innerHTML = `<span style="font-size:1.3em">${icon}</span><span>${text}</span>`;
  c.appendChild(n);
  setTimeout(()=>{ n.style.animation='slideIn 0.3s reverse'; setTimeout(()=>n.remove(),300); }, 3500);
}

function avgOcjena(arr) {
  // NPS se ne računa u prosjek
  const a = arr.filter(o=>!o.zamjenjeno && !o.zakljucna && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  if (!a.length) return '-';
  return (a.reduce((x,y)=>x+y,0)/a.length).toFixed(2);
}

            const oc = DB.ocjene.filter(o=>{ const u=DB.ucenici.find(x=>x.id===o.ucenikId); return u?.razredId===r.id && !o.zamjenjeno && !o.zakljucna; });
            const avg = parseFloat(avgOcjena(oc))||0;
            return `<div>
              <div class="flex justify-between text-sm mb-1"><span class="font-medium">${r.naziv}</span><span class="font-bold text-blue-700">${avg.toFixed(2)}</span></div>
              <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full" style="width:${(avg/5)*100}%"></div></div>
            </div>`;
          }).join('') || '<p class="text-gray-400 text-sm">Nema podataka</p>'}
        </div>
      </div>
      <div class="bg-white border rounded-xl p-6">
        <h3 class="font-semibold text-lg mb-4">🕐 Posljednje aktivnosti</h3>
        <ul class="space-y-2 text-sm">
          ${DB.ocjene.slice(-5).reverse().map(o=>{
            const u = DB.ucenici.find(x=>x.id===o.ucenikId);
            return `<li class="flex items-center gap-2 py-2 border-b last:border-0"><span class="ocjena-chip ocjena-${o.vrijednost} text-xs" style="cursor:default">${o.vrijednost}</span><span>${u?.prezime} ${u?.ime} • ${o.predmet}</span><span class="ml-auto text-xs text-gray-400">${fmtDate(o.datum)}</span></li>`;
          }).join('') || '<li class="text-gray-400">Nema aktivnosti</li>'}
        </ul>
      </div>
    </div>`;
}

function renderUcenikHome(c) {

  const izost = DB.prisustva.filter(p=>p.ucenikId===u.id && p.status!=='P').length;
  const day = new Date().getDay();

  const danasRedar = DB.redari.find(r=>r.razredId===u.razredId && r.ucenikIds.includes(u.id) && new Date(todayISO())>=new Date(r.datumOd) && new Date(todayISO())<=new Date(r.datumDo));

        </div>
      </div>
    </div>`:''}
    ${ispiti.length && Math.ceil((new Date(ispiti[0].datum)-new Date(todayISO()))/(1000*60*60*24))<=3 ? `<div class="bg-red-50 border-l-4 border-red-500 rounded-xl p-4 mb-4">

          </div>
        </div>
        <button onclick="navigate('mojiispiti')" class="btn-danger px-4 py-2 rounded-lg font-semibold">Vidi sve →</button>
      </div>
    </div>`:''}
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div onclick="navigate('mojeocjene')" class="stat-card bg-gradient-to-br from-blue-500 to-blue-700 text-white rounded-xl p-5">
        <div class="text-3xl font-bold">${avgOcjena(aktivne)}</div>
        <div class="text-sm opacity-90 mt-1">Prosjek</div>
      </div>
      <div onclick="navigate('mojeocjene')" class="stat-card bg-gradient-to-br from-green-500 to-green-700 text-white rounded-xl p-5">
        <div class="text-3xl font-bold">${aktivne.length}</div>
        <div class="text-sm opacity-90 mt-1">Aktivnih ocjena</div>

      <div onclick="navigate('mojeprisustvo')" class="stat-card bg-gradient-to-br from-orange-500 to-red-600 text-white rounded-xl p-5">

        <div class="text-sm opacity-90 mt-1">Izostanaka</div>
      </div>
      <div onclick="navigate('mojiispiti')" class="stat-card bg-gradient-to-br from-red-500 to-pink-600 text-white rounded-xl p-5">
        <div class="text-3xl font-bold">${ispiti.length}</div>
        <div class="text-sm opacity-90 mt-1">Nadolazećih ispita</div>
      </div>
    </div>
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-white border rounded-xl p-6">
        <h3 class="font-semibold text-lg mb-4">📅 Današnji raspored</h3>
        ${raspToday.length ? raspToday.map(cs=>`
          <div class="flex items-center gap-3 py-2 border-b last:border-0">
            <div class="font-bold text-blue-700 w-14">${cs.vrijeme}</div>
            <div class="flex-1"><div class="font-medium">${cs.predmet}</div><div class="text-xs text-gray-500">${getNastavnikName(cs.nastavnikId)} ${cs.ucionica?'• uč. '+cs.ucionica:''}</div></div>

        <h3 class="font-semibold text-lg mb-4">📚 Aktualne zadaće</h3>

      </div>
    </div>`;
}

RENDERERS.korisnici = function(c) {
  const search = (document.getElementById('searchU')?.value || '').toLowerCase();
  const filter = document.getElementById('filterU')?.value || 'all';
  let list = DB.users;
  if (filter !== 'all') list = list.filter(u=>u.role===filter);
  if (search) list = list.filter(u=>u.name.toLowerCase().includes(search) || u.username.toLowerCase().includes(search));
  c.innerHTML = `
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold">Korisnici</h2>
      <button onclick="openUserModal()" class="btn-primary px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Novi korisnik
      </button>
    </div>
    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 mb-4 text-sm rounded">⚠ Administrator vidi lozinke svih korisnika.</div>
    <div class="flex gap-3 mb-4">
      <input id="searchU" oninput="navigate('korisnici')" value="${search}" placeholder="🔍 Pretraži po imenu..." class="flex-1 px-4 py-2 border rounded-lg">
      <select id="filterU" onchange="navigate('korisnici')" class="px-4 py-2 border rounded-lg">
        <option value="all" ${filter==='all'?'selected':''}>Sve uloge</option>
        <option value="admin" ${filter==='admin'?'selected':''}>Administratori</option>
        <option value="nastavnik" ${filter==='nastavnik'?'selected':''}>Nastavnici</option>
        <option value="ucenik" ${filter==='ucenik'?'selected':''}>Učenici</option>
      </select>
    </div>
    <div class="bg-white border rounded-xl overflow-hidden">
      <table>
        <thead><tr><th>ID</th><th>Username</th><th>Lozinka</th><th>Ime i prezime</th><th>Email</th><th>Uloga</th><th>Detalji</th><th>Akcije</th></tr></thead>
        <tbody>
          ${list.map(u=>`<tr>
            <td>${u.id}</td>
            <td><b>${u.username}</b></td>
            <td><code class="bg-gray-100 px-2 py-1 rounded text-xs">${u.password}</code></td>
            <td style="text-align:left">${u.name}</td>
            <td style="text-align:left">${u.email||''}</td>
            <td><span class="badge ${u.role==='admin'?'bg-red-100 text-red-700':u.role==='nastavnik'?'bg-blue-100 text-blue-700':'bg-green-100 text-green-700'}">${u.role}</span></td>
            <td class="text-xs" style="text-align:left">${u.role==='nastavnik'?(u.predmeti||[]).join(', '):u.role==='ucenik'?getRazredName(DB.ucenici.find(x=>x.id===u.ucenikId)?.razredId):''}</td>
            <td>
              <button onclick="openUserModal(${u.id})" class="text-blue-600 hover:underline mr-2 text-sm">Uredi</button>
              ${u.username!=='admin'?`<button onclick="deleteUser(${u.id})" class="text-red-600 hover:underline text-sm">Obriši</button>`:''}
            </td>
          </tr>`).join('') || '<tr><td colspan="8" class="empty-state">Nema korisnika</td></tr>'}
        </tbody>
      </table>
    </div>`;
};
function openUserModal(id) {
  const u = id ? DB.users.find(x=>x.id===id) : { username:'',password:'',role:'nastavnik',name:'',email:'',predmeti:[],ucenikId:null };
  showModal(`
    <h3 class="text-xl font-bold mb-4">${id?'Uredi':'Novi'} korisnik</h3>
    <form id="userForm" class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-sm font-medium block mb-1">Username *</label><input name="username" value="${u.username}" required class="w-full px-3 py-2 border rounded-lg"></div>
        <div><label class="text-sm font-medium block mb-1">Lozinka *</label><input name="password" value="${u.password}" required class="w-full px-3 py-2 border rounded-lg"></div>
      </div>
      <div><label class="text-sm font-medium block mb-1">Ime i prezime *</label><input name="name" value="${u.name}" required class="w-full px-3 py-2 border rounded-lg"></div>
      <div><label class="text-sm font-medium block mb-1">Email</label><input name="email" type="email" value="${u.email||''}" class="w-full px-3 py-2 border rounded-lg"></div>
      <div><label class="text-sm font-medium block mb-1">Uloga *</label>
        <select name="role" id="roleSelect" class="w-full px-3 py-2 border rounded-lg" onchange="toggleRoleFields()">
          <option value="admin" ${u.role==='admin'?'selected':''}>Administrator</option>
          <option value="nastavnik" ${u.role==='nastavnik'?'selected':''}>Nastavnik</option>
          <option value="ucenik" ${u.role==='ucenik'?'selected':''}>Učenik</option>
        </select>
      </div>
      <div id="predmetiField" class="${u.role==='nastavnik'?'':'hidden'}">
        <label class="text-sm font-medium block mb-2">Zaduženja (predmet + razredi)</label>
        <div id="zaduzenjaList" class="space-y-2 mb-2">
          ${(u.zaduzenja||[]).map((z,i)=>`<div class="flex gap-2 items-center bg-gray-50 p-2 rounded border" data-z-idx="${i}">
            <select class="z-predmet flex-1 px-2 py-1 border rounded text-sm">${DB.predmeti.map(p=>`<option ${p===z.predmet?'selected':''}>${p}</option>`).join('')}</select>
            <div class="flex gap-1 flex-wrap">${DB.razredi.map(r=>`<label class="text-xs bg-white border px-2 py-0.5 rounded cursor-pointer"><input type="checkbox" class="z-razred" value="${r.id}" ${z.razrediIds?.includes(r.id)?'checked':''}> ${r.naziv}</label>`).join('')}</div>
            <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:bg-red-50 w-7 h-7 rounded">×</button>
          </div>`).join('')}
        </div>
        <button type="button" onclick="addZaduzenje()" class="text-blue-600 hover:underline text-sm">+ Dodaj zaduženje</button>
        <p class="text-xs text-gray-500 mt-1">Npr: Matematika → VI-1, VII-2</p>
      </div>
      <div id="razrednikField" class="${u.role==='nastavnik'?'':'hidden'}">
        <label class="text-sm font-medium block mb-1">Razrednik razreda</label>
        <select name="razrednikRazredId" class="w-full px-3 py-2 border rounded-lg">
          <option value="">-- nije razrednik --</option>
          ${DB.razredi.map(r=>`<option value="${r.id}" ${r.id===u.razrednikRazredId?'selected':''}>${r.naziv}</option>`).join('')}
        </select>
      </div>
      <div id="ucenikField" class="${u.role==='ucenik'?'':'hidden'}">
        <label class="text-sm font-medium block mb-1">Poveži sa učenikom</label>
        <select name="ucenikId" class="w-full px-3 py-2 border rounded-lg">
          <option value="">-- odaberi --</option>
          ${DB.ucenici.map(uc=>`<option value="${uc.id}" ${uc.id===u.ucenikId?'selected':''}>${uc.prezime} ${uc.ime} (${getRazredName(uc.razredId)})</option>`).join('')}
        </select>
      </div>
      <div class="flex justify-end gap-2 pt-4 border-t">
        <button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>
        <button type="submit" class="btn-primary px-4 py-2 rounded-lg">Sačuvaj</button>
      </div>
    </form>`);
  document.getElementById('userForm').onsubmit = e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = { username: fd.get('username'), password: fd.get('password'), name: fd.get('name'), email: fd.get('email'), role: fd.get('role') };
    if (data.role==='nastavnik') {
      data.zaduzenja = readZaduzenja();
      data.predmeti = [...new Set(data.zaduzenja.map(z=>z.predmet))];
      const rrid = +fd.get('razrednikRazredId');

RENDERERS.raspored = function(c) {
  const dani = [1,2,3,4,5];

  const razredId = +(document.getElementById('rspRazred')?.value || DB.razredi[0]?.id || 0);
  const today = new Date().getDay();
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  c.innerHTML = `
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-bold">Raspored časova</h2>
      ${currentUser.role==='admin'?`<button onclick="openCasModal()" class="btn-primary px-4 py-2 rounded-lg font-semibold">+ Dodaj čas</button>`:''}
    </div>
    <div class="mb-4 flex items-center gap-3 bg-white p-3 rounded-lg border">
      <label class="font-medium">Razred:</label>
      <select id="rspRazred" onchange="navigate('raspored')" class="px-3 py-2 border rounded-lg">
        ${DB.razredi.map(r=>`<option value="${r.id}" ${r.id===razredId?'selected':''}>${r.naziv}</option>`).join('')}
      </select>
    </div>
    <div class="bg-white border rounded-xl overflow-hidden">
      <table>
        <thead><tr><th style="width:90px">Vrijeme</th>${dani.map(d=>`<th class="${d===today?'bg-blue-50 text-blue-700':''}">${getDanName(d)}</th>`).join('')}</tr></thead>
        <tbody>${vremena.map(v=>`<tr>
          <td class="font-bold bg-gray-50 text-gray-700">${v}</td>
          ${dani.map(d=>{
            const cs = DB.casovi.find(x=>x.razredId===razredId&&x.dan===d&&x.vrijeme===v);
            if (!cs) return '<td class="schedule-cell"><span class="text-gray-300">-</span></td>';
            const [h,m] = cs.vrijeme.split(':').map(Number);
            const start = h*60+m;
            const isNow = d===today && nowMin>=start && nowMin<=start+(cs.trajanje||45);
            const isSoon = d===today && start>nowMin && start-nowMin<30;
            return `<td class="schedule-cell ${isNow?'schedule-current':isSoon?'schedule-soon':''}">
              <div class="text-sm">
                <div class="font-bold text-blue-700">${cs.predmet}</div>
                <div class="text-xs text-gray-600 mt-1">${getNastavnikName(cs.nastavnikId)}</div>
                ${cs.ucionica?`<div class="text-xs text-gray-500">📍 ${cs.ucionica}</div>`:''}
                ${currentUser.role==='admin'?`<button onclick="deleteCas(${cs.id})" class="text-red-500 text-xs hover:underline mt-1">obriši</button>`:''}
              </div>
            </td>`;
          }).join('')}
        </tr>`).join('')}</tbody>
      </table>
    </div>
    ${currentUser.role==='admin'?`<p class="text-xs text-gray-500 mt-3">💡 Plava ćelija = trenutno aktivan čas. Žuta = počinje uskoro.</p>`:''}`;
};

          ${dostupniPredmeti.map(p=>`<option ${p===predmet?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="flex items-center gap-3 ml-auto">
        <label class="font-semibold text-gray-700">Datum</label>
        <input type="date" id="dnDatum" value="${datum}" onchange="navigate('dnevnik')" class="px-3 py-2 border rounded-lg">
      </div>
    </div>
    ${locked ? '<div class="bg-green-50 border border-green-300 text-green-800 p-3 rounded-lg mb-4">🔒 Semestar je zaključan. Ocjenjivanje nije moguće.</div>' : ''}
    ${renderLekcijaPanel(razredId, predmet, datum)}
    <div class="flex justify-between items-center mt-6 mb-3">
      <h3 class="text-lg font-bold">Učenici i ocjenjivanje</h3>
      <span class="text-sm text-gray-500">${datum.split('-').reverse().join('.')}.</span>
    </div>
    <div class="bg-white border rounded-xl overflow-hidden">
      <table>
        <thead><tr>
          <th>Br.</th>
          <th style="text-align:left">Prezime i ime</th>
          <th>Prisustvo</th>
          <th>Aktivnost</th>
          <th>Pismene</th>
          <th>Usmene</th>
          <th>Zaključna</th>
        </tr></thead>
        <tbody>
          ${DB.ucenici.filter(u=>u.razredId===razredId).map((u,i)=>{
            const pris = DB.prisustva.find(p=>p.ucenikId===u.id&&p.predmet===predmet&&p.datum===datum);
            return `<tr>
              <td>${i+1}</td>
              <td style="text-align:left;padding-left:16px"><b>${u.prezime} ${u.ime}</b></td>
              <td>
                <select onchange="setPrisustvo(${u.id},'${predmet}','${datum}',this.value)" class="px-2 py-1 border rounded w-16 ${pris?.status==='O'?'bg-red-50 text-red-700':pris?.status==='I'?'bg-yellow-50':''}">
                  <option value="P" ${(!pris||pris.status==='P')?'selected':''}>P</option>
                  <option value="O" ${pris?.status==='O'?'selected':''}>O</option>
                  <option value="I" ${pris?.status==='I'?'selected':''}>I</option>
                </select>
              </td>
              <td>${renderOcjeneCol(u.id, predmet, 'aktivnost', datum, locked)}</td>
              <td>${renderOcjeneCol(u.id, predmet, 'pismena', datum, locked)}</td>
              <td>${renderOcjeneCol(u.id, predmet, 'usmena', datum, locked)}</td>
              <td>${renderZakljucna(u.id, predmet)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="flex justify-between items-center mt-6 no-print">
      <div>
        ${!locked ? `<button onclick="zakljucniSemestarBtn(${razredId},'${predmet}')" class="btn-success px-5 py-2.5 rounded-lg font-semibold">🔒 Zaključi semestar ${sem}</button>` : `<button onclick="zakljucniSemestarBtn(${razredId},'${predmet}')" class="btn-secondary px-5 py-2.5 rounded-lg font-semibold">🔓 Otključaj semestar</button>`}
      </div>
      <div class="flex gap-3">
        <button onclick="window.print()" class="btn-secondary px-5 py-2.5 rounded-lg font-semibold">🖨 Štampaj</button>
      </div>
    </div>`;
};

function renderLekcijaPanel(razredId, predmet, datum) {
  const l = DB.lekcije.find(x=>x.razredId===razredId&&x.predmet===predmet&&x.datum===datum);
  return `<div class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 rounded-xl p-4">
    <div class="flex justify-between items-start mb-2">
      <h3 class="font-bold text-blue-900 flex items-center gap-2">📚 Lekcija za današnji čas</h3>
      <button onclick="openLekcijaModal(${razredId},'${predmet}','${datum}')" class="text-blue-700 hover:bg-blue-100 px-3 py-1 rounded text-sm font-medium">${l?'✎ Uredi':'+ Dodaj'}</button>
    </div>
    ${l ? `<div><div class="font-bold text-gray-800">${l.naslov}</div><div class="text-sm text-gray-700 mt-1 whitespace-pre-wrap">${l.opis}</div></div>` : '<p class="text-sm text-gray-500">Još nije dodana lekcija za ovaj čas</p>'}
  </div>`;
}
function openLekcijaModal(razredId, predmet, datum) {
  const ex = DB.lekcije.find(l=>l.razredId===razredId&&l.predmet===predmet&&l.datum===datum);
  const ppKey = `${razredId}_${predmet}`;
  const planLista = DB.planProgram[ppKey] || [];
  showModal(`<h3 class="text-xl font-bold mb-4">${ex?'Uredi':'Dodaj'} lekciju</h3>
    <form id="lf" class="space-y-3">
      ${planLista.length ? `<div><label class="text-sm font-medium block mb-1">Iz plana i programa</label>
        <select onchange="if(this.value){document.querySelector('[name=naslov]').value=this.value;}" class="w-full px-3 py-2 border rounded-lg">
          <option value="">-- ili odaberi iz plana --</option>
          ${planLista.map(p=>`<option value="${p.naziv}">${p.naziv}</option>`).join('')}
        </select>
      </div>` : ''}
      <div><label class="text-sm font-medium block mb-1">Naslov lekcije *</label><input name="naslov" value="${ex?.naslov||''}" required class="w-full px-3 py-2 border rounded-lg"></div>
      <div><label class="text-sm font-medium block mb-1">Opis / sadržaj</label><textarea name="opis" class="w-full px-3 py-2 border rounded-lg h-32">${ex?.opis||''}</textarea></div>
      <div class="flex justify-end gap-2 pt-4 border-t">
        <button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>
        <button type="submit" class="btn-primary px-4 py-2 rounded-lg">Sačuvaj</button>
      </div>
    </form>`);
  document.getElementById('lf').onsubmit = e => {
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target));
    if (ex) Object.assign(ex, d);
    else DB.lekcije.push({ id: Date.now(), razredId, predmet, datum, nastavnikId: currentUser.id, ...d });
    saveData(); closeModal(); navigate('dnevnik'); showNotification('Lekcija sačuvana!');
  };
}
function setPrisustvo(ucenikId, predmet, datum, status) {
  let p = DB.prisustva.find(x=>x.ucenikId===ucenikId&&x.predmet===predmet&&x.datum===datum);
  if (p) p.status = status;
  else DB.prisustva.push({ id: Date.now(), ucenikId, predmet, datum, status });
  saveData();
}

function renderOcjeneCol(ucenikId, predmet, tip, datum, locked) {
  const sve = DB.ocjene.filter(o=>o.ucenikId===ucenikId&&o.predmet===predmet&&o.tip===tip&&!o.zakljucna).sort((a,b)=>a.datum.localeCompare(b.datum));
  let html = '<div class="flex flex-wrap items-center justify-center gap-0.5">';
  sve.forEach(o => {
    const cls = o.vrijednost==='NPS' ? 'ocjena-NPS' : 'ocjena-'+o.vrijednost;
    if (o.zamjenjeno) html += `<span class="ocjena-chip ocjena-old" title="Popravljena ${fmtDate(o.datum)}">${o.vrijednost}</span>`;
    else html += `<span class="ocjena-chip ${cls}" title="${fmtDate(o.datum)}${o.biljeska?' - '+o.biljeska:''} - klik za brisanje" onclick="${locked?'':`obrisiOcjenu(${o.id})`}">${o.vrijednost}</span>`;
  });
  if (!locked) html += `<button onclick="dodajOcjenu(${ucenikId},'${predmet}','${tip}','${datum}')" class="add-grade-btn" title="Dodaj ocjenu">+</button>`;
  html += '</div>';
  return html;
}

function dodajOcjenu(ucenikId, predmet, tip, datum) {
  const u = DB.ucenici.find(x=>x.id===ucenikId);
  const sve = DB.ocjene.filter(o=>o.ucenikId===ucenikId&&o.predmet===predmet&&o.tip===tip&&!o.zamjenjeno&&!o.zakljucna);
  showModal(`<h3 class="text-lg font-bold mb-2">Dodaj ocjenu (${tip})</h3>
    <p class="text-sm text-gray-600 mb-4">Učenik: <b>${u.prezime} ${u.ime}</b> • ${predmet}</p>
    ${sve.length ? `<div class="mb-4 p-3 bg-gray-50 rounded-lg">
      <div class="text-xs text-gray-600 mb-2">Postojeće aktivne ocjene:</div>
      <div>${sve.map(o=>`<span class="ocjena-chip ocjena-${o.vrijednost}" style="cursor:default">${o.vrijednost}</span>`).join('')}</div>
      <label class="flex items-center gap-2 mt-3 cursor-pointer"><input type="checkbox" id="popravlja" onchange="document.getElementById('zamjenjujeId').classList.toggle('hidden',!this.checked)"> <span class="text-sm">Ovo je <b>popravljena ocjena</b> (precrtava prethodnu)</span></label>
      <select id="zamjenjujeId" class="w-full px-3 py-2 border rounded-lg mt-2 hidden">
        ${sve.map(o=>`<option value="${o.id}">Zamjeni: ${o.vrijednost} (${fmtDate(o.datum)})</option>`).join('')}
      </select>
    </div>` : ''}
    <div><label class="text-sm font-medium block mb-2">Odaberi ocjenu:</label>
      <div class="grid grid-cols-5 gap-2 mb-2">
        ${[1,2,3,4,5].map(v=>`<button onclick="potvrdiOcjenu(${ucenikId},'${predmet}','${tip}','${datum}',${v})" class="ocjena-chip ocjena-${v}" style="height:60px;font-size:1.8rem">${v}</button>`).join('')}
      </div>
      <button onclick="potvrdiOcjenu(${ucenikId},'${predmet}','${tip}','${datum}','NPS')" class="ocjena-chip ocjena-NPS w-full" style="height:42px;font-size:1rem" title="Nije pristupio ispitivanju">NPS - Nije pristupio</button>
    </div>
    <div><label class="text-sm font-medium block mb-1 mt-3">Bilješka (opcionalno)</label><input id="ocjBiljeska" class="w-full px-3 py-2 border rounded-lg" placeholder="npr. odgovarala lekciju..."></div>
    <div class="flex justify-end mt-4">
      <button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>
    </div>`);
}
function potvrdiOcjenu(ucenikId, predmet, tip, datum, vrijednost) {
  const pop = document.getElementById('popravlja');
  let zam = null;
  if (pop && pop.checked) {
    zam = +document.getElementById('zamjenjujeId').value;
    const stara = DB.ocjene.find(o=>o.id===zam);
    if (stara) stara.zamjenjeno = true;
  }
  const biljeska = document.getElementById('ocjBiljeska')?.value || '';
  DB.ocjene.push({ id: Date.now(), ucenikId, predmet, tip, vrijednost, datum, semestar: getCurrentSemester(), nastavnikId: currentUser.id, zamjenjuje: zam, zamjenjeno: false, zakljucna: false, biljeska });
  // notifikacija učeniku
  const ucUser = DB.users.find(u=>u.ucenikId===ucenikId);
  if (ucUser) {
    DB.obavijesti.push({ id: Date.now()+1, naslov: 'Nova ocjena', tekst: `Dobili ste ocjenu ${vrijednost} iz predmeta ${predmet} (${tip})`, datum: todayISO(), za: null, zaId: ucUser.id });
  }
  saveData(); closeModal();
  navigate(currentView, viewState);
  showNotification(`Ocjena ${vrijednost} dodana!`);
}
function obrisiOcjenu(id) {
  if (!confirm('Obrisati ovu ocjenu?')) return;
  const o = DB.ocjene.find(x=>x.id===id);
  if (o?.zamjenjuje) {
    const stara = DB.ocjene.find(x=>x.id===o.zamjenjuje);
    if (stara) stara.zamjenjeno = false;
  }
  DB.ocjene = DB.ocjene.filter(x=>x.id!==id);
  saveData(); navigate(currentView, viewState); showNotification('Ocjena obrisana');
}

function renderZakljucna(ucenikId, predmet) {
  const sem = getCurrentSemester();
  const z = DB.ocjene.find(o=>o.ucenikId===ucenikId&&o.predmet===predmet&&o.zakljucna&&o.semestar===sem);
  if (z) {
    const cls = z.vrijednost==='NPS' ? 'ocjena-NPS' : 'ocjena-'+z.vrijednost;
    return `<span class="ocjena-chip ${cls}" style="font-size:1.1rem;min-width:36px;height:36px;cursor:pointer" onclick="zakljuciJednog(${ucenikId},'${predmet}')" title="Klik za izmjenu zaključne">${z.vrijednost}</span>`;
  }
  const akt = DB.ocjene.filter(o=>o.ucenikId===ucenikId&&o.predmet===predmet&&!o.zamjenjeno&&!o.zakljucna&&o.semestar===sem&&o.vrijednost!=='NPS'&&!isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  if (!akt.length) return `<button onclick="zakljuciJednog(${ucenikId},'${predmet}')" class="text-gray-400 hover:text-blue-600 text-sm" title="Zaključi ocjenu">+ zakl.</button>`;
  const avg = (akt.reduce((a,b)=>a+b,0)/akt.length).toFixed(1);
  return `<span onclick="zakljuciJednog(${ucenikId},'${predmet}')" class="text-gray-500 text-sm cursor-pointer hover:text-blue-700" title="Klik za zaključavanje - prijedlog ${avg}">~${avg}</span>`;
}

// Pojedinačno zaključavanje/izmjena
function zakljuciJednog(ucenikId, predmet) {
  const sem = getCurrentSemester();
  const u = DB.ucenici.find(x=>x.id===ucenikId);
  const postojeca = DB.ocjene.find(o=>o.ucenikId===ucenikId&&o.predmet===predmet&&o.zakljucna&&o.semestar===sem);
  const akt = DB.ocjene.filter(o=>o.ucenikId===ucenikId&&o.predmet===predmet&&!o.zamjenjeno&&!o.zakljucna&&o.semestar===sem&&o.vrijednost!=='NPS'&&!isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  const prijedlog = akt.length ? Math.round(akt.reduce((a,b)=>a+b,0)/akt.length) : 0;
  showModal(`<h3 class="text-xl font-bold mb-2">Zaključna ocjena</h3>
    <p class="text-sm text-gray-600 mb-4">Učenik: <b>${u.prezime} ${u.ime}</b> • ${predmet} • Sem. ${sem}</p>
    ${akt.length ? `<div class="mb-3 p-3 bg-blue-50 rounded-lg text-sm">
      <div>Aktivne ocjene: ${akt.join(', ')}</div>
      <div class="mt-1">Prosjek: <b>${(akt.reduce((a,b)=>a+b,0)/akt.length).toFixed(2)}</b> → Prijedlog: <b class="text-blue-700">${prijedlog}</b></div>
    </div>` : '<div class="text-sm text-gray-500 mb-3">Učenik nema aktivnih ocjena u ovom semestru.</div>'}
    ${postojeca ? `<div class="mb-3 p-2 bg-yellow-50 rounded text-sm">Trenutna zaključna: <b>${postojeca.vrijednost}</b> <button onclick="ukloniZakljucnu(${ucenikId},'${predmet}')" class="text-red-600 hover:underline ml-2">Ukloni</button></div>` : ''}
    <label class="text-sm font-medium block mb-2">Odaberi zaključnu ocjenu:</label>
    <div class="grid grid-cols-5 gap-2 mb-2">
      ${[1,2,3,4,5].map(v=>`<button onclick="postaviZakljucnu(${ucenikId},'${predmet}',${v})" class="ocjena-chip ocjena-${v} ${v===prijedlog?'ring-2 ring-blue-500':''}" style="height:55px;font-size:1.6rem">${v}</button>`).join('')}
    </div>
    <button onclick="postaviZakljucnu(${ucenikId},'${predmet}','NPS')" class="ocjena-chip ocjena-NPS w-full" style="height:40px;font-size:0.9rem">NPS</button>
    <div class="flex justify-end mt-4 pt-3 border-t"><button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button></div>`);
}
function postaviZakljucnu(ucenikId, predmet, vrijednost) {
  const sem = getCurrentSemester();
  // ukloni postojeću
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===ucenikId&&o.predmet===predmet&&o.zakljucna&&o.semestar===sem));
  DB.ocjene.push({ id: Date.now()+Math.random(), ucenikId, predmet, tip:'zakljucna', vrijednost, datum: todayISO(), semestar: sem, nastavnikId: currentUser.id, zakljucna: true, zamjenjeno: false });
  const ucUser = DB.users.find(u=>u.ucenikId===ucenikId);
  if (ucUser) DB.obavijesti.push({ id: Date.now()+1, naslov: 'Zaključna ocjena', tekst: `${predmet}: zaključno ${vrijednost} (semestar ${sem})`, datum: todayISO(), za: null, zaId: ucUser.id });
  saveData(); closeModal(); navigate(currentView, viewState); showNotification('Zaključna ocjena upisana!');
}
function ukloniZakljucnu(ucenikId, predmet) {
  if (!confirm('Ukloniti zaključnu ocjenu?')) return;
  const sem = getCurrentSemester();
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===ucenikId&&o.predmet===predmet&&o.zakljucna&&o.semestar===sem));
  saveData(); closeModal(); navigate(currentView, viewState); showNotification('Zaključna uklonjena');
}

function zakljucniSemestarBtn(razredId, predmet) {
  const sem = getCurrentSemester();
  if (isSemesterLocked(razredId, predmet, sem)) {
    if (confirm('Otključati semestar? Zaključne ocjene će ostati.')) {
      DB.zakljucniSemestri = DB.zakljucniSemestri.filter(z=>!(z.razredId===razredId&&z.predmet===predmet&&z.semestar===sem));
      saveData(); navigate('dnevnik'); showNotification('Semestar otključan');
    }
    return;
  }
  if (!confirm(`Zaključiti semestar ${sem} za ${predmet}?\nSvim učenicima će se upisati zaključna ocjena na osnovu prosjeka.`)) return;
  DB.ucenici.filter(u=>u.razredId===razredId).forEach(u=>{
    const akt = DB.ocjene.filter(o=>o.ucenikId===u.id&&o.predmet===predmet&&!o.zamjenjeno&&!o.zakljucna&&o.semestar===sem).map(o=>+o.vrijednost);
    if (!akt.length) return;
    const avg = akt.reduce((a,b)=>a+b,0)/akt.length;
    const zakl = Math.round(avg);
    DB.ocjene.push({ id: Date.now()+Math.random(), ucenikId: u.id, predmet, tip:'zakljucna', vrijednost: zakl, datum: todayISO(), semestar: sem, nastavnikId: currentUser.id, zakljucna: true, zamjenjeno: false });
  });
  DB.zakljucniSemestri.push({ razredId, predmet, semestar: sem, datum: todayISO() });
  DB.obavijesti.push({ id: Date.now(), naslov: 'Semestar zaključan', tekst: `${predmet} - ${getRazredName(razredId)} - semestar ${sem}`, datum: todayISO(), za: 'ucenik' });
  saveData(); navigate('dnevnik'); showNotification('Semestar zaključan!');
}

// =========================== PLAN I PROGRAM ===========================
RENDERERS.planprogram = function(c) {
  const razredId = +(document.getElementById('ppRazred')?.value || DB.razredi[0]?.id);
  const predmet = document.getElementById('ppPredmet')?.value || (currentUser.predmeti||DB.predmeti)[0];
  const key = `${razredId}_${predmet}`;
  if (!DB.planProgram[key]) DB.planProgram[key] = [];
  const lista = DB.planProgram[key];
  const done = lista.filter(l=>l.ostvareno).length;
  const pct = lista.length ? Math.round((done/lista.length)*100) : 0;
  c.innerHTML = `
    <h2 class="text-3xl font-bold mb-4">Plan i program</h2>
    <div class="flex gap-6 border-b mb-6 overflow-x-auto">
      ${[['dnevnik','Dnevnik'],['planprogram','Plan i program'],['materijali','Nastavni materijal'],['biljeske','Bilješke']].map(([k,n])=>`
        <button onclick="navigate('${k}')" class="pb-3 px-1 whitespace-nowrap ${currentView===k?'tab-active':'tab-inactive'}">${n}</button>`).join('')}
    </div>
    <div class="flex flex-wrap gap-4 mb-6 bg-white p-4 rounded-xl border">
      <div class="flex items-center gap-3"><label class="font-semibold">Razred</label>
        <select id="ppRazred" onchange="navigate('planprogram')" class="px-3 py-2 border rounded-lg">${DB.razredi.map(r=>`<option value="${r.id}" ${r.id===razredId?'selected':''}>${r.naziv}</option>`).join('')}</select>
      </div>
      <div class="flex items-center gap-3"><label class="font-semibold">Predmet</label>
        <select id="ppPredmet" onchange="navigate('planprogram')" class="px-3 py-2 border rounded-lg">${(currentUser.predmeti||DB.predmeti).map(p=>`<option ${p===predmet?'selected':''}>${p}</option>`).join('')}</select>
      </div>
      <button onclick="dodajLekcijuPP('${key}')" class="ml-auto btn-primary px-4 py-2 rounded-lg font-semibold">+ Nova jedinica</button>
    </div>
    ${lista.length ? `<div class="bg-white border rounded-xl p-4 mb-4">
      <div class="flex justify-between text-sm mb-2"><span class="font-semibold">Napredak: ${done}/${lista.length}</span><span class="font-bold text-blue-700">${pct}%</span></div>
      <div class="w-full bg-gray-200 rounded-full h-3"><div class="bg-gradient-to-r from-blue-500 to-blue-700 h-3 rounded-full transition-all" style="width:${pct}%"></div></div>
    </div>` : ''}
    <div class="bg-white border rounded-xl overflow-hidden">
      <table>
        <thead><tr><th style="width:50px">Br.</th><th style="text-align:left">Nastavna jedinica</th><th style="text-align:left">Opis</th><th style="width:100px">Ostvareno</th><th style="width:140px">Akcije</th></tr></thead>
        <tbody>${lista.length ? lista.map((l,i)=>`<tr class="${l.ostvareno?'bg-green-50':''}">
          <td>${i+1}</td>
          <td style="text-align:left;padding-left:16px"><b>${l.naziv}</b></td>
          <td style="text-align:left" class="text-sm text-gray-600">${l.opis||''}</td>
          <td><input type="checkbox" class="w-5 h-5" ${l.ostvareno?'checked':''} onchange="lekcijaPPCheck('${key}',${i},this.checked)"></td>
          <td>
            <button onclick="dodajLekcijuPP('${key}',${i})" class="text-blue-600 hover:underline mr-2 text-sm">Uredi</button>
            <button onclick="obrisiLekcijuPP('${key}',${i})" class="text-red-600 hover:underline text-sm">Obriši</button>
          </td>
        </tr>`).join('') : '<tr><td colspan="5" class="empty-state">Nema nastavnih jedinica</td></tr>'}</tbody>
      </table>

RENDERERS.mojiraspored = function(c) {

  const now = new Date();
  const monday = new Date(now); monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  const datumiSedmice = {};
  for (let i=0;i<5;i++) { const dt = new Date(monday); dt.setDate(monday.getDate()+i); datumiSedmice[i+1] = dt.toISOString().split('T')[0]; }
  c.innerHTML = `<h2 class="text-3xl font-bold mb-6">Moj raspored - ${getRazredName(u?.razredId)}</h2>
    <p class="text-sm text-gray-500 mb-3">💡 Crvena oznaka znači da imate ispit toga dana iz tog predmeta.</p>
    <div class="bg-white border rounded-xl overflow-hidden">
      <table>
        <thead><tr><th style="width:90px">Vrijeme</th>${dani.map(d=>`<th class="${d===today?'bg-blue-50 text-blue-700':''}">${getDanName(d)}<div class="text-xs font-normal text-gray-500">${fmtDate(datumiSedmice[d])}</div></th>`).join('')}</tr></thead>
        <tbody>${vremena.map(v=>`<tr>
          <td class="font-bold bg-gray-50">${v}</td>
          ${dani.map(d=>{
            const cs = DB.casovi.find(x=>x.razredId===u?.razredId&&x.dan===d&&x.vrijeme===v);
            if (!cs) return '<td class="schedule-cell"><span class="text-gray-300">-</span></td>';
            const dat = datumiSedmice[d];
            const isp = DB.ispitivanja.find(i=>i.razredId===u?.razredId && i.predmet===cs.predmet && i.datum===dat);
            return `<td class="schedule-cell ${isp?'ispitivanje-'+isp.tip:''}">
              <div class="text-sm">
                <div class="font-bold text-blue-700">${cs.predmet}</div>
                <div class="text-xs text-gray-600 mt-1">${getNastavnikName(cs.nastavnikId)}</div>
                ${cs.ucionica?`<div class="text-xs text-gray-500">📍 ${cs.ucionica}</div>`:''}
                ${isp?`<div class="mt-1"><span class="badge bg-red-600 text-white text-[10px]">⚠ ${isp.tip}</span></div>`:''}
              </div>
            </td>`;
          }).join('')}
        </tr>`).join('')}</tbody>
      </table>
    </div>
    ${(()=>{const nadIspiti = DB.ispitivanja.filter(i=>i.razredId===u?.razredId && new Date(i.datum)>=new Date(todayISO())).sort((a,b)=>a.datum.localeCompare(b.datum)).slice(0,5); return nadIspiti.length?`<div class="mt-6"><h3 class="font-bold text-lg mb-3">📅 Nadolazeći ispiti</h3><div class="grid md:grid-cols-2 gap-3">${nadIspiti.map(isp=>{const dl=Math.ceil((new Date(isp.datum)-new Date(todayISO()))/(1000*60*60*24));return `<div class="bg-white border rounded-lg p-3 ispitivanje-${isp.tip}"><div class="flex justify-between"><b>${isp.predmet} - ${isp.tip}</b><span class="badge ${dl<=1?'bg-red-100 text-red-700':dl<=3?'bg-yellow-100 text-yellow-700':'bg-green-100 text-green-700'}">${dl===0?'DANAS':dl+' d'}</span></div><div class="text-sm text-gray-600 mt-1">${isp.naslov} • ${fmtDate(isp.datum)} u ${isp.vrijeme}</div></div>`}).join('')}</div></div>`:''})()}`;

            <div>
              <h3 class="font-bold text-lg">${isp.naslov}</h3>
              <p class="text-sm text-gray-600">${isp.predmet} • ${getRazredName(isp.razredId)}</p>
            </div>
            <span class="badge ${isp.tip==='pismeno'?'bg-red-100 text-red-700':isp.tip==='usmeno'?'bg-orange-100 text-orange-700':isp.tip==='kontrolni'?'bg-yellow-100 text-yellow-700':'bg-blue-100 text-blue-700'}">${isp.tip.toUpperCase()}</span>

function openIspitModal(id) {
  const ex = id ? DB.ispitivanja.find(x=>x.id===id) : { razredId: 0, predmet: '', tip: 'pismeno', naslov: '', datum: todayISO(), vrijeme: '08:00', opis: '' };
  const zad = currentUser.zaduzenja || [];
  const dostupniPredmeti = zad.length ? [...new Set(zad.map(z=>z.predmet))] : (currentUser.predmeti||DB.predmeti);
  showModal(`<h3 class="text-xl font-bold mb-4">${id?'Uredi':'Nova'} najava ispita</h3>
    <form id="isf" class="space-y-3">
      <div><label class="text-sm font-medium block mb-1">Naslov *</label><input name="naslov" value="${ex.naslov}" required class="w-full px-3 py-2 border rounded-lg" placeholder="npr. Pismeni iz brojeva do 1000"></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-sm font-medium block mb-1">Predmet *</label>
          <select name="predmet" id="ispPredmet" onchange="filterRazrediIsp()" class="w-full px-3 py-2 border rounded-lg">
            ${dostupniPredmeti.map(p=>`<option ${p===ex.predmet?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div><label class="text-sm font-medium block mb-1">Razred *</label>
          <select name="razredId" id="ispRazred" class="w-full px-3 py-2 border rounded-lg">
            ${DB.razredi.map(r=>`<option value="${r.id}" ${r.id===ex.razredId?'selected':''}>${r.naziv}</option>`).join('')}
          </select>
        </div>
      </div>
      <div><label class="text-sm font-medium block mb-1">Tip ispitivanja *</label>
        <select name="tip" class="w-full px-3 py-2 border rounded-lg">
          <option value="pismeno" ${ex.tip==='pismeno'?'selected':''}>📝 Pismeno</option>
          <option value="usmeno" ${ex.tip==='usmeno'?'selected':''}>🗣 Usmeno</option>
          <option value="kontrolni" ${ex.tip==='kontrolni'?'selected':''}>📋 Kontrolni</option>
          <option value="test" ${ex.tip==='test'?'selected':''}>✅ Test</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-sm font-medium block mb-1">Datum *</label><input name="datum" type="date" value="${ex.datum}" required class="w-full px-3 py-2 border rounded-lg"></div>
        <div><label class="text-sm font-medium block mb-1">Vrijeme</label><input name="vrijeme" type="time" value="${ex.vrijeme||'08:00'}" class="w-full px-3 py-2 border rounded-lg"></div>
      </div>
      <div><label class="text-sm font-medium block mb-1">Šta će se ispitivati</label><textarea name="opis" class="w-full px-3 py-2 border rounded-lg h-24">${ex.opis||''}</textarea></div>
      <div class="flex justify-end gap-2 pt-4 border-t">
        <button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>
        <button type="submit" class="btn-primary px-4 py-2 rounded-lg">Sačuvaj i obavijesti</button>
      </div>
    </form>`);
  filterRazrediIsp();
  document.getElementById('isf').onsubmit = e => {
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target));
    d.razredId = +d.razredId;
    if (id) Object.assign(ex, d);
    else DB.ispitivanja.push({ id: Date.now(), nastavnikId: currentUser.id, ...d });
    // obavijesti učenike u razredu
    const tipName = {pismeno:'Pismeni',usmeno:'Usmeni',kontrolni:'Kontrolni',test:'Test'}[d.tip];
    const ucenici = DB.ucenici.filter(u=>u.razredId===d.razredId);
    ucenici.forEach(u=>{
      const usr = DB.users.find(x=>x.ucenikId===u.id);
      if (usr) DB.obavijesti.push({ id: Date.now()+Math.random(), naslov: `📢 ${tipName} - ${d.predmet}`, tekst: `${d.naslov} (${fmtDate(d.datum)} u ${d.vrijeme})`, datum: todayISO(), za: null, zaId: usr.id });
    });
    // obavijesti i nastavnike u razredu
    DB.users.filter(usr=>usr.role==='nastavnik' && (usr.zaduzenja||[]).some(z=>z.razrediIds.includes(d.razredId))).forEach(usr=>{
      if (usr.id !== currentUser.id) DB.obavijesti.push({ id: Date.now()+Math.random(), naslov: `Najava ispita: ${d.predmet}`, tekst: `${getRazredName(d.razredId)} - ${d.naslov} (${fmtDate(d.datum)})`, datum: todayISO(), za: null, zaId: usr.id });
    });
    saveData(); closeModal(); navigate('ispitivanja'); showNotification('Ispit najavljen i obavješten!');
  };
}
function filterRazrediIsp() {
  if (!currentUser.zaduzenja) return;
  const p = document.getElementById('ispPredmet').value;
  const zad = currentUser.zaduzenja.find(z=>z.predmet===p);
  const sel = document.getElementById('ispRazred');
  if (zad && zad.razrediIds.length) {
    const cur = sel.value;
    sel.innerHTML = DB.razredi.filter(r=>zad.razrediIds.includes(r.id)).map(r=>`<option value="${r.id}" ${r.id==cur?'selected':''}>${r.naziv}</option>`).join('');
  }
}
function obrisiIspit(id) {
  if (!confirm('Obrisati najavu?')) return;
  DB.ispitivanja = DB.ispitivanja.filter(x=>x.id!==id);
  saveData(); navigate('ispitivanja');
}

        <div class="text-xs text-gray-500">${isp.predmet} • ${fmtDate(isp.datum)}</div>
      </div>`).join('')}
    </div>`:''}`;
};

// =========================== REDARI ===========================
RENDERERS.redari = function(c) {
  // Samo razrednik može dodjeljivati redare svom razredu
  const mojiRazredi = currentUser.razrednikRazredId ? [currentUser.razrednikRazredId] : [];
  if (!mojiRazredi.length) {
    c.innerHTML = `<h2 class="text-3xl font-bold mb-6">Redari</h2>
      <div class="bg-yellow-50 border border-yellow-300 rounded-xl p-6">
        <p class="text-yellow-800">⚠ Samo razrednik može dodjeljivati redare. Vi niste razrednik nijednog razreda.</p>
      </div>
      <h3 class="font-bold mt-6 mb-3">Svi aktualni redari u školi:</h3>
      ${renderAktivnirRedari()}`;
    return;
  }
  const razredId = mojiRazredi[0];
  const aktivni = DB.redari.filter(r=>r.razredId===razredId && new Date(r.datumDo)>=new Date(todayISO())).sort((a,b)=>a.datumOd.localeCompare(b.datumOd));
  const arhiva = DB.redari.filter(r=>r.razredId===razredId && new Date(r.datumDo)<new Date(todayISO())).sort((a,b)=>b.datumOd.localeCompare(a.datumOd)).slice(0,5);
  c.innerHTML = `
    <div class="flex justify-between items-center mb-6">
      <div>
        <h2 class="text-3xl font-bold">Redari</h2>
        <p class="text-gray-500 mt-1">Razrednik razreda <b>${getRazredName(razredId)}</b></p>
      </div>
      <button onclick="openRedarModal()" class="btn-primary px-4 py-2 rounded-lg font-semibold">+ Dodijeli redare</button>
    </div>
    <h3 class="font-bold text-lg mb-3 text-blue-700">🛡 Trenutno aktivni redari</h3>
    <div class="grid md:grid-cols-2 gap-4 mb-6">
      ${aktivni.length ? aktivni.map(r=>{
        const ucenici = r.ucenikIds.map(id=>DB.ucenici.find(u=>u.id===id)).filter(Boolean);
        const danas = new Date(todayISO()) >= new Date(r.datumOd) && new Date(todayISO()) <= new Date(r.datumDo);
        return `<div class="bg-gradient-to-br from-yellow-50 to-orange-50 border-2 ${danas?'border-yellow-400':'border-gray-200'} rounded-xl p-5">
          <div class="flex justify-between items-start mb-3">
            <span class="redar-badge">🛡 REDARI</span>
            <button onclick="obrisiRedare(${r.id})" class="text-red-500 hover:bg-red-50 w-7 h-7 rounded">×</button>
          </div>
          <div class="space-y-1 mb-3">
            ${ucenici.map(u=>`<div class="flex items-center gap-2"><span class="w-7 h-7 bg-yellow-400 text-white rounded-full flex items-center justify-center font-bold text-xs">${u.ime[0]}${u.prezime[0]}</span><b>${u.prezime} ${u.ime}</b></div>`).join('')}
          </div>
          <div class="text-xs text-gray-600 pt-2 border-t">📅 ${fmtDate(r.datumOd)} - ${fmtDate(r.datumDo)} ${danas?'<span class="badge bg-green-100 text-green-700 ml-2">AKTIVNO</span>':''}</div>
        </div>`;
      }).join('') : '<div class="empty-state col-span-2">Nema aktivnih redara</div>'}
    </div>
    ${arhiva.length?`<h3 class="font-bold text-lg mb-3 text-gray-600">📜 Arhiva</h3>
    <div class="bg-white border rounded-xl overflow-hidden">
      <table>
        <thead><tr><th>Period</th><th style="text-align:left">Učenici</th></tr></thead>
        <tbody>${arhiva.map(r=>`<tr><td>${fmtDate(r.datumOd)} - ${fmtDate(r.datumDo)}</td><td style="text-align:left">${r.ucenikIds.map(id=>{const u=DB.ucenici.find(x=>x.id===id);return u?u.prezime+' '+u.ime:''}).join(', ')}</td></tr>`).join('')}</tbody>
      </table>
    </div>`:''}`;
};
function renderAktivnirRedari() {
  const aktivni = DB.redari.filter(r=>new Date(r.datumDo)>=new Date(todayISO())).sort((a,b)=>a.datumOd.localeCompare(b.datumOd));
  if (!aktivni.length) return '<div class="empty-state">Nema aktivnih redara</div>';
  return `<div class="grid md:grid-cols-2 gap-3">${aktivni.map(r=>{
    const ucenici = r.ucenikIds.map(id=>DB.ucenici.find(u=>u.id===id)).filter(Boolean);
    return `<div class="bg-white border rounded-lg p-3">
      <div class="flex justify-between text-sm mb-1"><b>${getRazredName(r.razredId)}</b><span class="text-xs text-gray-500">${fmtDate(r.datumOd)} - ${fmtDate(r.datumDo)}</span></div>
      <div class="text-sm">${ucenici.map(u=>u.prezime+' '+u.ime).join(', ')}</div>
    </div>`;
  }).join('')}</div>`;
}
function openRedarModal() {
  const razredId = currentUser.razrednikRazredId;
  const ucenici = DB.ucenici.filter(u=>u.razredId===razredId);
  // sljedeći ponedjeljak
  const today = new Date();
  const dow = today.getDay();
  const daysToMon = (8 - dow) % 7 || 7;
  const mon = new Date(today); mon.setDate(today.getDate()+daysToMon);
  const fri = new Date(mon); fri.setDate(mon.getDate()+4);
  const monStr = mon.toISOString().split('T')[0];
  const friStr = fri.toISOString().split('T')[0];
  showModal(`<h3 class="text-xl font-bold mb-4">Dodijeli redare</h3>
    <form id="redf" class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="text-sm font-medium block mb-1">Od *</label><input name="datumOd" type="date" value="${monStr}" required class="w-full px-3 py-2 border rounded-lg"></div>
        <div><label class="text-sm font-medium block mb-1">Do *</label><input name="datumDo" type="date" value="${friStr}" required class="w-full px-3 py-2 border rounded-lg"></div>
      </div>
      <div><label class="text-sm font-medium block mb-2">Odaberi učenike (obično 2)</label>
        <div class="max-h-64 overflow-y-auto border rounded-lg p-2 space-y-1">
          ${ucenici.map(u=>`<label class="flex items-center gap-2 p-2 hover:bg-gray-50 cursor-pointer rounded"><input type="checkbox" name="ucenikId" value="${u.id}" class="w-4 h-4"><span>${u.prezime} ${u.ime}</span></label>`).join('')}
        </div>
      </div>
      <div class="flex justify-end gap-2 pt-4 border-t">
        <button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>
        <button type="submit" class="btn-primary px-4 py-2 rounded-lg">Dodijeli</button>
      </div>
    </form>`);
  document.getElementById('redf').onsubmit = e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const ucenikIds = fd.getAll('ucenikId').map(Number);
    if (!ucenikIds.length) { showNotification('Odaberite barem jednog učenika','error'); return; }
    const rec = { id: Date.now(), razredId, ucenikIds, datumOd: fd.get('datumOd'), datumDo: fd.get('datumDo'), postavioId: currentUser.id };
    DB.redari.push(rec);
    // obavještenja učenicima
    ucenikIds.forEach(uid=>{
      const usr = DB.users.find(x=>x.ucenikId===uid);
      if (usr) DB.obavijesti.push({ id: Date.now()+Math.random(), naslov: '🛡 Postavljeni ste za redara', tekst: `Period: ${fmtDate(rec.datumOd)} - ${fmtDate(rec.datumDo)}`, datum: todayISO(), za: null, zaId: usr.id });
    });
    saveData(); closeModal(); navigate('redari'); showNotification('Redari dodijeljeni!');
  };
}
function obrisiRedare(id) {
  if (!confirm('Obrisati?')) return;
  DB.redari = DB.redari.filter(r=>r.id!==id);
  saveData(); navigate('redari');
}

// =========================== PORUKE ===========================
RENDERERS.poruke = function(c) {
  const moje = DB.poruke.filter(p=>p.za===currentUser.id || p.od===currentUser.id).sort((a,b)=>b.datum.localeCompare(a.datum));
  c.innerHTML = `<div class="flex justify-between mb-6">
    <h2 class="text-3xl font-bold">Poruke</h2>
    <button onclick="novaPoruka()" class="btn-primary px-4 py-2 rounded-lg font-semibold">+ Nova poruka</button>
  </div>
  <div class="space-y-3">
    ${moje.length ? moje.map(p=>{
      const odMe = p.od===currentUser.id;
      return `<div class="bg-white border rounded-xl p-4 ${odMe?'border-l-4 border-l-blue-500':'border-l-4 border-l-green-500'}">
        <div class="flex justify-between text-sm mb-2">
          <div><b>${odMe?'Vi':DB.users.find(u=>u.id===p.od)?.name}</b> → <b>${odMe?DB.users.find(u=>u.id===p.za)?.name:'Vi'}</b></div>
          <span class="text-gray-500 text-xs">${p.datum}</span>
        </div>
        <div class="text-gray-700">${p.tekst}</div>
      </div>`;
    }).join('') : '<div class="empty-state">Nema poruka</div>'}
  </div>`;
};
function novaPoruka() {
  showModal(`<h3 class="text-xl font-bold mb-4">Nova poruka</h3>
    <form id="pf" class="space-y-3">
      <div><label class="text-sm font-medium block mb-1">Za *</label>
        <select name="za" required class="w-full px-3 py-2 border rounded-lg">${DB.users.filter(u=>u.id!==currentUser.id).map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('')}</select>
      </div>
      <div><label class="text-sm font-medium block mb-1">Tekst *</label><textarea name="tekst" required class="w-full px-3 py-2 border rounded-lg h-32"></textarea></div>
      <div class="flex justify-end gap-2 pt-4 border-t">
        <button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>
        <button type="submit" class="btn-primary px-4 py-2 rounded-lg">Pošalji</button>
      </div>
    </form>`);
  document.getElementById('pf').onsubmit = e => {
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target));
    DB.poruke.push({ id: Date.now(), od: currentUser.id, za: +d.za, tekst: d.tekst, datum: new Date().toLocaleString('sr-RS') });
    DB.obavijesti.push({ id: Date.now()+1, naslov: 'Nova poruka od '+currentUser.name, tekst: d.tekst.slice(0,80)+(d.tekst.length>80?'...':''), datum: todayISO(), za: null, zaId: +d.za });
    saveData(); closeModal(); navigate('poruke'); showNotification('Poruka poslana!');
  };
}

// =========================== POSTAVKE ===========================
RENDERERS.postavke = function(c) {
  c.innerHTML = `<h2 class="text-3xl font-bold mb-6">Postavke</h2>
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-white border rounded-xl p-6">
        <h3 class="font-bold text-lg mb-4">👤 Profil</h3>
        <form id="profForm" class="space-y-3">
          <div><label class="text-sm font-medium block mb-1">Ime i prezime</label><input name="name" value="${currentUser.name}" class="w-full px-3 py-2 border rounded-lg"></div>
          <div><label class="text-sm font-medium block mb-1">Email</label><input name="email" value="${currentUser.email||''}" class="w-full px-3 py-2 border rounded-lg"></div>
          <div><label class="text-sm font-medium block mb-1">Nova lozinka</label><input name="password" type="text" value="${currentUser.password}" class="w-full px-3 py-2 border rounded-lg"></div>
          <button type="submit" class="btn-primary px-4 py-2 rounded-lg w-full mt-3">Sačuvaj profil</button>
        </form>
      </div>
      ${currentUser.role==='admin'?`<div class="bg-white border rounded-xl p-6">
        <h3 class="font-bold text-lg mb-4">🏫 Škola</h3>
        <form id="skolaForm" class="space-y-3">
          <div><label class="text-sm font-medium block mb-1">Naziv škole</label><input name="naziv" value="${DB.skola.naziv}" class="w-full px-3 py-2 border rounded-lg"></div>
          <div><label class="text-sm font-medium block mb-1">Adresa</label><input name="adresa" value="${DB.skola.adresa}" class="w-full px-3 py-2 border rounded-lg"></div>
          <div><label class="text-sm font-medium block mb-1">Školska godina</label><input name="godina" value="${DB.skola.godina}" class="w-full px-3 py-2 border rounded-lg"></div>
          <button type="submit" class="btn-primary px-4 py-2 rounded-lg w-full mt-3">Sačuvaj</button>
        </form>
      </div>
      <div class="bg-white border rounded-xl p-6 md:col-span-2">
        <h3 class="font-bold text-lg mb-4 text-red-700">⚠ Sistem</h3>
        <div class="flex gap-3 flex-wrap">
          <button onclick="exportData()" class="btn-secondary px-4 py-2 rounded-lg">📥 Izvezi podatke (JSON)</button>
          <button onclick="document.getElementById('importFile').click()" class="btn-secondary px-4 py-2 rounded-lg">📤 Uvezi podatke</button>
          <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(this)">
          <button onclick="if(confirm('Resetovati sve?')){localStorage.removeItem('edn_data_v3');location.reload();}" class="btn-danger px-4 py-2 rounded-lg">🗑 Resetuj sve</button>
        </div>
      </div>`:''}
    </div>`;
  document.getElementById('profForm').onsubmit = e => {
    e.preventDefault();
    const d = Object.fromEntries(new FormData(e.target));
    Object.assign(currentUser, d);
    const u = DB.users.find(x=>x.id===currentUser.id);
    Object.assign(u, d);
    saveData();
    document.getElementById('userBadge').textContent = currentUser.name;
    showNotification('Profil sačuvan!');
  };
  const sf = document.getElementById('skolaForm');
  if (sf) sf.onsubmit = e => {
    e.preventDefault();
    Object.assign(DB.skola, Object.fromEntries(new FormData(e.target)));
    saveData(); showNotification('Postavke škole sačuvane!');
  };
};

function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'edn-backup-'+todayISO()+'.json';
  a.click();
  showNotification('Backup preuzet!');
}
function importData(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (confirm('Učitati podatke? Trenutni podaci će biti zamijenjeni.')) {
        DB = d; saveData(); location.reload();
      }
    } catch(e) { showNotification('Greška pri učitavanju!', 'error'); }
  };
  r.readAsText(file);
}

// =========================== MODAL ===========================
function showModal(html) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="fixed inset-0 modal-bg flex items-center justify-center z-50 p-4" onclick="if(event.target===this)closeModal()">
      <div class="modal-content bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[92vh] overflow-y-auto">${html}</div>
    </div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
</script>
</body>
</html>
