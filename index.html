      '<div class="font-semibold flex-1">'+escapeHtml(u.prezime+' '+u.ime)+'</div>'+
      '<div class="flex gap-1 flex-wrap items-center">'+
      [1,2,3,4,5].map(function(v){
        return '<button onclick="postaviOcjenuIspit('+ispitId+','+u.id+','+v+',this)" class="ocjena-chip ocjena-'+v+(postOcj&&postOcj.vrijednost==v?' ring-2 ring-blue-600':'')+'" style="cursor:pointer;width:34px;height:34px;font-size:1.1rem">'+v+'</button>';
      }).join('')+
      '<button onclick="postaviOcjenuIspit('+ispitId+','+u.id+',\'NPS\',this)" class="ocjena-chip ocjena-NPS'+(postOcj&&postOcj.vrijednost==='NPS'?' ring-2 ring-blue-600':'')+'" style="cursor:pointer;height:34px;font-size:.7rem">NPS</button>'+
      (postOcj?'<button onclick="ukloniOcjenuIspit('+ispitId+','+u.id+')" class="text-red-500 hover:bg-red-50 w-7 h-7 rounded ml-1" title="Ukloni">×</button>':'')+
      '</div></div>';
  });
  
  html += '</div>'+
    '<div class="flex justify-end mt-4 pt-3 border-t">'+
    '<button onclick="closeModal()" class="btn-primary px-4 py-2 rounded-lg">Završi</button>'+
    '</div>';
  showModal(html);
}

function postaviOcjenuIspit(ispitId, ucenikId, vrijednost, btnEl) {
  const isp = DB.ispitivanja.find(x=>x.id===ispitId);
  if (!isp) return;
  const sem = getCurrentSemester();
  if (isSemesterZatvoren(sem)) {
    showNotification('🔒 Semestar zatvoren', 'error'); return;
  }
  const tipOcjene = isp.tip==='pismeno' || isp.tip==='kontrolni' || isp.tip==='test' ? 'pismena' : isp.tip==='usmeno' ? 'usmena' : 'aktivnost';
  // Ukloni postojeću za ovaj ispit
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===ucenikId && o.predmet===isp.predmet && o.ispitId===ispitId));
  // Dodaj novu
  DB.ocjene.push({ 
    id:Date.now()+Math.random(), 
    ucenikId:ucenikId, predmet:isp.predmet, tip:tipOcjene, 
    vrijednost:vrijednost, datum:isp.datum, semestar:sem, 
    nastavnikId:currentUser.id, zamjenjuje:null, zamjenjeno:false, zakljucna:false,
    ispitId:ispitId, biljeska:'Iz ispita: '+isp.naslov
  });
  // Obavještenje
  const usr = DB.users.find(u=>u.ucenikId===ucenikId);
  if (usr) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'⭐ Ocjena iz ispita', tekst:isp.predmet+' ('+isp.tip+'): '+vrijednost, datum:todayISO(), za:null, zaId:usr.id });
  saveData();
  showNotification('Ocjena '+vrijednost+' upisana za '+(DB.ucenici.find(u=>u.id===ucenikId)||{}).ime);
  // Re-render modal
  upisOcjenaIspit(ispitId);
}

function ukloniOcjenuIspit(ispitId, ucenikId) {
  if (!confirm('Ukloniti ocjenu?')) return;
  const isp = DB.ispitivanja.find(x=>x.id===ispitId);
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===ucenikId && o.predmet===isp.predmet && o.ispitId===ispitId));
  saveData();
  upisOcjenaIspit(ispitId);
}

function osvjeziUceniciSelect(preselected) {
  const razredId = +(document.getElementById('isfRazred')?.value || DB.razredi[0]?.id);
  const ucenici = DB.ucenici.filter(u=>u.razredId===razredId);
  const cont = document.getElementById('isfUceniciLista');
  if (!cont) return;
  cont.innerHTML = ucenici.map(function(u){
    const checked = preselected && preselected.indexOf(u.id)>=0 ? 'checked' : '';
    return '<label class="flex items-center gap-2 p-1.5 hover:bg-gray-50 cursor-pointer rounded text-sm">'+
      '<input type="checkbox" class="isfUcenikCb w-4 h-4" value="'+u.id+'" '+checked+'>'+
      '<span>'+escapeHtml(u.prezime+' '+u.ime)+'</span></label>';
  }).join('');
}
function toggleUceniciSelect() {
  const radio = document.querySelector('input[name="komeIspit"]:checked');
  if (!radio) return;
  document.getElementById('isfUcenici').classList.toggle('hidden', radio.value!=='pojedinacno');
}
function selektujSveUcenike(svi) {
  document.querySelectorAll('.isfUcenikCb').forEach(c=>c.checked=svi);
}

function obrisiIspit(id) { 
  if (!confirm('Obrisati ispit?')) return;
  DB.ispitivanja = DB.ispitivanja.filter(x=>x.id!==id); 
  saveData(); closeModal(); navigate('ispitivanja'); 
  showNotification('Ispit obrisan');
}

    };

      data.id = Date.now();
      data.postavioId = currentUser.id;
      DB.popravni.push(data);
    }
    const tipoviStr = tipovi.map(t=>t.toUpperCase()).join('+');

    const ucenik = DB.ucenici.find(u=>u.id===data.ucenikId);

      tekst:data.predmet+' ('+tipoviStr+') - '+fmtDate(data.datum)+' u '+data.vrijeme+(data.mjesto?', '+data.mjesto:''),

        id:Date.now()+2, 
        naslov:'🎯 Dodijeljen popravni ispit', 
        tekst:'Ispitivat ćete '+ucenik.prezime+' '+ucenik.ime+' ('+data.predmet+', '+tipoviStr+') '+fmtDate(data.datum), 
        datum:todayISO(), za:null, zaId:data.nastavnikId 
      });
    }
    // razrednik
    const razrednik = DB.users.find(usr=>usr.role==='nastavnik' && usr.razrednikRazredId===ucenik.razredId);
    if (razrednik && razrednik.id !== currentUser.id && razrednik.id !== data.nastavnikId) {
      DB.obavijesti.push({ 
        id:Date.now()+3, 
        naslov:'🎯 Popravni ispit u vašem razredu', 
        tekst:ucenik.prezime+' '+ucenik.ime+' - '+data.predmet+' ('+tipoviStr+') '+fmtDate(data.datum), 
        datum:todayISO(), za:null, zaId:razrednik.id 
      });
    }
    saveData(); closeModal(); navigate('popravni'); 
    showNotification(id?'Popravni izmijenjen':'Popravni ispit zakazan i obaviješteni!');
  };
}

// Helper - vraća listu tipova za popravni (kompatibilan sa starim formatom)
function getPopravniTipovi(p) {
  if (!p) return [];
  if (p.tipoviIspita && p.tipoviIspita.length) return p.tipoviIspita;
  if (p.tipIspita) return [p.tipIspita];
  return [];
}
function tipIcon(t) {
  return t==='pismeno'?'📝':t==='usmeno'?'🗣':t==='praksa'?'🛠':'📋';
}
function tipOcjeneOd(t) {
  // pismeno/kontrolni/test → pismena, usmeno → usmena, praksa → aktivnost
  if (t==='pismeno' || t==='kontrolni' || t==='test') return 'pismena';
  if (t==='usmeno') return 'usmena';
  return 'aktivnost';
}

function obrisiPopravni(id) {
  if (!confirm('🗑 Obrisati popravni ispit? Ako ima ocjenu, ona ostaje upisana u dnevnik.')) return;
  DB.popravni = DB.popravni.filter(p=>p.id!==id);
  saveData(); closeModal(); navigate('popravni'); showNotification('Popravni obrisan');
}

function oznaciPropusten(id) {
  const p = DB.popravni.find(x=>x.id===id);
  if (!p) return;
  if (!confirm('Učenik propustio popravni? Označit će se kao propušten.')) return;
  p.status = 'propusteno';
  const usr = DB.users.find(x=>x.ucenikId===p.ucenikId);
  if (usr) DB.obavijesti.push({ id:Date.now(), naslov:'✗ Propušten popravni', tekst:p.predmet+' ('+p.tipIspita+') - '+fmtDate(p.datum), datum:todayISO(), za:null, zaId:usr.id });
  saveData(); navigate('popravni'); showNotification('Označen kao propušten');
}

function upisOcjenuPopravni(id) {
  const p = DB.popravni.find(x=>x.id===id);
  if (!p) return;
  const sem = getCurrentSemester();
  if (isSemesterZatvoren(sem)) {
    const semInfo = getSemesterInfo(sem);
    showNotification('🔒 '+(semInfo?semInfo.naziv:'Semestar')+' je ZATVOREN. Admin mora otvoriti.', 'error'); return;
  }
  const u = DB.ucenici.find(x=>x.id===p.ucenikId);
  if (!u) return;
  const tipovi = getPopravniTipovi(p);
  if (!tipovi.length) { showNotification('Popravni nema definisanih tipova','error'); return; }
  
  // sve postojeće ocjene za svaki tip
  let html = '<h3 class="text-xl font-bold mb-1">🎯 Upiši ocjene - POPRAVNI</h3>'+
    '<p class="text-sm text-gray-600 mb-1">Učenik: <b>'+escapeHtml(u.prezime+' '+u.ime)+'</b></p>'+
    '<p class="text-sm text-gray-600 mb-4">'+escapeHtml(p.predmet)+' • '+fmtDate(p.datum)+'</p>';
  
  // Za SVAKI tip - panel sa ocjenama
  tipovi.forEach(function(tip){
    const tipOcj = tipOcjeneOd(tip);
    const postOcj = DB.ocjene.find(o=>o.ucenikId===p.ucenikId && o.predmet===p.predmet && o.popravniId===p.id && o.tipPopravnog===tip);
    html += '<div class="bg-purple-50 border-2 border-purple-200 rounded-xl p-3 mb-3">'+
      '<div class="flex justify-between items-center mb-2">'+
      '<b class="text-purple-900 text-lg">'+tipIcon(tip)+' '+tip.toUpperCase()+'</b>'+
      '<span class="text-xs text-purple-700">upisuje se kao <b>'+tipOcj.toUpperCase()+'</b></span>'+
      '</div>'+
      (postOcj?'<div class="bg-green-50 border border-green-300 rounded p-2 mb-2 text-sm flex justify-between items-center">'+
        '<span>✓ Već upisana: <b>'+postOcj.vrijednost+'</b></span>'+
        '<button onclick="ukloniPopravnuOcjenu('+p.id+',\''+tip+'\')" class="text-red-600 hover:underline text-xs">Ukloni</button>'+
        '</div>':'')+
      '<div class="grid grid-cols-5 gap-1 mb-1">'+
      [1,2,3,4,5].map(v=>'<button onclick="postaviPopravniOcjenu('+p.id+',\''+tip+'\','+v+')" class="ocjena-chip ocjena-'+v+(postOcj&&postOcj.vrijednost==v?' ring-2 ring-blue-600':'')+'" style="height:48px;font-size:1.4rem">'+v+'</button>').join('')+
      '</div>'+
      '<button onclick="postaviPopravniOcjenu('+p.id+',\''+tip+'\',\'NPS\')" class="ocjena-chip ocjena-NPS w-full'+(postOcj&&postOcj.vrijednost==='NPS'?' ring-2 ring-blue-600':'')+'" style="height:36px;font-size:.85rem">NPS - Nije pristupio</button>'+
      '</div>';
  });
  
  html += '<div class="flex justify-end mt-4 pt-3 border-t">'+
    '<button onclick="closeModal()" class="btn-primary px-4 py-2 rounded-lg font-semibold">Završi</button>'+
    '</div>';
  showModal(html);
}

function postaviPopravniOcjenu(popravniId, tip, vrijednost) {
  const p = DB.popravni.find(x=>x.id===popravniId);
  if (!p) return;
  const sem = getCurrentSemester();
  if (isSemesterZatvoren(sem)) { showNotification('🔒 Semestar zatvoren', 'error'); return; }
  const tipOcjene = tipOcjeneOd(tip);
  // Ukloni postojeću za ovaj tip
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===p.ucenikId && o.predmet===p.predmet && o.popravniId===popravniId && o.tipPopravnog===tip));
  // Dodaj novu
  DB.ocjene.push({
    id: Date.now()+Math.random(),
    ucenikId: p.ucenikId,
    predmet: p.predmet,
    tip: tipOcjene,
    vrijednost: vrijednost,
    datum: p.datum,
    semestar: p.semestar || sem,
    nastavnikId: currentUser.id,
    zamjenjuje: null,
    zamjenjeno: false,
    zakljucna: false,
    popravniId: popravniId,
    tipPopravnog: tip,
    biljeska: 'Iz popravnog ('+tip+')'
  });
  // status - održan ako su SVI tipovi ocijenjeni
  const tipovi = getPopravniTipovi(p);
  const sveOcjene = DB.ocjene.filter(o=>o.popravniId===popravniId);
  if (sveOcjene.length >= tipovi.length) {
    p.status = 'odrzano';
  }
  // obavjestenje uceniku
  const usr = DB.users.find(u=>u.ucenikId===p.ucenikId);
  if (usr) DB.obavijesti.push({ 
    id:Date.now()+1, 
    naslov:'⭐ Ocjena iz POPRAVNOG ('+tip+')', 
    tekst:p.predmet+': '+vrijednost, 
    datum:todayISO(), za:null, zaId:usr.id 
  });
  saveData();
  showNotification('✓ Ocjena '+vrijednost+' upisana ('+tip+')!');
  // Re-render modal
  upisOcjenuPopravni(popravniId);
}

function ukloniPopravnuOcjenu(popravniId, tip) {
  if (!confirm('Ukloniti ocjenu iz dnevnika?')) return;
  const p = DB.popravni.find(x=>x.id===popravniId);
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===p.ucenikId && o.predmet===p.predmet && o.popravniId===popravniId && o.tipPopravnog===tip));
  saveData();
  upisOcjenuPopravni(popravniId);
}

function openRedarModal() {
  const razredId = currentUser.razrednikRazredId;
  const ucenici = DB.ucenici.filter(u=>u.razredId===razredId);
  const today = new Date();
  const days = (8-today.getDay())%7 || 7;
  const mon = new Date(today); mon.setDate(today.getDate()+days);
  const fri = new Date(mon); fri.setDate(mon.getDate()+4);
  showModal('<h3 class="text-xl font-bold mb-4">🛡 Dodijeli redare</h3>'+
    '<form id="redf" class="space-y-3">'+
    '<div class="grid grid-cols-2 gap-3"><div><label class="text-sm">Od *</label><input name="datumOd" type="date" required value="'+mon.toISOString().split('T')[0]+'" class="w-full px-3 py-2 border rounded-lg"></div>'+
    '<div><label class="text-sm">Do *</label><input name="datumDo" type="date" required value="'+fri.toISOString().split('T')[0]+'" class="w-full px-3 py-2 border rounded-lg"></div></div>'+
    '<div><label class="text-sm">Odaberi učenike (obično 2)</label><div class="max-h-64 overflow-y-auto border rounded-lg p-2 space-y-1">'+
    ucenici.map(u=>'<label class="flex items-center gap-2 p-2 hover:bg-gray-50 cursor-pointer rounded"><input type="checkbox" name="ucenikId" value="'+u.id+'" class="w-4 h-4"><span>'+escapeHtml(u.prezime+' '+u.ime)+'</span></label>').join('')+
    '</div></div>'+
    '<div class="flex justify-end gap-2 pt-4"><button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button><button type="submit" class="btn-primary px-4 py-2 rounded-lg">Dodijeli</button></div>'+
    '</form>');
  document.getElementById('redf').onsubmit = function(e) {
    e.preventDefault(); const fd = new FormData(e.target);
    const ucenikIds = fd.getAll('ucenikId').map(Number);
    if (!ucenikIds.length) { showNotification('Odaberite barem jednog!','error'); return; }
    DB.redari.push({ id:Date.now(), razredId:razredId, ucenikIds:ucenikIds, datumOd:fd.get('datumOd'), datumDo:fd.get('datumDo'), postavioId:currentUser.id });
    ucenikIds.forEach(function(uid){
      const usr = DB.users.find(x=>x.ucenikId===uid);
      if (usr) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'🛡 Postavljeni za redara', tekst:fmtDate(fd.get('datumOd'))+' - '+fmtDate(fd.get('datumDo')), datum:todayISO(), za:null, zaId:usr.id });
    });
    saveData(); closeModal(); navigate('redari'); showNotification('Redari dodijeljeni!');
  };
}
function obrisiRedare(id) { if (confirm('Obrisati?')) { DB.redari = DB.redari.filter(r=>r.id!==id); saveData(); navigate('redari'); } }

// ----- MOJ RAZRED (razrednik vidi sve o svojim učenicima) -----
RENDERERS.mojrazred = function(c, state) {
  state = state || {};
  if (!currentUser.razrednikRazredId) {
    c.innerHTML = '<h2 class="text-3xl font-bold mb-6">🏫 Moj razred</h2>'+
      '<div class="bg-yellow-50 border border-yellow-300 rounded-xl p-6">'+
      '<p class="text-yellow-800">⚠ Niste razrednik nijednog razreda.</p></div>';
    return;
  }
  
  // Ako je odabran učenik - prikaži profil
  if (state.ucenikId) return renderUcenikProfil(c, state.ucenikId);
  
  const razredId = currentUser.razrednikRazredId;
  const ucenici = DB.ucenici.filter(u=>u.razredId===razredId);
  const danas = todayISO();
  
  // Statistike razreda
  const sveOcj = DB.ocjene.filter(o=>{const u=DB.ucenici.find(x=>x.id===o.ucenikId);return u && u.razredId===razredId && !o.zamjenjeno && !o.zakljucna;});
  const prosjekRazreda = avgOcjena(sveOcj);
  const sviIzost = DB.prisustva.filter(p=>{const u=DB.ucenici.find(x=>x.id===p.ucenikId);return u && u.razredId===razredId && p.status==='O';}).length;
  const sviKasnjenja = DB.prisustva.filter(p=>{const u=DB.ucenici.find(x=>x.id===p.ucenikId);return u && u.razredId===razredId && p.status==='K';}).length;
  const pravdanjeNaCekanju = DB.pravdanja.filter(p=>{const u=DB.ucenici.find(x=>x.id===p.ucenikId);return u && u.razredId===razredId && p.status==='cekanje';}).length;
  const redariDanas = DB.redari.find(r=>r.razredId===razredId && new Date(danas)>=new Date(r.datumOd) && new Date(danas)<=new Date(r.datumDo));
  
  let html = '<div class="flex flex-wrap justify-between items-center gap-3 mb-4">'+
    '<div><h2 class="text-3xl font-bold">🏫 Moj razred: '+getRazredName(razredId)+'</h2>'+
    '<p class="text-gray-500 mt-1">Razrednik ste razreda • '+ucenici.length+' učenika • Šk. godina '+escapeHtml(DB.skola.godina)+'</p></div>'+
    '<div class="flex gap-2 flex-wrap">'+
    '<button onclick="navigate(\'redari\')" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-1">🛡 Redari</button>'+
    '<button onclick="navigate(\'pravdanja_razrednik\')" class="btn-secondary px-4 py-2 rounded-lg text-sm flex items-center gap-1">📝 Pravdanja'+(pravdanjeNaCekanju?' <span class="bg-red-500 text-white rounded-full px-1.5 text-xs">'+pravdanjeNaCekanju+'</span>':'')+'</button>'+
    '</div></div>';
  
  // STATISTIKE
  html += '<div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">'+
    '<div class="bg-gradient-to-br from-blue-500 to-blue-700 text-white rounded-xl p-4 text-center"><div class="text-3xl font-bold">'+ucenici.length+'</div><div class="text-xs opacity-90 mt-1">Učenika</div></div>'+
    '<div class="bg-gradient-to-br from-green-500 to-green-700 text-white rounded-xl p-4 text-center"><div class="text-3xl font-bold">'+prosjekRazreda+'</div><div class="text-xs opacity-90 mt-1">Prosjek</div></div>'+
    '<div class="bg-gradient-to-br from-red-500 to-red-700 text-white rounded-xl p-4 text-center"><div class="text-3xl font-bold">'+sviIzost+'</div><div class="text-xs opacity-90 mt-1">Izostanaka</div></div>'+
    '<div class="bg-gradient-to-br from-orange-500 to-orange-700 text-white rounded-xl p-4 text-center"><div class="text-3xl font-bold">'+sviKasnjenja+'</div><div class="text-xs opacity-90 mt-1">Kašnjenja</div></div>'+
    '<div class="bg-gradient-to-br from-yellow-500 to-yellow-700 text-white rounded-xl p-4 text-center"><div class="text-3xl font-bold">'+pravdanjeNaCekanju+'</div><div class="text-xs opacity-90 mt-1">Pravdanja čeka</div></div>'+
    '</div>';
  
  // Današnji redari
  html += '<div class="bg-gradient-to-r from-yellow-50 to-orange-50 border border-yellow-300 rounded-xl p-4 mb-4">'+
    '<div class="flex flex-wrap justify-between items-center gap-3">'+
    '<div class="flex items-center gap-3"><span class="text-3xl">🛡</span>'+
    '<div><b class="text-yellow-900">Današnji redari</b>'+
    (redariDanas?'<div class="text-sm text-yellow-800">'+redariDanas.ucenikIds.map(id=>{const u=DB.ucenici.find(x=>x.id===id);return u?u.prezime+' '+u.ime:'';}).filter(Boolean).join(', ')+' ('+fmtDate(redariDanas.datumOd)+' - '+fmtDate(redariDanas.datumDo)+')</div>':'<div class="text-sm text-yellow-700">Niste dodijelili redare za danas</div>')+
    '</div></div>'+
    '<button onclick="navigate(\'redari\')" class="btn-primary px-4 py-2 rounded-lg text-sm">'+(redariDanas?'Upravljaj':'Dodijeli')+' →</button>'+
    '</div></div>';
  
  // TABELA UČENIKA - SVI PODACI
  const sortBy = document.getElementById('mrSort')?.value || 'prezime';
  let sortedUcenici = ucenici.slice();
  if (sortBy==='prosjek') sortedUcenici.sort((a,b)=>(parseFloat(avgOcjena(DB.ocjene.filter(o=>o.ucenikId===b.id && !o.zamjenjeno && !o.zakljucna)))||0)-(parseFloat(avgOcjena(DB.ocjene.filter(o=>o.ucenikId===a.id && !o.zamjenjeno && !o.zakljucna)))||0));
  else if (sortBy==='izostanci') sortedUcenici.sort((a,b)=>DB.prisustva.filter(p=>p.ucenikId===b.id && p.status!=='P').length-DB.prisustva.filter(p=>p.ucenikId===a.id && p.status!=='P').length);
  else sortedUcenici.sort((a,b)=>a.prezime.localeCompare(b.prezime));
  
  html += '<div class="bg-white border rounded-xl shadow-sm overflow-hidden">'+
    '<div class="p-4 border-b bg-gradient-to-r from-blue-600 to-blue-700 text-white flex flex-wrap justify-between items-center gap-3">'+
    '<h3 class="font-bold text-lg">👥 Svi učenici - klikni za detalje</h3>'+
    '<select id="mrSort" onchange="navigate(\'mojrazred\')" class="px-3 py-1.5 border rounded-lg text-sm text-gray-800">'+
    '<option value="prezime"'+(sortBy==='prezime'?' selected':'')+'>Sortiraj: Prezime</option>'+
    '<option value="prosjek"'+(sortBy==='prosjek'?' selected':'')+'>Sortiraj: Najbolji prosjek</option>'+
    '<option value="izostanci"'+(sortBy==='izostanci'?' selected':'')+'>Sortiraj: Najviše izostanaka</option>'+
    '</select></div>'+
    '<div class="overflow-x-auto"><table class="w-full">'+
    '<thead><tr><th>#</th><th style="text-align:left">Učenik</th><th>Prosjek</th><th>Predmeta</th><th>Izostanaka</th><th>Kašnjenja</th><th>Neopravdano</th><th>Akcije</th></tr></thead><tbody>';
  
  sortedUcenici.forEach(function(u,i){
    const ocj = DB.ocjene.filter(o=>o.ucenikId===u.id && !o.zamjenjeno && !o.zakljucna);
    const prosjek = avgOcjena(ocj);
    const brPredmeta = [...new Set(ocj.map(o=>o.predmet))].length;
    const izost = DB.prisustva.filter(p=>p.ucenikId===u.id && p.status==='O').length;
    const kasnjenja = DB.prisustva.filter(p=>p.ucenikId===u.id && p.status==='K').length;
    // neopravdana = O bez odobrenog pravdanja
    const neopravdana = DB.prisustva.filter(p=>p.ucenikId===u.id && p.status==='O' && !DB.pravdanja.find(pr=>pr.ucenikId===u.id && pr.status==='odobreno' && pr.datumOd<=p.datum && pr.datumDo>=p.datum)).length;
    const avgNum = parseFloat(prosjek)||0;
    html += '<tr class="cursor-pointer hover:bg-blue-50" onclick="navigate(\'mojrazred\',{ucenikId:'+u.id+'})">'+
      '<td class="font-semibold text-gray-500">'+(i+1)+'</td>'+
      '<td style="text-align:left;padding-left:16px"><div class="flex items-center gap-3">'+
      '<div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 text-white font-bold flex items-center justify-center text-sm">'+escapeHtml(u.ime[0]+u.prezime[0])+'</div>'+
      '<div><div class="font-semibold">'+escapeHtml(u.prezime+' '+u.ime)+'</div></div></div></td>'+
      '<td><span class="font-bold text-xl '+(avgNum>=4?'text-green-700':avgNum>=3?'text-blue-700':avgNum>=2?'text-yellow-700':avgNum>=1?'text-red-700':'text-gray-400')+'">'+prosjek+'</span></td>'+
      '<td>'+brPredmeta+'</td>'+
      '<td>'+(izost>0?'<span class="badge bg-red-100 text-red-700">'+izost+'</span>':'<span class="text-gray-400">0</span>')+'</td>'+
      '<td>'+(kasnjenja>0?'<span class="badge bg-orange-100 text-orange-700">'+kasnjenja+'</span>':'<span class="text-gray-400">0</span>')+'</td>'+
      '<td>'+(neopravdana>0?'<span class="badge bg-red-100 text-red-700 font-bold">⚠ '+neopravdana+'</span>':'<span class="badge bg-green-100 text-green-700">✓ 0</span>')+'</td>'+
      '<td><button onclick="event.stopPropagation();navigate(\'mojrazred\',{ucenikId:'+u.id+'})" class="text-blue-600 hover:underline text-sm font-semibold">Detalji →</button></td>'+
      '</tr>';
  });
  html += '</tbody></table></div></div>';
  
  c.innerHTML = html;
};

// Detaljni profil učenika
function renderUcenikProfil(c, ucenikId) {
  const u = DB.ucenici.find(x=>x.id===ucenikId);
  if (!u) { navigate('mojrazred'); return; }
  const userAcc = DB.users.find(usr=>usr.ucenikId===ucenikId);
  const ocj = DB.ocjene.filter(o=>o.ucenikId===ucenikId);
  const aktivne = ocj.filter(o=>!o.zamjenjeno && !o.zakljucna);
  const prosjek = avgOcjena(aktivne);
  const pris = DB.prisustva.filter(p=>p.ucenikId===ucenikId);
  const izost = pris.filter(p=>p.status==='O').length;
  const kasnjenja = pris.filter(p=>p.status==='K').length;
  const opravdano = pris.filter(p=>p.status==='I').length;
  const neopravdano = pris.filter(p=>p.status==='O' && !DB.pravdanja.find(pr=>pr.ucenikId===ucenikId && pr.status==='odobreno' && pr.datumOd<=p.datum && pr.datumDo>=p.datum)).length;
  const ukKasnjenje = pris.filter(p=>p.status==='K').reduce((s,p)=>s+(p.kasnjenjeMin||0),0);
  
  // Sve predmete
  const predmeti = [];
  DB.casovi.filter(cs=>cs.razredId===u.razredId).forEach(cs=>{ if (predmeti.indexOf(cs.predmet)<0) predmeti.push(cs.predmet); });
  ocj.forEach(o=>{ if (predmeti.indexOf(o.predmet)<0) predmeti.push(o.predmet); });
  
  const pravdanja = DB.pravdanja.filter(p=>p.ucenikId===ucenikId).sort((a,b)=>(b.datumPodnosenja||'').localeCompare(a.datumPodnosenja||''));
  
  let html = '<button onclick="navigate(\'mojrazred\')" class="btn-secondary px-3 py-2 rounded-lg mb-4 text-sm">← Nazad na razred</button>';
  
  // Header profila
  html += '<div class="bg-gradient-to-r from-blue-600 to-blue-800 text-white rounded-2xl p-6 mb-4 shadow-lg">'+
    '<div class="flex flex-wrap items-center gap-4">'+
    '<div class="w-20 h-20 rounded-full bg-white text-blue-700 font-bold flex items-center justify-center text-3xl">'+escapeHtml(u.ime[0]+u.prezime[0])+'</div>'+
    '<div class="flex-1 min-w-0">'+
    '<h2 class="text-3xl font-bold">'+escapeHtml(u.prezime+' '+u.ime)+'</h2>'+
    '<p class="text-blue-100 mt-1">Razred <b>'+getRazredName(u.razredId)+'</b>'+(userAcc?' • Korisnik: <code class="bg-white/20 px-2 py-0.5 rounded">'+userAcc.username+'</code>':' • <span class="text-yellow-200">Nema korisničkog naloga</span>')+'</p>'+
    '</div>'+
    '<div class="text-center">'+
    '<div class="text-4xl font-bold">'+prosjek+'</div>'+
    '<div class="text-xs opacity-90">Ukupan prosjek</div>'+
    '</div></div></div>';
  
  // Statistike učenika
  html += '<div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">'+
    '<div class="bg-white border rounded-xl p-4 text-center"><div class="text-2xl font-bold text-blue-700">'+aktivne.length+'</div><div class="text-xs text-gray-600 mt-1">Aktivnih ocjena</div></div>'+
    '<div class="bg-white border rounded-xl p-4 text-center"><div class="text-2xl font-bold text-red-700">'+izost+'</div><div class="text-xs text-gray-600 mt-1">Izostanaka</div></div>'+
    '<div class="bg-white border rounded-xl p-4 text-center"><div class="text-2xl font-bold text-orange-700">'+kasnjenja+'</div><div class="text-xs text-gray-600 mt-1">Kašnjenja'+(ukKasnjenje?' ('+ukKasnjenje+'min)':'')+'</div></div>'+
    '<div class="bg-white border rounded-xl p-4 text-center"><div class="text-2xl font-bold text-yellow-700">'+opravdano+'</div><div class="text-xs text-gray-600 mt-1">Opravdano</div></div>'+
    '<div class="bg-white border rounded-xl p-4 text-center"><div class="text-2xl font-bold '+(neopravdano>0?'text-red-700':'text-green-700')+'">'+neopravdano+'</div><div class="text-xs text-gray-600 mt-1">Neopravdano</div></div>'+
    '</div>';
  
  // Pravdanja na čekanju
  const pravdanjeCekanju = pravdanja.filter(p=>p.status==='cekanje');
  if (pravdanjeCekanju.length) {
    html += '<div class="bg-yellow-50 border-l-4 border-yellow-500 rounded-xl p-4 mb-4">'+
      '<div class="flex justify-between items-center"><div><b class="text-yellow-900">📝 '+pravdanjeCekanju.length+' pravdanje čeka odluku!</b></div>'+
      '<button onclick="navigate(\'pravdanja_razrednik\')" class="btn-primary px-4 py-2 rounded-lg text-sm">Pregledaj →</button></div></div>';
  }
  
  // OCJENE PO PREDMETIMA
  html += '<div class="bg-white border rounded-xl shadow-sm overflow-hidden mb-4">'+
    '<div class="p-4 border-b bg-gradient-to-r from-blue-600 to-blue-700 text-white">'+
    '<h3 class="font-bold text-lg">⭐ Ocjene po predmetima</h3></div>'+
    '<div class="overflow-x-auto"><table class="w-full">'+
    '<thead><tr><th style="text-align:left">Predmet</th><th>Aktivnost</th><th>Pismene</th><th>Usmene</th><th>Prosjek</th><th>Zakl. I</th><th>Zakl. II</th></tr></thead><tbody>';
  predmeti.forEach(function(p){
    const oc = ocj.filter(o=>o.predmet===p && !o.zakljucna);
    const z1 = ocj.find(o=>o.predmet===p && o.zakljucna && o.semestar===1);
    const z2 = ocj.find(o=>o.predmet===p && o.zakljucna && o.semestar===2);
    const ren = function(tip) {
      const l = oc.filter(o=>o.tip===tip).sort((a,b)=>a.datum.localeCompare(b.datum));
      if (!l.length) return '<span class="text-gray-300">-</span>';
      return l.map(o=>{const cls=o.vrijednost==='NPS'?'ocjena-NPS':'ocjena-'+o.vrijednost;return '<span class="ocjena-chip '+(o.zamjenjeno?'ocjena-old':cls)+'" style="cursor:default" title="'+fmtDate(o.datum)+'">'+o.vrijednost+'</span>'}).join('');
    };
    const avgP = avgOcjena(oc);
    html += '<tr><td style="text-align:left;padding-left:16px"><b>'+p+'</b></td>'+
      '<td>'+ren('aktivnost')+'</td><td>'+ren('pismena')+'</td><td>'+ren('usmena')+'</td>'+
      '<td><b class="'+(parseFloat(avgP)>=4?'text-green-700':parseFloat(avgP)>=3?'text-blue-700':parseFloat(avgP)>=2?'text-yellow-700':parseFloat(avgP)>=1?'text-red-700':'text-gray-400')+'">'+avgP+'</b></td>'+
      '<td>'+(z1?'<span class="ocjena-chip '+(z1.vrijednost==='NPS'?'ocjena-NPS':'ocjena-'+z1.vrijednost)+'" style="cursor:default">'+z1.vrijednost+'</span>':'-')+'</td>'+
      '<td>'+(z2?'<span class="ocjena-chip '+(z2.vrijednost==='NPS'?'ocjena-NPS':'ocjena-'+z2.vrijednost)+'" style="cursor:default">'+z2.vrijednost+'</span>':'-')+'</td>'+
      '</tr>';
  });
  html += '</tbody></table></div></div>';
  
  // GRID - PRISUSTVO + PRAVDANJA
  html += '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">';
  
  // Prisustvo po danima
  html += '<div class="bg-white border rounded-xl shadow-sm overflow-hidden">'+
    '<div class="p-4 border-b bg-gradient-to-r from-red-600 to-red-700 text-white">'+
    '<h3 class="font-bold text-lg">📊 Posljednja prisustva</h3></div>'+
    '<div class="max-h-96 overflow-y-auto"><table class="w-full text-sm">'+
    '<thead><tr><th>Datum</th><th>Predmet</th><th>Status</th></tr></thead><tbody>'+
    (pris.length?pris.slice().sort((a,b)=>b.datum.localeCompare(a.datum)).slice(0,30).map(function(p){
      const sn = {P:'Prisutan',K:'Kasnio',O:'Odsutan',I:'Opravdano'}[p.status];
      return '<tr><td>'+fmtDate(p.datum)+'</td><td>'+p.predmet+'</td><td><span class="badge status-'+p.status+'">'+sn+(p.status==='K'&&p.kasnjenjeMin?' ('+p.kasnjenjeMin+'min)':'')+'</span></td></tr>';
    }).join(''):'<tr><td colspan="3" class="empty-state">Nema evidencije</td></tr>')+
    '</tbody></table></div></div>';
  
  // Pravdanja
  html += '<div class="bg-white border rounded-xl shadow-sm overflow-hidden">'+
    '<div class="p-4 border-b bg-gradient-to-r from-yellow-600 to-orange-600 text-white">'+
    '<h3 class="font-bold text-lg">📝 Pravdanja</h3></div>'+
    '<div class="max-h-96 overflow-y-auto p-3 space-y-2">'+
    (pravdanja.length?pravdanja.map(function(p){
      return '<div class="border-l-4 '+(p.status==='odobreno'?'border-l-green-500':p.status==='odbijeno'?'border-l-red-500':'border-l-yellow-500')+' bg-gray-50 rounded p-3">'+
        '<div class="flex justify-between mb-1"><b class="text-sm">'+fmtDate(p.datumOd)+' - '+fmtDate(p.datumDo)+'</b>'+
        '<span class="badge '+(p.status==='odobreno'?'bg-green-100 text-green-700':p.status==='odbijeno'?'bg-red-100 text-red-700':'bg-yellow-100 text-yellow-700')+'">'+p.status+'</span></div>'+
        '<div class="text-xs text-gray-600">'+escapeHtml(p.razlog)+'</div>'+
        (p.status==='cekanje'?'<div class="flex gap-2 mt-2"><button onclick="rijesiPrav('+p.id+',\'odbijeno\');navigate(\'mojrazred\',{ucenikId:'+ucenikId+'})" class="btn-danger px-2 py-1 rounded text-xs">✗ Odbij</button><button onclick="rijesiPrav('+p.id+',\'odobreno\');navigate(\'mojrazred\',{ucenikId:'+ucenikId+'})" class="btn-success px-2 py-1 rounded text-xs">✓ Odobri</button></div>':'')+
        '</div>';
    }).join(''):'<div class="empty-state">Nema pravdanja</div>')+
    '</div></div>';
  
  html += '</div>';
  
  // Akcije
  html += '<div class="bg-blue-50 border border-blue-200 rounded-xl p-4 flex flex-wrap gap-2">'+
    '<button onclick="novaPorukaUceniku('+ucenikId+')" class="btn-primary px-4 py-2 rounded-lg text-sm">💬 Pošalji poruku</button>'+
    (userAcc?'<button onclick="navigate(\'pravdanja_razrednik\')" class="btn-secondary px-4 py-2 rounded-lg text-sm">📝 Sva pravdanja razreda</button>':'')+

function novaPorukaUceniku(ucenikId) {
  const userAcc = DB.users.find(u=>u.ucenikId===ucenikId);
  if (!userAcc) { showNotification('Učenik nema korisnički nalog','error'); return; }
  const tekst = prompt('Poruka za '+(DB.ucenici.find(x=>x.id===ucenikId).ime)+':');
  if (!tekst || !tekst.trim()) return;
  let t = DB.porukeChat.find(t=>t.ucesnici.length===2 && t.ucesnici.indexOf(currentUser.id)>=0 && t.ucesnici.indexOf(userAcc.id)>=0);
  if (!t) { t = { id:Date.now(), ucesnici:[currentUser.id, userAcc.id], poruke:[] }; DB.porukeChat.push(t); }
  t.poruke.push({ id:Date.now()+1, odId:currentUser.id, tekst:tekst.trim(), datum:new Date().toISOString(), procitano:[currentUser.id], uredjeno:false, obrisano:false });
  DB.obavijesti.push({ id:Date.now()+2, naslov:'💬 '+currentUser.name, tekst:tekst.substring(0,80), datum:todayISO(), za:null, zaId:userAcc.id });
  saveData(); showNotification('Poruka poslana!');
}

function rijesiPrav(id, odluka) {
  const p = DB.pravdanja.find(x=>x.id===id);
  if (!p) return;
  const k = prompt(odluka==='odobreno'?'Komentar:':'Razlog odbijanja:','') || '';
  p.status = odluka; p.odobrioId = currentUser.id; p.komentar = k;
  if (odluka==='odobreno') DB.prisustva.filter(pr=>pr.ucenikId===p.ucenikId && pr.status==='O' && pr.datum>=p.datumOd && pr.datum<=p.datumDo).forEach(pr=>pr.status='I');
  const usr = DB.users.find(u=>u.ucenikId===p.ucenikId);
  if (usr) DB.obavijesti.push({ id:Date.now(), naslov:odluka==='odobreno'?'✓ Pravdanje odobreno':'✗ Pravdanje odbijeno', tekst:fmtDate(p.datumOd)+'-'+fmtDate(p.datumDo)+(k?': '+k:''), datum:todayISO(), za:null, zaId:usr.id });
  saveData(); navigate('pravdanja_razrednik');
}

      const z1 = DB.ocjene.find(o=>o.ucenikId===u.id && o.predmet===p && o.zakljucna && o.semestar===1);

    '<div class="grid grid-cols-2 gap-3"><div><label class="text-sm">Od *</label><input name="datumOd" type="date" required value="'+todayISO()+'" class="w-full px-3 py-2 border rounded-lg"></div>'+

    const fd = new FormData(e.target);
    DB.pravdanja.push({ id:Date.now(), ucenikId:u.id, datumOd:fd.get('datumOd'), datumDo:fd.get('datumDo'), razlog:fd.get('razlog'), status:'cekanje', postavioId:currentUser.id, datumPodnosenja:todayISO(), komentar:'' });

    saveData(); closeModal(); navigate('mojeprisustvo'); showNotification('Pravdanje poslano!');
  };
}

RENDERERS.ocjene = function(c) {
  const razredId = +(document.getElementById('ocRazred')?.value || DB.razredi[0]?.id);
  const dostupniPredmeti = (currentUser.zaduzenja||[]).map(z=>z.predmet);
  if (!dostupniPredmeti.length) DB.predmeti.forEach(p=>dostupniPredmeti.push(p));
  const predmet = document.getElementById('ocPredmet')?.value || dostupniPredmeti[0];
  const sem = getCurrentSemester();
  const semZatvoren = isSemesterZatvoren(sem);
  const locked = isSemesterLocked(razredId, predmet, sem) || semZatvoren;

function renderZakljucnaButton(ucenikId, predmet, semestar) {
  const z = DB.ocjene.find(o=>o.ucenikId===ucenikId && o.predmet===predmet && o.zakljucna && o.semestar===semestar);
  if (z) {
    const cls = z.vrijednost==='NPS'?'ocjena-NPS':'ocjena-'+z.vrijednost;
    return '<button onclick="zakljuciUSemestru('+ucenikId+',\''+predmet+'\','+semestar+')" class="ocjena-chip '+cls+'" style="font-size:1.1rem;width:42px;height:42px" title="Klik za promjenu">'+z.vrijednost+'</button>';
  }
  // Vidi koliko aktivnih ocjena ima u tom semestru
  const akt = DB.ocjene.filter(o=>o.ucenikId===ucenikId && o.predmet===predmet && !o.zamjenjeno && !o.zakljucna && o.semestar===semestar && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  if (!akt.length) return '<button onclick="zakljuciUSemestru('+ucenikId+',\''+predmet+'\','+semestar+')" class="text-xs text-gray-400 hover:text-blue-600 px-2 py-1 border border-dashed rounded">+ zaključi</button>';
  const avg = (akt.reduce((a,b)=>a+b,0)/akt.length).toFixed(1);
  return '<button onclick="zakljuciUSemestru('+ucenikId+',\''+predmet+'\','+semestar+')" class="text-xs px-2 py-1 bg-blue-50 hover:bg-blue-100 border border-blue-300 rounded text-blue-700 font-semibold">~'+avg+' →</button>';
}

function zakljuciUSemestru(ucenikId, predmet, semestar) {
  const u = DB.ucenici.find(x=>x.id===ucenikId);
  const akt = DB.ocjene.filter(o=>o.ucenikId===ucenikId && o.predmet===predmet && !o.zamjenjeno && !o.zakljucna && o.semestar===semestar && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
  const prijedlog = akt.length ? Math.round(akt.reduce((a,b)=>a+b,0)/akt.length) : 0;
  const postojeca = DB.ocjene.find(o=>o.ucenikId===ucenikId && o.predmet===predmet && o.zakljucna && o.semestar===semestar);
  showModal('<h3 class="text-xl font-bold mb-2">Zaključna ocjena - Semestar '+semestar+'</h3>'+
    '<p class="text-sm text-gray-600 mb-4"><b>'+escapeHtml(u.prezime+' '+u.ime)+'</b> • '+predmet+'</p>'+
    (akt.length?'<div class="mb-3 p-3 bg-blue-50 rounded-lg text-sm">Aktivne ocjene u semestru: '+akt.join(', ')+'<br>Prosjek: <b>'+(akt.reduce((a,b)=>a+b,0)/akt.length).toFixed(2)+'</b> → Prijedlog: <b class="text-blue-700">'+prijedlog+'</b></div>':'<div class="text-sm text-gray-500 mb-3 p-3 bg-gray-50 rounded">Nema ocjena u ovom semestru.</div>')+
    (postojeca?'<div class="mb-3 p-2 bg-yellow-50 rounded text-sm">Trenutna zaključna: <b>'+postojeca.vrijednost+'</b></div>':'')+
    '<label class="text-sm font-medium block mb-2">Odaberi zaključnu ocjenu:</label>'+
    '<div class="grid grid-cols-5 gap-2 mb-2">'+[1,2,3,4,5].map(v=>'<button onclick="postaviZakljucnuU('+ucenikId+',\''+predmet+'\','+semestar+','+v+')" class="ocjena-chip ocjena-'+v+(v===prijedlog?' ring-4 ring-blue-400':'')+'" style="height:60px;font-size:1.8rem">'+v+'</button>').join('')+'</div>'+
    '<button onclick="postaviZakljucnuU('+ucenikId+',\''+predmet+'\','+semestar+',\'NPS\')" class="ocjena-chip ocjena-NPS w-full" style="height:40px">NPS</button>'+
    '<div class="flex justify-between mt-4 pt-3 border-t">'+
    (postojeca?'<button onclick="ukloniZakljucnuU('+ucenikId+',\''+predmet+'\','+semestar+')" class="btn-danger px-4 py-2 rounded-lg">🗑 Ukloni</button>':'<div></div>')+
    '<button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button></div>');
}
function postaviZakljucnuU(ucenikId, predmet, semestar, vrijednost) {
  // SIGURNOSNA PROVJERA - semestar otvoren?
  if (isSemesterZatvoren(semestar)) {
    const semInfo = getSemesterInfo(semestar);
    showNotification('🔒 '+(semInfo?semInfo.naziv:'Semestar '+semestar)+' je ZATVOREN. Admin mora otvoriti.', 'error');
    closeModal();
    return;
  }
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===ucenikId && o.predmet===predmet && o.zakljucna && o.semestar===semestar));
  DB.ocjene.push({ id:Date.now(), ucenikId:ucenikId, predmet:predmet, tip:'zakljucna', vrijednost:vrijednost, datum:todayISO(), semestar:semestar, nastavnikId:currentUser.id, zakljucna:true, zamjenjeno:false });
  const ucUser = DB.users.find(u=>u.ucenikId===ucenikId);
  if (ucUser) DB.obavijesti.push({ id:Date.now()+1, naslov:'⭐ Zaključna ocjena', tekst:predmet+' - Semestar '+semestar+': '+vrijednost, datum:todayISO(), za:null, zaId:ucUser.id });
  saveData(); closeModal(); navigate(currentView, viewState); showNotification('Zaključna upisana!');
}
function ukloniZakljucnuU(ucenikId, predmet, semestar) {
  if (!confirm('Ukloniti zaključnu ocjenu?')) return;
  DB.ocjene = DB.ocjene.filter(o=>!(o.ucenikId===ucenikId && o.predmet===predmet && o.zakljucna && o.semestar===semestar));
  saveData(); closeModal(); navigate(currentView, viewState); showNotification('Uklonjena');
}
function zakljuciSveJednim(razredId, predmet) {
  const sem = getCurrentSemester();
  const ucenici = DB.ucenici.filter(u=>u.razredId===razredId);
  // Prvo izračunaj koliko će se zaključiti
  const zaZakljuciti = [];
  let preskoceno = 0, bezOcjena = 0;
  ucenici.forEach(function(u){
    const postojeca = DB.ocjene.find(o=>o.ucenikId===u.id && o.predmet===predmet && o.zakljucna && o.semestar===sem);
    if (postojeca) { preskoceno++; return; }
    const akt = DB.ocjene.filter(o=>o.ucenikId===u.id && o.predmet===predmet && !o.zamjenjeno && !o.zakljucna && o.semestar===sem && o.vrijednost!=='NPS' && !isNaN(+o.vrijednost)).map(o=>+o.vrijednost);
    if (!akt.length) { bezOcjena++; return; }
    const zakl = Math.round(akt.reduce((a,b)=>a+b,0)/akt.length);
    zaZakljuciti.push({u:u, zakl:zakl, prosjek:(akt.reduce((a,b)=>a+b,0)/akt.length).toFixed(2)});
  });
  if (!zaZakljuciti.length) {
    showNotification('Nema učenika za zaključavanje. '+(preskoceno?'(svi već zaključeni)':'(nema ocjena)'),'info');
    return;
  }
  if (!confirm('⚡ Zaključiti '+zaZakljuciti.length+' učenika po prosjeku?\n\n'+
    (preskoceno?'• '+preskoceno+' već zaključeno (preskočeno)\n':'')+
    (bezOcjena?'• '+bezOcjena+' nema ocjena (preskočeno)\n':'')+
    '\nPredmet: '+predmet+' • Semestar: '+sem)) return;
  zaZakljuciti.forEach(function(z){
    DB.ocjene.push({ id:Date.now()+Math.random(), ucenikId:z.u.id, predmet:predmet, tip:'zakljucna', vrijednost:z.zakl, datum:todayISO(), semestar:sem, nastavnikId:currentUser.id, zakljucna:true, zamjenjeno:false });
    const userAcc = DB.users.find(u=>u.ucenikId===z.u.id);
    if (userAcc) DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'⭐ Zaključna ocjena', tekst:predmet+' - Sem. '+sem+': '+z.zakl, datum:todayISO(), za:null, zaId:userAcc.id });
  });
  saveData(); navigate('ocjene'); showNotification('✓ Zaključeno '+zaZakljuciti.length+' učenika!');
}

function otvoriSemModal(broj) {

  const s = broj ? DB.semestri.find(x=>x.broj===broj) : { broj: (Math.max.apply(null, DB.semestri.map(x=>x.broj).concat([0]))+1), naziv:'', datumOd:todayISO(), datumDo:todayISO(), zatvoren:true };
  const zatvorenChecked = (s.zatvoren !== false); // default true
  showModal('<h3 class="text-xl font-bold mb-4">'+(broj?'✎ Uredi semestar':'+ Novi semestar')+'</h3>'+
    '<form id="semf" class="space-y-3">'+
    '<div class="grid grid-cols-2 gap-3">'+
    '<div><label class="text-sm font-medium block mb-1">Broj semestra *</label>'+
    '<input name="broj" type="number" min="1" value="'+s.broj+'" required '+(broj?'readonly':'')+' class="w-full px-3 py-2 border rounded-lg'+(broj?' bg-gray-100':'')+'"></div>'+
    '<div><label class="text-sm font-medium block mb-1">Naziv *</label>'+
    '<input name="naziv" value="'+escapeHtml(s.naziv)+'" required class="w-full px-3 py-2 border rounded-lg" placeholder="npr. Prvo polugodište"></div>'+
    '</div>'+
    '<div class="grid grid-cols-2 gap-3">'+
    '<div><label class="text-sm font-medium block mb-1">Datum početka *</label>'+
    '<input name="datumOd" type="date" value="'+s.datumOd+'" required class="w-full px-3 py-2 border rounded-lg"></div>'+
    '<div><label class="text-sm font-medium block mb-1">Datum završetka *</label>'+
    '<input name="datumDo" type="date" value="'+s.datumDo+'" required class="w-full px-3 py-2 border rounded-lg"></div>'+
    '</div>'+
    '<label class="flex items-start gap-3 p-3 bg-red-50 border border-red-200 rounded-lg cursor-pointer">'+
    '<input type="checkbox" name="zatvoren" '+(zatvorenChecked?'checked':'')+' class="w-5 h-5 mt-0.5">'+
    '<div class="text-sm"><b class="text-red-900">🔒 Semestar ZATVOREN</b><div class="text-xs text-red-800 mt-1">Nastavnici ne mogu unositi ni mijenjati ocjene. (Preporučeno za novi semestar - otvori ga ručno kad treba početi ocjenjivanje)</div></div>'+
    '</label>'+
    '<div class="flex justify-end gap-2 pt-4 border-t"><button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button><button type="submit" class="btn-primary px-4 py-2 rounded-lg">Sačuvaj</button></div>'+
    '</form>');
  document.getElementById('semf').onsubmit = function(e){
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = { broj:+fd.get('broj'), naziv:fd.get('naziv'), datumOd:fd.get('datumOd'), datumDo:fd.get('datumDo'), zatvoren:fd.get('zatvoren')==='on' };
    if (data.datumOd > data.datumDo) { showNotification('Datum početka mora biti prije završetka!','error'); return; }
    if (broj) Object.assign(s, data);
    else {
      if (DB.semestri.find(x=>x.broj===data.broj)) { showNotification('Semestar broj '+data.broj+' već postoji!','error'); return; }
      DB.semestri.push(data);
    }
    saveData(); closeModal(); navigate('semestri'); showNotification(broj?'Semestar izmijenjen':'Semestar dodan');
  };

function toggleSemZatvoren(broj) {
  const s = DB.semestri.find(x=>x.broj===broj);
  if (!s) return;
  const action = s.zatvoren ? 'OTVORITI' : 'ZATVORITI';
  if (!confirm((s.zatvoren?'🔓':'🔒')+' '+action+' semestar "'+s.naziv+'"?\n\n'+
    (s.zatvoren ? 'Nastavnici će ponovno moći unositi i mijenjati ocjene.' : 'Nastavnici NEĆE moći mijenjati ocjene dok je semestar zatvoren.'))) return;
  s.zatvoren = !s.zatvoren;
  // obavijesti sve nastavnike
  DB.users.filter(u=>u.role==='nastavnik').forEach(function(u){
    DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:(s.zatvoren?'🔒':'🔓')+' Semestar '+(s.zatvoren?'zatvoren':'otvoren'), tekst:s.naziv+': '+(s.zatvoren?'nije moguće mijenjati ocjene':'možete unositi ocjene'), datum:todayISO(), za:null, zaId:u.id });
  });
  saveData(); navigate('semestri'); showNotification(s.zatvoren?'🔒 Semestar zatvoren':'🔓 Semestar otvoren');
}

function obrisiSem(broj) {
  if (DB.semestri.length<=1) { showNotification('Mora ostati barem jedan semestar!','error'); return; }
  const s = DB.semestri.find(x=>x.broj===broj);
  if (!confirm('🗑 Obrisati semestar "'+s.naziv+'"?\n\nOcjene iz tog semestra će ostati, ali nećete moći koristiti njegovu logiku.')) return;
  DB.semestri = DB.semestri.filter(x=>x.broj!==broj);
  saveData(); navigate('semestri'); showNotification('Semestar obrisan');
}

function chatMenu(threadId, evt) {
  evt = evt || window.event;
  const t = DB.porukeChat.find(x=>x.id===threadId);
  if (!t) return;
  const arhivirano = (t.arhivirano||[]).indexOf(currentUser.id)>=0;
  // ukloni postojeci menu
  const old = document.getElementById('chatCtxMenu');
  if (old) old.remove();
  const menu = document.createElement('div');
  menu.id = 'chatCtxMenu';
  menu.className = 'fixed bg-white border rounded-lg shadow-2xl z-50 py-1 text-sm';
  menu.style.minWidth = '180px';
  const r = evt.target.getBoundingClientRect();
  menu.style.top = (r.bottom+4)+'px';
  menu.style.right = (window.innerWidth - r.right)+'px';
  menu.innerHTML = 
    '<button onclick="navigate(\'poruke\',{threadId:'+threadId+'});document.getElementById(\'chatCtxMenu\').remove()" class="w-full text-left px-4 py-2 hover:bg-gray-100">💬 Otvori</button>'+
    '<button onclick="markAllRead('+threadId+')" class="w-full text-left px-4 py-2 hover:bg-gray-100">✓ Označi kao pročitano</button>'+
    '<button onclick="toggleArhiva('+threadId+')" class="w-full text-left px-4 py-2 hover:bg-gray-100">'+(arhivirano?'📂 Vrati iz arhive':'📁 Arhiviraj')+'</button>'+
    '<div class="border-t my-1"></div>'+
    '<button onclick="obrisiThread('+threadId+')" class="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600">🗑 Obriši razgovor</button>';
  document.body.appendChild(menu);
  setTimeout(function(){
    document.addEventListener('click', function closer(e){
      if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closer); }
    });
  },10);
}
function markAllRead(tid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  if (!t) return;
  t.poruke.forEach(function(p){ if (p.odId!==currentUser.id) { p.procitano = p.procitano||[]; if (p.procitano.indexOf(currentUser.id)<0) p.procitano.push(currentUser.id); }});
  saveData(); document.getElementById('chatCtxMenu')?.remove();
  navigate('poruke'); updateNotifBadge();
}
function toggleArhiva(tid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  if (!t) return;
  t.arhivirano = t.arhivirano || [];
  const ix = t.arhivirano.indexOf(currentUser.id);
  if (ix>=0) t.arhivirano.splice(ix,1);
  else t.arhivirano.push(currentUser.id);
  saveData(); document.getElementById('chatCtxMenu')?.remove();
  navigate('poruke'); showNotification(ix>=0?'Vraćen iz arhive':'Arhivirano');
}
function obrisiThread(tid) {
  if (!confirm('Obrisati cijeli razgovor? Drugi učesnici će ga i dalje imati.')) return;
  const t = DB.porukeChat.find(x=>x.id===tid);
  if (!t) return;
  // ukloni currentUser iz ucesnika
  t.ucesnici = t.ucesnici.filter(id=>id!==currentUser.id);
  if (t.ucesnici.length===0) DB.porukeChat = DB.porukeChat.filter(x=>x.id!==tid);
  saveData(); document.getElementById('chatCtxMenu')?.remove();
  navigate('poruke'); showNotification('Razgovor obrisan');
}

  const arhivirani = DB.porukeChat.filter(t=>t.ucesnici.indexOf(currentUser.id)>=0 && (t.arhivirano||[]).indexOf(currentUser.id)>=0);

function fmtTimeShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs/60000);
  if (diffMin<1) return 'sad';
  if (diffMin<60) return diffMin+'min';
  if (d.toDateString()===now.toDateString()) return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
  if (d.toDateString()===yesterday.toDateString()) return 'juče';
  if ((now-d)<7*24*60*60*1000) return ['Ned','Pon','Uto','Sri','Čet','Pet','Sub'][d.getDay()];
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.';
}

function fmtTimeLong(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'. '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

let replyToPoruka = null; // za odgovaranje
function renderThread(c, threadId) {
  const t = DB.porukeChat.find(x=>x.id===threadId);
  if (!t) { navigate('poruke'); return; }
  // mark as read
  t.poruke.forEach(function(p){ if (p.odId!==currentUser.id) { p.procitano = p.procitano||[]; if (p.procitano.indexOf(currentUser.id)<0) p.procitano.push(currentUser.id); }});
  saveData();
  
  const drugi = t.ucesnici.filter(id=>id!==currentUser.id);
  const drugiNames = drugi.map(id=>(DB.users.find(x=>x.id===id)||{}).name||'').filter(Boolean);
  const naslov = t.naslov || drugiNames.join(', ') || 'Razgovor';
  const isGrupa = drugi.length>1;
  
  // Filtriraj poruke koje su obrisane samo za mene
  const vidljivePoruke = t.poruke.filter(p=>(p.obrisanoZa||[]).indexOf(currentUser.id)<0);
  
  // Grupiraj po danima
  const grupirano = [];
  let zadnjiDan = null;
  vidljivePoruke.forEach(function(p){
    const dan = p.datum.substring(0,10);
    if (dan !== zadnjiDan) {
      grupirano.push({tip:'separator', datum:dan});
      zadnjiDan = dan;
    }
    grupirano.push({tip:'poruka', p:p});
  });
  
  let html = '<div class="bg-white border rounded-xl shadow-sm overflow-hidden flex flex-col" style="height:calc(100vh - 140px);min-height:500px">'+
    // HEADER
    '<div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 flex items-center gap-3 flex-shrink-0">'+
    '<button onclick="navigate(\'poruke\')" class="hover:bg-white/20 p-2 rounded-lg">←</button>'+
    '<div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center font-bold flex-shrink-0">'+(isGrupa?'👥':((drugiNames[0]||' ').split(' ').map(s=>s[0]||'').join('').substring(0,2).toUpperCase()))+'</div>'+
    '<div class="flex-1 min-w-0">'+
    '<div class="font-bold truncate">'+escapeHtml(naslov)+'</div>'+
    '<div class="text-xs opacity-90">'+(isGrupa?drugi.length+' članova':escapeHtml(drugiNames[0]||''))+'</div>'+
    '</div>'+
    '<button onclick="threadInfo('+threadId+')" class="hover:bg-white/20 p-2 rounded-lg" title="Info">ℹ️</button>'+
    '</div>'+
    // POSLEDNJA AKTIVNOST: ko je član
    (isGrupa?'<div class="bg-purple-50 border-b px-4 py-2 text-xs text-purple-800">👥 Članovi: '+drugiNames.join(', ')+', Vi</div>':'')+
    // PORUKE
    '<div id="chatBox" class="flex-1 overflow-y-auto p-4 bg-gradient-to-b from-gray-50 to-white"><div class="flex flex-col gap-1">';
  
  if (grupirano.length===0) {
    html += '<div class="text-center text-gray-400 mt-20"><div class="text-6xl mb-2">👋</div>Pošaljite prvu poruku!</div>';
  } else {
    grupirano.forEach(function(g){
      if (g.tip==='separator') {
        const dat = g.datum;
        const today = todayISO();
        const yest = new Date(); yest.setDate(yest.getDate()-1);
        const yestStr = yest.toISOString().substring(0,10);
        const label = dat===today ? 'Danas' : dat===yestStr ? 'Juče' : fmtDate(dat);
        html += '<div class="text-center my-3"><span class="bg-gray-200 text-gray-700 text-xs px-3 py-1 rounded-full font-semibold">'+label+'</span></div>';
        return;
      }
      const p = g.p;
      const mine = p.odId===currentUser.id;
      const ime = (DB.users.find(u=>u.id===p.odId)||{}).name || '?';
      const procitanoBy = (p.procitano||[]).filter(id=>id!==currentUser.id);
      const sviProcitali = mine && drugi.every(id=>(p.procitano||[]).indexOf(id)>=0);
      // Reply preview
      let replyHtml = '';
      if (p.replyToId) {
        const orig = t.poruke.find(x=>x.id===p.replyToId);
        if (orig) {
          const origIme = (DB.users.find(u=>u.id===orig.odId)||{}).name || '?';
          replyHtml = '<div class="bg-black/10 border-l-2 border-white/50 rounded p-1 px-2 mb-1 text-xs opacity-90 cursor-pointer" onclick="scrollToPoruka('+orig.id+')"><b>'+escapeHtml(origIme)+'</b>: '+escapeHtml((orig.tekst||'').substring(0,60))+(orig.tekst&&orig.tekst.length>60?'...':'')+'</div>';
        }
      }
      
      if (p.obrisanoZaSve) {
        html += '<div class="chat-bubble '+(mine?'mine':'theirs')+'" id="msg'+p.id+'" style="opacity:.5;font-style:italic"><div>🚫 Ova poruka je obrisana</div></div>';
        return;
      }
      if (p.sistem) {
        html += '<div class="text-center my-2"><span class="bg-purple-100 text-purple-800 text-xs px-3 py-1 rounded-full">'+escapeHtml(p.tekst)+'</span></div>';
        return;
      }
      const reakcije = p.reakcije || {};
      const ukReakcija = Object.keys(reakcije).reduce(function(s,k){return s+reakcije[k].length},0);
      
      html += '<div class="chat-bubble '+(mine?'mine':'theirs')+'" id="msg'+p.id+'">'+
        (!mine && isGrupa?'<div class="text-xs font-bold mb-1" style="color:#2563eb">'+escapeHtml(ime)+'</div>':'')+
        replyHtml+
        '<div class="break-words whitespace-pre-wrap">'+escapeHtml(p.tekst)+'</div>'+
        (ukReakcija ? '<div class="mt-1 flex flex-wrap gap-1">'+Object.keys(reakcije).map(function(emo){if (!reakcije[emo].length) return ''; const ja = reakcije[emo].indexOf(currentUser.id)>=0; return '<button onclick="toggleReakcija('+t.id+','+p.id+',\''+emo+'\')" class="text-xs px-2 py-0.5 rounded-full '+(ja?'bg-blue-100 border border-blue-400':'bg-white/20 border border-white/30')+'" style="'+(mine?'background:rgba(255,255,255,0.2)':'')+'">'+emo+' '+reakcije[emo].length+'</button>'}).join('')+'</div>' : '')+
        '<div class="time flex items-center gap-2 mt-1">'+
        '<span>'+fmtTimeLong(p.datum)+'</span>'+
        (p.uredjeno?'<span class="italic opacity-70">uređeno</span>':'')+
        (mine?'<span class="ml-auto">'+(sviProcitali?'<span title="Pročitano">✓✓</span>':'<span title="Poslano">✓</span>')+'</span>':'')+
        '</div>'+
        '<div class="msg-actions mt-1 flex gap-1 text-xs">'+
        '<button onclick="setReply('+t.id+','+p.id+')" class="hover:bg-white/20 px-2 py-0.5 rounded" title="Odgovori">↩ Odgovori</button>'+
        '<button onclick="reakcijaMenu('+t.id+','+p.id+', event)" class="hover:bg-white/20 px-2 py-0.5 rounded" title="Reakcija">😊</button>'+
        (mine?'<button onclick="urediPoruku('+t.id+','+p.id+')" class="hover:bg-white/20 px-2 py-0.5 rounded" title="Uredi">✎ Uredi</button>':'')+
        (mine?'<button onclick="obrisiPorukuMenu('+t.id+','+p.id+', event)" class="hover:bg-white/20 px-2 py-0.5 rounded" title="Obriši">🗑</button>':'<button onclick="obrisiZaMene('+t.id+','+p.id+')" class="hover:bg-white/20 px-2 py-0.5 rounded">🗑 Sakrij</button>')+
        '</div>'+
        '</div>';
    });
  }
  html += '</div></div>'+
    // REPLY PREVIEW
    (replyToPoruka ? (function(){
      const orig = t.poruke.find(x=>x.id===replyToPoruka);
      if (!orig) { replyToPoruka=null; return ''; }
      const origIme = (DB.users.find(u=>u.id===orig.odId)||{}).name || '?';
      return '<div class="bg-blue-50 border-t border-blue-200 px-4 py-2 flex items-center gap-3 flex-shrink-0">'+
        '<div class="text-blue-500 text-xl">↩</div>'+
        '<div class="flex-1 min-w-0"><div class="text-xs text-blue-700 font-semibold">Odgovaranje na '+escapeHtml(origIme)+'</div>'+
        '<div class="text-sm text-gray-700 truncate">'+escapeHtml((orig.tekst||'').substring(0,80))+'</div></div>'+
        '<button onclick="replyToPoruka=null;renderThread(document.getElementById(\'mainContent\'),'+threadId+')" class="text-gray-500 hover:text-red-600 text-lg">×</button>'+
        '</div>';
    })() : '')+
    // INPUT
    '<form id="chatForm" class="border-t bg-white p-3 flex gap-2 flex-shrink-0">'+
    '<button type="button" onclick="emojiPicker(event)" class="px-3 py-2 hover:bg-gray-100 rounded-lg text-xl" title="Emoji">😊</button>'+
    '<input id="chatInput" placeholder="Napišite poruku..." class="flex-1 px-4 py-3 border rounded-lg" autocomplete="off">'+
    '<button type="submit" class="btn-primary px-5 py-3 rounded-lg font-semibold">Pošalji</button>'+
    '</form>'+
    '</div>';
  c.innerHTML = html;
  
  const cb = document.getElementById('chatBox');
  if (cb) cb.scrollTop = cb.scrollHeight;
  
  document.getElementById('chatForm').onsubmit = function(e) {
    e.preventDefault();
    const inp = document.getElementById('chatInput');
    const tekst = inp.value.trim();
    if (!tekst) return;
    const nova = { id:Date.now(), odId:currentUser.id, tekst:tekst, datum:new Date().toISOString(), procitano:[currentUser.id], uredjeno:false, obrisanoZaSve:false, obrisanoZa:[], reakcije:{}, replyToId:replyToPoruka||null };
    t.poruke.push(nova);
    drugi.forEach(function(uid){
      DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'💬 '+currentUser.name, tekst:tekst.substring(0,80), datum:todayISO(), za:null, zaId:uid });
    });
    replyToPoruka = null;
    saveData();
    renderThread(c, threadId);
  };
  document.getElementById('chatInput').focus();
}

function scrollToPoruka(pid) {
  const el = document.getElementById('msg'+pid);
  if (el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.style.transition='background 0.5s'; const old=el.style.background; el.style.background='#fef3c7'; setTimeout(()=>el.style.background=old,1500); }
}

function setReply(tid, pid) {
  replyToPoruka = pid;
  renderThread(document.getElementById('mainContent'), tid);
}

function emojiPicker(evt) {
  evt = evt || window.event;
  const old = document.getElementById('emojiPicker');
  if (old) { old.remove(); return; }
  const inp = document.getElementById('chatInput');
  const emojis = ['😀','😂','😍','🥰','😎','🤔','😢','😡','👍','👎','❤️','💔','🔥','💯','🎉','👏','🙏','😴','🤝','💪','📚','✅','❌','⭐','💡','🚀','🎓','📝','💬','👌'];
  const picker = document.createElement('div');
  picker.id = 'emojiPicker';
  picker.className = 'fixed bg-white border rounded-xl shadow-2xl p-3 z-50 grid grid-cols-6 gap-1';
  const r = evt.target.getBoundingClientRect();
  picker.style.bottom = (window.innerHeight - r.top + 4)+'px';
  picker.style.left = r.left+'px';
  picker.innerHTML = emojis.map(e=>'<button onclick="document.getElementById(\'chatInput\').value+=\''+e+'\';document.getElementById(\'emojiPicker\').remove();document.getElementById(\'chatInput\').focus()" class="text-2xl hover:bg-gray-100 rounded p-1">'+e+'</button>').join('');
  document.body.appendChild(picker);
  setTimeout(function(){
    document.addEventListener('click', function closer(e){
      if (!picker.contains(e.target) && e.target!==evt.target) { picker.remove(); document.removeEventListener('click', closer); }
    });
  },10);
}

function reakcijaMenu(tid, pid, evt) {
  evt = evt || window.event;
  evt.stopPropagation();
  const old = document.getElementById('reakcijaMenu');
  if (old) old.remove();
  const emojis = ['👍','❤️','😂','😮','😢','🔥','💯','🎉'];
  const menu = document.createElement('div');
  menu.id = 'reakcijaMenu';
  menu.className = 'fixed bg-white border rounded-full shadow-2xl px-2 py-1 z-50 flex gap-1';
  const r = evt.target.getBoundingClientRect();
  menu.style.top = (r.top - 50)+'px';
  menu.style.left = Math.max(10, r.left)+'px';
  menu.innerHTML = emojis.map(e=>'<button onclick="toggleReakcija('+tid+','+pid+',\''+e+'\')" class="text-2xl hover:scale-125 transition p-1">'+e+'</button>').join('');
  document.body.appendChild(menu);
  setTimeout(function(){
    document.addEventListener('click', function closer(e){
      if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closer); }
    });
  },10);
}

function toggleReakcija(tid, pid, emoji) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  const p = t.poruke.find(x=>x.id===pid);
  if (!p) return;
  p.reakcije = p.reakcije || {};
  p.reakcije[emoji] = p.reakcije[emoji] || [];
  const ix = p.reakcije[emoji].indexOf(currentUser.id);
  if (ix>=0) p.reakcije[emoji].splice(ix,1);
  else p.reakcije[emoji].push(currentUser.id);
  if (!p.reakcije[emoji].length) delete p.reakcije[emoji];
  saveData();
  document.getElementById('reakcijaMenu')?.remove();
  renderThread(document.getElementById('mainContent'), tid);
}

function urediPoruku(tid, pid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  const p = t.poruke.find(x=>x.id===pid);
  if (!p || p.odId!==currentUser.id) return;
  // ne dozvoljavaj uređivanje nakon 24h
  const sati = (new Date() - new Date(p.datum))/(1000*60*60);
  if (sati > 24) { showNotification('Poruka starija od 24h ne može se uređivati','error'); return; }
  showModal('<h3 class="text-xl font-bold mb-4">✎ Uredi poruku</h3>'+
    '<form id="uf" class="space-y-3">'+
    '<textarea id="urediTekst" class="w-full px-3 py-2 border rounded-lg h-32" required>'+escapeHtml(p.tekst)+'</textarea>'+
    '<div class="flex justify-end gap-2 pt-3 border-t"><button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button><button type="submit" class="btn-primary px-4 py-2 rounded-lg">Sačuvaj izmjenu</button></div>'+
    '</form>');
  document.getElementById('uf').onsubmit = function(e){
    e.preventDefault();
    const novi = document.getElementById('urediTekst').value.trim();
    if (!novi) return;
    p.tekst = novi; p.uredjeno = true;
    saveData(); closeModal();
    renderThread(document.getElementById('mainContent'), tid);
    showNotification('Poruka uređena');
  };
}

function obrisiPorukuMenu(tid, pid, evt) {
  evt = evt || window.event;
  evt.stopPropagation();
  const old = document.getElementById('delMenu');
  if (old) old.remove();
  const menu = document.createElement('div');
  menu.id = 'delMenu';
  menu.className = 'fixed bg-white border rounded-lg shadow-2xl py-1 z-50 text-sm';
  menu.style.minWidth = '180px';
  const r = evt.target.getBoundingClientRect();
  menu.style.top = (r.bottom+4)+'px';
  menu.style.left = Math.max(10, r.left-100)+'px';
  menu.innerHTML = 
    '<button onclick="obrisiZaMene('+tid+','+pid+');document.getElementById(\'delMenu\').remove()" class="w-full text-left px-4 py-2 hover:bg-gray-100">🗑 Obriši samo za mene</button>'+
    '<button onclick="obrisiZaSve('+tid+','+pid+');document.getElementById(\'delMenu\').remove()" class="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600">🗑 Obriši za sve</button>';
  document.body.appendChild(menu);
  setTimeout(function(){
    document.addEventListener('click', function closer(e){
      if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', closer); }
    });
  },10);
}
function obrisiZaMene(tid, pid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  const p = t.poruke.find(x=>x.id===pid);
  if (!p) return;
  p.obrisanoZa = p.obrisanoZa || [];
  if (p.obrisanoZa.indexOf(currentUser.id)<0) p.obrisanoZa.push(currentUser.id);
  saveData(); renderThread(document.getElementById('mainContent'), tid);
}
function obrisiZaSve(tid, pid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  const p = t.poruke.find(x=>x.id===pid);
  if (!p || p.odId!==currentUser.id) return;
  if (!confirm('Obrisati poruku za SVE učesnike? Ova akcija je trajna.')) return;
  p.obrisanoZaSve = true;
  saveData(); renderThread(document.getElementById('mainContent'), tid);
}

function threadInfo(tid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  if (!t) return;
  const ucesnici = t.ucesnici.map(id=>DB.users.find(u=>u.id===id)).filter(Boolean);
  const ukPoruka = t.poruke.filter(p=>!p.obrisanoZaSve).length;
  const naslov = t.naslov || ucesnici.filter(u=>u.id!==currentUser.id).map(u=>u.name).join(', ');
  showModal('<h3 class="text-xl font-bold mb-4">ℹ️ Info o razgovoru</h3>'+
    '<div class="space-y-3">'+
    '<div class="bg-gray-50 p-3 rounded-lg"><div class="text-xs text-gray-500">Naziv</div><div class="font-semibold">'+escapeHtml(naslov)+'</div></div>'+
    '<div class="bg-gray-50 p-3 rounded-lg"><div class="text-xs text-gray-500">Broj poruka</div><div class="font-semibold">'+ukPoruka+'</div></div>'+
    '<div class="bg-gray-50 p-3 rounded-lg"><div class="text-xs text-gray-500 mb-2">Učesnici ('+ucesnici.length+')</div>'+
    ucesnici.map(u=>'<div class="flex items-center gap-2 py-1"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 text-white font-bold flex items-center justify-center text-xs">'+(u.name.split(' ').map(s=>s[0]||'').join('').substring(0,2).toUpperCase())+'</div><span>'+escapeHtml(u.name)+(u.id===currentUser.id?' <span class="text-xs text-gray-500">(Vi)</span>':'')+' <span class="text-xs text-gray-500">'+u.role+'</span></span></div>').join('')+
    '</div>'+
    (t.ucesnici.length>2?'<button onclick="dodajUGrupu('+tid+')" class="btn-secondary w-full py-2 rounded-lg text-sm">+ Dodaj člana</button>':'')+
    '</div>'+
    '<div class="flex justify-end mt-4 pt-3 border-t"><button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Zatvori</button></div>');
}

function dodajUGrupu(tid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  if (!t) return;
  const dostupni = DB.users.filter(u=>t.ucesnici.indexOf(u.id)<0);
  if (!dostupni.length) { showNotification('Svi korisnici već su u grupi','info'); return; }
  showModal('<h3 class="text-xl font-bold mb-4">+ Dodaj člana u grupu</h3>'+
    '<select id="noviClan" class="w-full px-3 py-2 border rounded-lg mb-3">'+
    dostupni.map(u=>'<option value="'+u.id+'">'+escapeHtml(u.name)+' ('+u.role+')</option>').join('')+
    '</select>'+
    '<div class="flex justify-end gap-2 pt-3 border-t"><button onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button>'+
    '<button onclick="potvrdiDodajClan('+tid+')" class="btn-primary px-4 py-2 rounded-lg">Dodaj</button></div>');
}
function potvrdiDodajClan(tid) {
  const t = DB.porukeChat.find(x=>x.id===tid);
  const uid = +document.getElementById('noviClan').value;
  if (t.ucesnici.indexOf(uid)<0) t.ucesnici.push(uid);
  // system message
  const u = DB.users.find(x=>x.id===uid);
  t.poruke.push({ id:Date.now(), odId:0, tekst:'➕ '+(u?u.name:'Korisnik')+' je dodan u grupu', datum:new Date().toISOString(), procitano:[currentUser.id], uredjeno:false, obrisanoZaSve:false, obrisanoZa:[], reakcije:{}, sistem:true });
  saveData(); closeModal(); renderThread(document.getElementById('mainContent'), tid); showNotification('Član dodan');
}

function novaThread() {
  showModal('<h3 class="text-xl font-bold mb-4">💬 Nova poruka</h3>'+
    '<form id="ntf" class="space-y-3">'+
    '<div><label class="text-sm font-medium block mb-1">Za *</label>'+
    '<select name="za" required class="w-full px-3 py-2 border rounded-lg"><option value="">-- odaberi korisnika --</option>'+
    DB.users.filter(u=>u.id!==currentUser.id).map(u=>'<option value="'+u.id+'">'+escapeHtml(u.name)+' ('+u.role+')</option>').join('')+
    '</select></div>'+
    '<div><label class="text-sm font-medium block mb-1">Prva poruka *</label>'+
    '<textarea name="tekst" required class="w-full px-3 py-2 border rounded-lg h-32" placeholder="Napišite poruku..."></textarea></div>'+
    '<div class="flex justify-end gap-2 pt-4 border-t"><button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button><button type="submit" class="btn-primary px-4 py-2 rounded-lg">Pošalji</button></div>'+
    '</form>');
  document.getElementById('ntf').onsubmit = function(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const zaId = +fd.get('za');
    const tekst = fd.get('tekst');
    let t = DB.porukeChat.find(t=>t.ucesnici.length===2 && t.ucesnici.indexOf(currentUser.id)>=0 && t.ucesnici.indexOf(zaId)>=0);
    if (!t) { t = { id:Date.now(), ucesnici:[currentUser.id, zaId], poruke:[], arhivirano:[] }; DB.porukeChat.push(t); }
    // ako je arhiviran, vrati
    if ((t.arhivirano||[]).indexOf(currentUser.id)>=0) t.arhivirano = t.arhivirano.filter(id=>id!==currentUser.id);
    t.poruke.push({ id:Date.now()+1, odId:currentUser.id, tekst:tekst, datum:new Date().toISOString(), procitano:[currentUser.id], uredjeno:false, obrisanoZaSve:false, obrisanoZa:[], reakcije:{} });
    DB.obavijesti.push({ id:Date.now()+2, naslov:'💬 '+currentUser.name, tekst:tekst.substring(0,80), datum:todayISO(), za:null, zaId:zaId });
    saveData(); closeModal(); navigate('poruke',{threadId:t.id}); showNotification('Poruka poslana!');
  };
}

function novaGrupa() {
  showModal('<h3 class="text-xl font-bold mb-4">👥 Nova grupa</h3>'+
    '<form id="ngf" class="space-y-3">'+
    '<div><label class="text-sm font-medium block mb-1">Naziv grupe *</label>'+
    '<input name="naslov" required class="w-full px-3 py-2 border rounded-lg" placeholder="npr. Razrednici VI razreda"></div>'+
    '<div><label class="text-sm font-medium block mb-1">Članovi (odaberi 2+)</label>'+
    '<div class="max-h-64 overflow-y-auto border rounded-lg p-2 space-y-1">'+
    DB.users.filter(u=>u.id!==currentUser.id).map(u=>'<label class="flex items-center gap-2 p-2 hover:bg-gray-50 cursor-pointer rounded"><input type="checkbox" name="clan" value="'+u.id+'" class="w-4 h-4"><span>'+escapeHtml(u.name)+' <span class="text-xs text-gray-500">('+u.role+')</span></span></label>').join('')+
    '</div></div>'+
    '<div><label class="text-sm font-medium block mb-1">Prva poruka</label>'+
    '<textarea name="tekst" required class="w-full px-3 py-2 border rounded-lg h-20" placeholder="Pozdrav svima!"></textarea></div>'+
    '<div class="flex justify-end gap-2 pt-4 border-t"><button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 rounded-lg">Otkaži</button><button type="submit" class="btn-primary px-4 py-2 rounded-lg">Kreiraj grupu</button></div>'+
    '</form>');
  document.getElementById('ngf').onsubmit = function(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const clanovi = fd.getAll('clan').map(Number);
    if (clanovi.length<2) { showNotification('Odaberite barem 2 člana za grupu','error'); return; }
    const t = { id:Date.now(), ucesnici:[currentUser.id].concat(clanovi), naslov:fd.get('naslov'), poruke:[], arhivirano:[] };
    t.poruke.push({ id:Date.now()+1, odId:0, tekst:'👥 Grupa kreirana od strane '+currentUser.name, datum:new Date().toISOString(), procitano:[currentUser.id], sistem:true });
    t.poruke.push({ id:Date.now()+2, odId:currentUser.id, tekst:fd.get('tekst'), datum:new Date().toISOString(), procitano:[currentUser.id], uredjeno:false, obrisanoZaSve:false, obrisanoZa:[], reakcije:{} });
    DB.porukeChat.push(t);
    clanovi.forEach(function(uid){
      DB.obavijesti.push({ id:Date.now()+Math.random(), naslov:'👥 Dodani u grupu: '+t.naslov, tekst:'Od '+currentUser.name, datum:todayISO(), za:null, zaId:uid });
    });
    saveData(); closeModal(); navigate('poruke',{threadId:t.id}); showNotification('Grupa kreirana!');
  };
}

RENDERERS.postavke = function(c) {
  c.innerHTML = '<h2 class="text-3xl font-bold mb-6">⚙️ Postavke</h2>'+
    '<div class="bg-white border rounded-xl p-6 max-w-xl mb-4">'+
    '<h3 class="font-bold mb-4">Profil</h3>'+
    '<form id="profForm" class="space-y-3">'+
    '<div><label class="text-sm">Ime</label><input name="name" value="'+escapeHtml(currentUser.name)+'" class="w-full px-3 py-2 border rounded-lg"></div>'+
    '<div><label class="text-sm">Email</label><input name="email" value="'+escapeHtml(currentUser.email||'')+'" class="w-full px-3 py-2 border rounded-lg"></div>'+
    '<div><label class="text-sm">Lozinka</label><input name="password" type="text" value="'+escapeHtml(currentUser.password)+'" class="w-full px-3 py-2 border rounded-lg"></div>'+
    '<button type="submit" class="btn-primary px-4 py-2 rounded-lg w-full">Sačuvaj</button>'+
    '</form></div>'+
    (currentUser.role==='admin'?'<div class="bg-white border rounded-xl p-6 max-w-xl"><h3 class="font-bold text-red-700 mb-4">Sistem</h3><button onclick="if(confirm(\'Resetovati?\')){localStorage.clear();location.reload();}" class="btn-danger px-4 py-2 rounded-lg">Resetuj sve</button></div>':'');
  document.getElementById('profForm').onsubmit = function(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    currentUser.name = fd.get('name');
    currentUser.email = fd.get('email');
    currentUser.password = fd.get('password');
    const us = DB.users.find(x=>x.id===currentUser.id);
    if (us) { us.name = currentUser.name; us.email = currentUser.email; us.password = currentUser.password; }
    saveData();
    document.getElementById('userBadge').textContent = currentUser.name;
    showNotification('Sačuvano!');
  };
};

// ============= FIREBASE SYNC =============
function startFirebaseSync() {
  if (!window.fbReady) {
    setStatusSync('offline');
    return;
  }
  setStatusSync('loading');
  // Prvo pokušaj učitati podatke iz Firebase
  window.fbLoadInitial().then(function(remoteData){
    if (remoteData && remoteData.users && remoteData.users.find(function(u){return u.username==='admin';})) {
      // Postoje cloud podaci - koristi njih (jer su dijeljeni)
      isApplyingRemote = true;
      DB = remoteData;
      // osiguraj sve ključeve
      Object.keys(DEFAULT_DATA).forEach(function(k){
        if (DB[k]===undefined) DB[k] = Array.isArray(DEFAULT_DATA[k]) ? [] : (typeof DEFAULT_DATA[k]==='object' ? Object.assign({},DEFAULT_DATA[k]) : DEFAULT_DATA[k]);
      });
      localStorage.setItem('edn_v4', JSON.stringify(DB));
      isApplyingRemote = false;
      setStatusSync('synced');
      console.log('✓ Učitano iz Firebase');
    } else {
      // Nema cloud podataka - gurni lokalne na cloud
      setStatusSync('saving');
      window.fbSaveAll(DB).then(function(){
        setStatusSync('synced');
        console.log('✓ Lokalni podaci postavljeni u Firebase');
      });
    }
    // Pokreni realtime listener za promjene
    window.fbSubscribe(function(remoteData){
      // ako smo upravo spasili (manje od 2s), zanemari (to su naši podaci)
      if (Date.now() - lastSaveTime < 2000) return;
      if (!remoteData || !remoteData.users) return;
      isApplyingRemote = true;
      DB = remoteData;
      Object.keys(DEFAULT_DATA).forEach(function(k){
        if (DB[k]===undefined) DB[k] = Array.isArray(DEFAULT_DATA[k]) ? [] : (typeof DEFAULT_DATA[k]==='object' ? Object.assign({},DEFAULT_DATA[k]) : DEFAULT_DATA[k]);
      });
      localStorage.setItem('edn_v4', JSON.stringify(DB));
      isApplyingRemote = false;
      // Re-render trenutni view ako je korisnik prijavljen
      if (currentUser) {
        // Update korisnika (lozinka, ime su možda promijenjeni)
        const updatedUser = DB.users.find(u=>u.id===currentUser.id);
        if (updatedUser) currentUser = updatedUser;
        try { navigate(currentView, viewState); } catch(e){}
        try { updateNotifBadge(); } catch(e){}
      }
      console.log('🔄 Update iz Firebase');
    });
  });
}

if (window.fbReady) {
  startFirebaseSync();
} else {
  window.addEventListener('firebase-ready', startFirebaseSync);
  // fallback ako firebase ne učita u 5s
  setTimeout(function(){ if (!window.fbReady) setStatusSync('offline'); }, 5000);
}
